/**
 * ✨ v1.4: Dashboard soddalashtirildi — endi faqat tezkor nazorat va muhim vazifalar
 * uchun: 4 ta asosiy KPI, "Buyurtmalar holati" va "E'tibor talab qiladi" bloklari,
 * va bitta sodda "Savdo dinamikasi" grafigi (7/30 kun). Avvalgi batafsil tahlillar —
 * Performance Analytics, Xarajatlar Tahlili, Qaytarishlar/Admin Ombori tafsilotlari,
 * davr bo'yicha hisobot va Excel/PDF eksport — HECH NARSA o'chirilmadi, ular endi
 * alohida "Hisobotlar / Tahlil" bo'limida (pages/reports.js, #/reports).
 */
(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function skeleton() {
    return `
      <div class="page">
        <div class="kpi-grid">${OH.skeleton.cards(4)}</div>
        <div class="card card-pad">${OH.skeleton.bar('30%', '14px')}${OH.skeleton.bar('100%', '70px')}</div>
        <div class="card card-pad">${OH.skeleton.bar('30%', '14px')}${OH.skeleton.bar('100%', '70px')}</div>
        <div class="card card-pad">${OH.skeleton.bar('30%', '16px')}${OH.skeleton.bar('100%', '200px')}</div>
      </div>`;
  }

  function kpiCard(icon, iconBg, iconColor, label, value) {
    return `<div class="card card-pad kpi-card card-hover">
      <div class="kpi-top"><div class="kpi-icon" style="background:${iconBg};color:${iconColor}">${icon}</div></div>
      <div><div class="kpi-value">${value}</div><div class="kpi-label">${label}</div></div>
    </div>`;
  }

  // "Buyurtmalar holati" — har bir pill bosilganda #/orders sahifasiga tegishli guruh
  // filtri bilan o'tadi (pages/orders.js dagi STATUS_GROUP_DEFS bilan mos keladi).
  function statusPill(key, label, count, cls) {
    return `<a href="#/orders?group=${key}" class="status-pill status-pill--${cls}">
      <span class="status-pill__count">${count}</span>
      <span class="status-pill__label">${label}</span>
    </a>`;
  }

  // "E'tibor talab qiladi" — har biri tegishli bo'limga (imkon qadar filtri bilan) o'tadi.
  function attentionItem(icon, href, label, count) {
    const isZero = !count;
    return `<a href="${href}" class="attention-item${isZero ? ' attention-item--empty' : ''}">
      <div class="attention-item__icon">${icon}</div>
      <div class="attention-item__count">${count}</div>
      <div class="attention-item__label">${label}</div>
    </a>`;
  }

  function mount(container) {
    container.innerHTML = skeleton();
    OH.api.getDashboardStats().then((s) => {
      const sg = s.statusGroups || { new: 0, processing: 0, done: 0, problem: 0 };
      const at = s.attention || { proposals: 0, returns: 0, defects: 0, payments: 0 };
      container.innerHTML = `
        <div class="page">
          <div class="kpi-grid">
            ${kpiCard(I.orders, 'var(--info-bg)', 'var(--info)', OH.i18n.t('dashboard.todayOrders'), s.todayOrders)}
            ${kpiCard(I.wallet, 'var(--success-bg)', 'var(--success)', OH.i18n.t('dashboard.totalSales'), F.money(s.totalSales))}
            ${kpiCard(I.sellers, 'var(--warning-bg)', 'var(--warning)', OH.i18n.t('dashboard.toBePaidToSellers'), F.money(s.toBePaidToSellers || 0))}
            ${kpiCard(I.trendUp, 'var(--accent-bg)', 'var(--accent)', OH.i18n.t('dashboard.netProfit'), F.money(s.netProfit))}
          </div>

          <div class="section-title-row"><h3>${OH.i18n.t('dashboard.orderStatus')}</h3></div>
          <div class="status-pill-grid">
            ${statusPill('new', OH.i18n.t('dashboard.statusNew'), sg.new, 'info')}
            ${statusPill('processing', OH.i18n.t('dashboard.statusProcessing'), sg.processing, 'warning')}
            ${statusPill('done', OH.i18n.t('dashboard.statusDone'), sg.done, 'success')}
            ${statusPill('problem', OH.i18n.t('dashboard.statusProblem'), sg.problem, 'danger')}
          </div>

          <div class="section-title-row"><h3>${OH.i18n.t('dashboard.needsAttention')}</h3></div>
          <div class="attention-grid">
            ${attentionItem(I.fileText, '#/proposals?status=new', OH.i18n.t('dashboard.proposals'), at.proposals)}
            ${attentionItem(I.undo, '#/returns', OH.i18n.t('dashboard.returns'), at.returns)}
            ${attentionItem(I.x, '#/warehouse?tab=defects', OH.i18n.t('dashboard.defects'), at.defects)}
            ${attentionItem(I.payments, '#/payments', OH.i18n.t('dashboard.payments'), at.payments)}
          </div>

          <div class="card chart-card dash-chart-card">
            <div class="card-head">
              <h3>${OH.i18n.t('dashboard.salesDynamics')}</h3>
              <div class="chart-tabs" id="chart-tabs">
                <button class="active" data-days="7">${OH.i18n.t('dashboard.days7')}</button>
                <button data-days="30">${OH.i18n.t('dashboard.days30')}</button>
              </div>
            </div>
            <div class="chart-summary" id="chart-summary"></div>
            <div class="chart-canvas-wrap"><canvas id="sales-chart"></canvas></div>
          </div>

          <a href="#/reports" class="link" style="display:inline-block;margin-top:16px;font-size:12.5px">${OH.i18n.t('dashboard.detailedAnalysis')}</a>
        </div>`;

      // ✨ YANGI: Mobil versiyada (.dash-chart-card CSS orqali yashirilgan) grafikni
      // chizishga umuman urinmaymiz — bo'sh canvas'ga chizish behuda ish bo'lardi.
      const isMobileWidth = () => window.innerWidth <= 860;
      let currentDays = 7;
      const canvas = OH.dom.qs('#sales-chart');
      const paint = () => {
        if (isMobileWidth()) return;
        const daily = s.series.daily; // 30 kunlik massiv — computeSalesSeries() orqali
        const slice = currentDays === 7
          ? { labels: daily.labels.slice(-7), values: daily.values.slice(-7) }
          : daily;
        const res = OH.charts.drawLineChart(canvas, slice.labels, slice.values);
        OH.dom.qs('#chart-summary').innerHTML = `<span class="v">${F.money(res.total)}</span><span class="l">${OH.i18n.t('dashboard.lastNDaysSales', { n: currentDays })}</span>`;
      };
      paint();
      window.addEventListener('resize', paint);
      OH.dom.qsa('#chart-tabs button').forEach((b) => b.addEventListener('click', () => {
        OH.dom.qsa('#chart-tabs button').forEach((x) => x.classList.remove('active'));
        b.classList.add('active');
        currentDays = +b.dataset.days;
        paint();
      }));
    });
  }

  OH.pages = OH.pages || {};
  OH.pages.dashboard = { mount };
})(window.OH = window.OH || {});

/**

 * tahlili, qaytarishlar va Admin Ombori tafsilotlari, hamda sana oralig'i bo'yicha
 * to'liq hisobot + Excel/PDF eksport. Barcha hisob-kitob mantiqi (getDashboardStats,
 * getReportStats) o'zgarishsiz qoldi — faqat ko'rinish joyi Dashboard'dan bu yerga
 * ko'chdi, Excel eksport esa qo'shimcha varaqlar bilan boyitildi.
 */
(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function skeleton() {
    return `
      <div class="page">
        <div class="card card-pad">${OH.skeleton.bar('30%', '16px')}${OH.skeleton.bar('100%', '90px')}</div>
        <div class="mini-stats">${OH.skeleton.cards(8)}</div>
        <div class="split-2"><div class="card card-pad">${OH.skeleton.bar('100%', '160px')}</div><div class="card card-pad">${OH.skeleton.bar('100%', '160px')}</div></div>
      </div>`;
  }

  function fmtDate(d) { return d.toISOString().slice(0, 10); }
  function computeRangeDates(key, customStart, customEnd) {
    const today = new Date();
    const todayStr = fmtDate(today);
    if (key === 'today') return { start: todayStr, end: todayStr, label: OH.i18n.t('rp.today') + ' — ' + F.date(todayStr) };
    if (key === 'yesterday') {
      const y = new Date(today); y.setDate(y.getDate() - 1);
      return { start: fmtDate(y), end: fmtDate(y), label: OH.i18n.t('rp.yesterday') + ' — ' + F.date(fmtDate(y)) };
    }
    if (key === '7d') {
      const s = new Date(today); s.setDate(s.getDate() - 6);
      return { start: fmtDate(s), end: todayStr, label: OH.i18n.t('rp.last7d') + ' — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === '30d') {
      const s = new Date(today); s.setDate(s.getDate() - 29);
      return { start: fmtDate(s), end: todayStr, label: OH.i18n.t('rp.last30d') + ' — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === 'month') {
      const s = new Date(today.getFullYear(), today.getMonth(), 1);
      return { start: fmtDate(s), end: todayStr, label: OH.i18n.t('rp.currentMonth') + ' — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === 'custom') {
      const s = customStart || todayStr, e = customEnd || todayStr;
      return { start: s, end: e, label: OH.i18n.t('rp.customRange') + ' — ' + F.date(s) + ' → ' + F.date(e) };
    }
    return { start: todayStr, end: todayStr, label: OH.i18n.t('rp.today') + ' — ' + F.date(todayStr) };
  }
  function reportStatCard(label, value, cls) {
    return `<div class="card card-pad mini-stat"><span>${label}</span><b class="mono${cls ? ' ' + cls : ''}">${value}</b></div>`;
  }
  function reportSections(stats) {
    return { o: stats.orders, fi: stats.finance, r: stats.returns };
  }

  // ✨ YANGI (v1.4): Excel eksport endi spetsifikatsiyaga mos — alohida varaqlarga
  // ajratilgan: Umumiy hisobot, Buyurtmalar, Mahsulotlar, Sotuvchilar, To'lovlar,
  // Komissiya va logistika, Qaytarishlar, Brak mahsulotlar, Admin ombori.
  function exportReportExcel(stats, periodLabel) {
    if (!(window.XLSX)) { OH.toast.error(OH.i18n.t('rp.excelNotLoaded'), OH.i18n.t('rp.checkInternet')); return; }
    const { o, fi, r } = reportSections(stats);
    const T = OH.i18n.t;
    const summary = [
      [T('rp.exp.title')],
      [T('rp.exp.period'), periodLabel],
      [],
      [T('rp.exp.sec1')],
      [T('rp.exp.totalOrders'), o.total],
      [T('rp.exp.newSent'), o.newSent],
      [T('rp.exp.accepted'), o.accepted],
      [T('rp.exp.inProgress'), o.inProgress],
      [T('rp.exp.delivered'), o.delivered],
      [T('rp.exp.closed'), o.closed],
      [T('rp.exp.cancelled'), o.cancelled],
      [T('rp.exp.soldQty'), o.soldQty],
      [],
      [T('rp.exp.sec2')],
      [T('rp.exp.totalSum'), fi.totalSum],
      [T('rp.exp.commission'), fi.commission],
      [T('rp.exp.logistics'), fi.logistics],
      [T('rp.exp.netProfit'), fi.netProfit],
      [],
      [T('rp.exp.sec3')],
      [T('rp.exp.paidTotal'), fi.paidTotal],
      [T('rp.exp.payableRemaining'), fi.payableRemaining],
      [T('rp.exp.partialPaid'), fi.partialPaidSum],
      [],
      [T('rp.exp.sec4')],
      [T('rp.exp.retCount'), r.count],

      [T('rp.exp.sec5')],
      [T('rp.exp.defectReceived'), r.defect],

    const wsSummary = XLSX.utils.aoa_to_sheet(summary);
    wsSummary['!cols'] = [{ wch: 42 }, { wch: 24 }];

    const ordHeader = [T('rp.exp.colOrderId'), T('rp.exp.colDate'), T('rp.exp.colProduct'), T('rp.exp.colQty'), T('rp.exp.colPrice'), T('rp.exp.colTotal'), T('rp.exp.colStatus'), T('rp.exp.colSeller'), T('rp.exp.colPaymentStatus')];
    const ordRows = stats.rows.map((x) => [x.id, x.date, x.productName, x.qty, x.price, x.total, F.ORDER_STATUS_META[x.status].label, x.sellerName, F.PAYMENT_STATUS_META[x.paymentStatus] ? F.PAYMENT_STATUS_META[x.paymentStatus].label : x.paymentStatus]);
    const wsOrders = XLSX.utils.aoa_to_sheet([ordHeader].concat(ordRows));
    wsOrders['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 26 }, { wch: 8 }, { wch: 12 }, { wch: 14 }, { wch: 22 }, { wch: 20 }, { wch: 20 }];

    const prodHeader = [T('rp.exp.colProduct'), T('rp.exp.colSoldQty'), T('rp.exp.colSalesSum')];
    const prodRows = (stats.productBreakdown || []).map((p) => [p.name, p.qty, p.sales]);
    const wsProducts = XLSX.utils.aoa_to_sheet([prodHeader].concat(prodRows));
    wsProducts['!cols'] = [{ wch: 30 }, { wch: 16 }, { wch: 16 }];

    const sellHeader = [T('rp.exp.colSeller'), T('rp.exp.colOrdersCount'), T('rp.exp.colSalesSum'), T('rp.exp.colPaid'), T('rp.exp.colRemainingDebt')];
    const sellRows = (stats.sellerBreakdown || []).map((x) => [x.name, x.ordersCount, x.sales, x.paid, x.remaining]);
    const wsSellers = XLSX.utils.aoa_to_sheet([sellHeader].concat(sellRows));
    wsSellers['!cols'] = [{ wch: 24 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];

    const payHeader = [T('rp.exp.colOrderId'), T('rp.exp.colSeller'), T('rp.exp.colAmount'), T('rp.exp.colDate'), T('rp.exp.colComment')];
    const payRows = (stats.paymentsList || []).map((p) => [p.orderId, p.sellerName, p.amount, p.date, p.comment]);
    const wsPayments = XLSX.utils.aoa_to_sheet([payHeader].concat(payRows));
    wsPayments['!cols'] = [{ wch: 14 }, { wch: 22 }, { wch: 14 }, { wch: 12 }, { wch: 30 }];

    const clHeader = [T('rp.exp.colOrderId'), T('rp.exp.colProduct'), T('rp.exp.colCommissionPct'), T('rp.exp.colCommissionSum'), T('rp.exp.colLogisticsSum')];
    const clRows = (stats.commissionLogisticsRows || []).map((c) => [c.orderId, c.productName, c.commissionPct, c.commission, c.logistics]);
    const wsCommLog = XLSX.utils.aoa_to_sheet([clHeader].concat(clRows));
    wsCommLog['!cols'] = [{ wch: 14 }, { wch: 26 }, { wch: 12 }, { wch: 16 }, { wch: 16 }];

    const retHeader = [T('rp.exp.colOrderId'), T('rp.exp.colProduct'), T('rp.exp.colSku'), T('rp.exp.colSeller'), T('rp.exp.colOriginalQty'), T('rp.exp.colReturnedQty'), T('rp.exp.colValue'), T('rp.exp.colReason'), T('rp.exp.colDate')];
    const retRows = (stats.returnsList || []).map((x) => [x.orderId, x.productName, x.sku, x.sellerName, x.originalQty, x.qtyReturned, x.totalValue, x.reason, x.date]);
    const wsReturns = XLSX.utils.aoa_to_sheet([retHeader].concat(retRows));
    wsReturns['!cols'] = [{ wch: 14 }, { wch: 26 }, { wch: 14 }, { wch: 20 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 24 }, { wch: 12 }];

    const defHeader = [T('rp.exp.colOrderId'), T('rp.exp.colProduct'), T('rp.exp.colSku'), T('rp.exp.colReason'), T('rp.exp.colReceivedDate')];
    const defRows = (stats.defectsList || []).map((d) => [d.orderId, d.productName, d.sku, d.reason, d.receivedAt]);
    const wsDefects = XLSX.utils.aoa_to_sheet([defHeader].concat(defRows));
    wsDefects['!cols'] = [{ wch: 14 }, { wch: 26 }, { wch: 14 }, { wch: 24 }, { wch: 18 }];

    const whHeader = [T('rp.exp.colDate'), T('rp.exp.colTxType'), T('rp.exp.colProduct'), T('rp.exp.colSku'), T('rp.exp.colQty'), T('rp.exp.colBalanceAfter'), T('rp.exp.colComment')];
    const whRows = (stats.warehouseTxList || []).map((t) => [t.date, t.type, t.name, t.sku, t.qty, t.balanceAfter, t.note]);
    const wsWarehouse = XLSX.utils.aoa_to_sheet([whHeader].concat(whRows));
    wsWarehouse['!cols'] = [{ wch: 18 }, { wch: 10 }, { wch: 26 }, { wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 24 }];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsSummary, T('rp.exp.sheetSummary'));
    XLSX.utils.book_append_sheet(wb, wsOrders, T('rp.exp.sheetOrders'));
    XLSX.utils.book_append_sheet(wb, wsProducts, T('rp.exp.sheetProducts'));

    XLSX.utils.book_append_sheet(wb, wsReturns, T('rp.exp.sheetReturns'));

  function exportReportPdf(stats, periodLabel) {
    const JsPDFLib = window.jspdf && window.jspdf.jsPDF;
    if (!JsPDFLib) { OH.toast.error(OH.i18n.t('rp.pdfNotLoaded'), OH.i18n.t('rp.checkInternet')); return; }

    const lh = 24;
    function h1(text) { doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.text(text, marginX, y); y += 30; }
    function row(label, value) {
      doc.setFont('helvetica', 'normal'); doc.setFontSize(11.5);
      doc.text(String(label), marginX, y);
      doc.setFont('helvetica', 'bold');
      doc.text(String(value), marginX + 300, y);
      y += lh;

    h1(T('rp.pdfTitle'));
    doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
    doc.text(T('rp.pdfPeriod') + periodLabel, marginX, y); y += 26;
    doc.setDrawColor(220, 220, 220);

    y += 6;

    row(T('rp.exp.pdfOrdersCount'), o.total);

      OH.dom.qsa('#returns-range-tabs button').forEach((b) => b.addEventListener('click', () => {
        OH.dom.qsa('#returns-range-tabs button').forEach((x) => x.classList.remove('active'));
        b.classList.add('active');
        OH.api.getDashboardStats({ returnsRange: b.dataset.range }).then((rs) => {
          OH.dom.qs('#ret-val-val').textContent = F.money(rs.returnsValue);

            title: OH.i18n.t('rp.defectsModalTitle', { n: rows.length }),
            bodyHtml: rows.length ? rows.map((r) => `
              <div class="summary-row">
                <div>
                  <b>${OH.dom.escapeHtml(r.productName || '—')}</b><br/>
                  <span class="text-muted mono" style="font-size:11.5px">${r.orderId}${r.sku ? ' · ' + r.sku : ''}</span><br/>
                  <span class="text-muted" style="font-size:11.5px">${OH.dom.escapeHtml(r.reason || '—')} · ${F.dateTime(r.receivedAt)}</span>
                </div>
                <span class="badge badge-danger">1 ${OH.i18n.t('table.pcs')}</span>
              </div>`).join('') : `<p class="text-muted">${OH.i18n.t('rp.noDefectsYet')}</p>`,
            footHtml: `<button class="btn btn-secondary" id="defect-list-close">${OH.i18n.t('common.close')}</button><a href="#/warehouse" class="btn btn-primary" id="defect-list-goto">${OH.i18n.t('rp.gotoWarehouse')}</a>`,
            onMount: (m) => {
              m.querySelector('#defect-list-close').addEventListener('click', OH.modal.close);
              m.querySelector('#defect-list-goto').addEventListener('click', OH.modal.close);
            },
          });
        });
      });

      let currentReportStats = null;
      let currentReportLabel = '';

      function renderReport(stats, label) {
        currentReportStats = stats; currentReportLabel = label;
        OH.dom.qs('#rp-period-label').textContent = label;
        const o = stats.orders, fi = stats.finance, r = stats.returns;
        OH.dom.qs('#rp-orders-grid').innerHTML = [
          reportStatCard(OH.i18n.t('rp.card.totalOrders'), o.total),
          reportStatCard(OH.i18n.t('rp.card.newSent'), o.newSent),
          reportStatCard(OH.i18n.t('rp.card.accepted'), o.accepted),
          reportStatCard(OH.i18n.t('rp.card.inProgress'), o.inProgress),
          reportStatCard(OH.i18n.t('rp.card.delivered'), o.delivered, 'text-success'),
          reportStatCard(OH.i18n.t('rp.card.closed'), o.closed),
          reportStatCard(OH.i18n.t('rp.card.cancelled'), o.cancelled, 'text-danger'),
          reportStatCard(OH.i18n.t('rp.card.soldProducts'), o.soldQty + ' ' + OH.i18n.t('table.pcs')),
        ].join('');
        OH.dom.qs('#rp-finance-grid').innerHTML = [
          reportStatCard(OH.i18n.t('rp.card.netProfit'), F.money(fi.netProfit), fi.netProfit >= 0 ? 'text-success' : 'text-danger'),
          reportStatCard(OH.i18n.t('rp.card.totalOrdersSum'), F.money(fi.totalSum)),
          reportStatCard(OH.i18n.t('rp.card.commission'), F.money(fi.commission), 'text-warning'),
          reportStatCard(OH.i18n.t('rp.card.logistics'), F.money(fi.logistics), 'text-warning'),
          reportStatCard(OH.i18n.t('rp.card.paidToSellers'), F.money(fi.paidTotal), 'text-success'),
          reportStatCard(OH.i18n.t('rp.card.payableRemaining'), F.money(fi.payableRemaining), fi.payableRemaining > 0 ? 'text-danger' : ''),
          reportStatCard(OH.i18n.t('rp.card.partialPaid'), F.money(fi.partialPaidSum)),
        ].join('');
        OH.dom.qs('#rp-returns-grid').innerHTML = [
          reportStatCard(OH.i18n.t('rp.card.totalReturns'), r.count),
          reportStatCard(OH.i18n.t('rp.card.returnedProducts'), r.qty + ' ' + OH.i18n.t('table.pcs')),
          reportStatCard(OH.i18n.t('rp.card.returnedSum'), F.money(r.value)),
          reportStatCard(OH.i18n.t('rp.card.receivedToWarehouse'), r.received + ' ' + OH.i18n.t('table.pcs'), 'text-success'),
          reportStatCard(OH.i18n.t('rp.card.pendingReceive'), r.pending + ' ' + OH.i18n.t('table.pcs'), r.pending > 0 ? 'text-warning' : ''),
          reportStatCard(OH.i18n.t('rp.card.acceptedAsDefect'), r.defect + ' ' + OH.i18n.t('table.pcs'), r.defect > 0 ? 'text-danger' : ''),
        ].join('');
      }

      function loadReport() {
        const key = OH.dom.qs('#rp-range').value;
        const { start, end, label } = computeRangeDates(key, OH.dom.qs('#rp-start').value, OH.dom.qs('#rp-end').value);
        OH.api.getReportStats({ start, end }).then((stats) => renderReport(stats, label));
      }

      OH.dom.qs('#rp-range').addEventListener('change', () => {
        const isCustom = OH.dom.qs('#rp-range').value === 'custom';
        OH.dom.qs('#rp-start').style.display = isCustom ? '' : 'none';
        OH.dom.qs('#rp-end').style.display = isCustom ? '' : 'none';
        OH.dom.qs('#rp-dash').style.display = isCustom ? '' : 'none';
        if (!isCustom) loadReport();
      });
      OH.dom.qs('#rp-start').addEventListener('change', loadReport);
      OH.dom.qs('#rp-end').addEventListener('change', loadReport);
      loadReport();

      OH.dom.qs('#export-pdf').addEventListener('click', () => {
        if (!currentReportStats) return;
        exportReportPdf(currentReportStats, currentReportLabel);
        OH.toast.success(OH.i18n.t('rp.pdfReady'), OH.i18n.t('rp.pdfReadyDesc'));
      });
      OH.dom.qs('#export-excel').addEventListener('click', () => {
        if (!currentReportStats) return;
        exportReportExcel(currentReportStats, currentReportLabel);
        OH.toast.success(OH.i18n.t('rp.excelReady'), OH.i18n.t('rp.excelReadyDesc'));
      });
    });
  }

  OH.pages = OH.pages || {};
  OH.pages.reports = { mount };
})(window.OH = window.OH || {});

(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function skeleton() {
    return `
      <div class="page">
        <div class="kpi-grid">${OH.skeleton.cards(4)}</div>
        <div class="dash-grid"><div class="card card-pad">${OH.skeleton.bar('30%','16px')}${OH.skeleton.bar('100%','200px')}</div><div class="card card-pad">${OH.skeleton.bar('40%','16px')}${OH.skeleton.bar('100%','200px')}</div></div>
      </div>`;
  }

  function kpiCard(icon, iconBg, iconColor, label, value) {
    return `<div class="card card-pad kpi-card card-hover">
      <div class="kpi-top"><div class="kpi-icon" style="background:${iconBg};color:${iconColor}">${icon}</div></div>
      <div><div class="kpi-value">${value}</div><div class="kpi-label">${label}</div></div>
    </div>`;
  }

  // Sotuvchi paneliga har safar kirganda, oxirgi ko'rilganidan beri kelgan
  // "yangi" holatdagi buyurtmalar bo'lsa — ovozli signal beradi (eski
  // ilovadagi "ring tone" xatti-harakati).
  function checkNewOrderRing(sellerId, recentOrders) {
    const key = 'lastSeenOrder:' + sellerId;
    const lastSeenId = OH.storage.get(key, null);
    const newOnes = recentOrders.filter((o) => o.status === 'new');
    if (newOnes.length && newOnes[0].id !== lastSeenId) {
      OH.api.playRingTone();
      OH.toast.info(OH.i18n.t('sd.newOrderExists'), newOnes[0].productName);
    }
    if (recentOrders[0]) OH.storage.set(key, recentOrders[0].id);
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const sellerId = session.sellerId;
    container.innerHTML = skeleton();

    OH.api.getSellerStats(sellerId).then((s) => {
      const seller = s.seller || {};
      checkNewOrderRing(sellerId, s.recentOrders || []);
      container.innerHTML = `
        <div class="page">
          <div class="card card-pad" style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
            <div class="seller-avatar">${OH.dom.initials(seller.name || '').toUpperCase()}</div>
            <div style="flex:1">
              <div class="cell-main" style="font-size:15px">${OH.dom.escapeHtml(seller.name || '')}</div>
              <div class="cell-sub">${seller.phone || ''} · ${seller.id || ''}</div>
            </div>
            <span class="badge ${F.SELLER_STATUS_META[seller.status]?.cls || 'badge-success'}">${F.SELLER_STATUS_META[seller.status]?.label || OH.i18n.t('status.seller.active')}</span>
          </div>

          <div class="kpi-grid">
            ${kpiCard(I.orders, 'var(--info-bg)', 'var(--info)', OH.i18n.t('sd.todayOrders'), s.todayOrders)}
            ${kpiCard(I.truck, 'var(--warning-bg)', 'var(--warning)', OH.i18n.t('sd.activeOrders'), s.activeOrders)}
            ${kpiCard(I.check, 'var(--success-bg)', 'var(--success)', OH.i18n.t('sd.completed'), s.completedOrders)}
            ${kpiCard(I.x, 'var(--danger-bg)', 'var(--danger)', OH.i18n.t('sd.cancelled'), s.cancelledOrders)}
          </div>

          <div class="mini-stats">
            <div class="card card-pad mini-stat"><span>${OH.i18n.t('sd.totalSales')}</span><b class="mono">${F.money(s.totalSales)}</b></div>
            <div class="card card-pad mini-stat"><span>${OH.i18n.t('sd.netProfit')}</span><b class="mono text-success">${F.money(s.netProfit)}</b></div>
            <div class="card card-pad mini-stat"><span>${OH.i18n.t('sellers.debtLabel')}</span><b class="mono ${seller.debt > 0 ? 'text-danger' : 'text-success'}">${F.money(seller.debt || 0)}</b></div>
            <div class="card card-pad mini-stat"><span>${OH.i18n.t('sellers.paidLabel')}</span><b class="mono">${F.money(seller.paid || 0)}</b></div>
          </div>

          <div class="split-2">
            <div class="card card-pad">
              <div class="card-head"><h3>${OH.i18n.t('sd.recentOrdersTitle')}</h3><a href="#/orders" class="link">${OH.i18n.t('sd.all')}</a></div>
              <div class="table-wrap" style="border:none">

              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = () => { receiptData = reader.result; };
              reader.readAsDataURL(file);

            });
          },

            ${claim.receipt ? `<div class="field" style="margin-top:14px"><label>${OH.i18n.t('orders.receipt')}</label><img src="${claim.receipt}" style="width:100%;border-radius:12px" /></div>` : `<p class="text-muted">${OH.i18n.t('orders.noReceipt')}</p>`}`,
          footHtml: `<button class="btn btn-ghost" id="rp-reject">${I.x} ${OH.i18n.t('common.reject')}</button><button class="btn btn-primary" id="rp-confirm">${I.check} ${OH.i18n.t('common.accept')}</button>`,
          onMount: (m) => {

                title: OH.i18n.t('orders.rejectPaymentTitle'),
                bodyHtml: `<div class="field"><label>${OH.i18n.t('orders.reasonLabel')}</label><textarea class="input" id="rp-reason" rows="3" placeholder="${OH.i18n.t('orders.reasonPlaceholder')}"></textarea></div>`,
                footHtml: `<button class="btn btn-ghost" id="rp-reason-cancel">${OH.i18n.t('common.cancel')}</button><button class="btn btn-danger" id="rp-reason-ok">${OH.i18n.t('common.reject')}</button>`,
                onMount: (m2) => {
                  m2.querySelector('#rp-reason-cancel').addEventListener('click', OH.modal.close);
                  m2.querySelector('#rp-reason-ok').addEventListener('click', () => {
                    OH.api.rejectOrderPayment(claim.id, session.sellerId, m2.querySelector('#rp-reason').value.trim()).then(() => {
                      OH.modal.close(); OH.toast.info(OH.i18n.t('orders.paymentRejected')); load();

            });
            m.querySelector('#rp-confirm').addEventListener('click', () => {
              OH.api.confirmOrderPayment(claim.id, session.sellerId).then((res) => {
                OH.modal.close();
                if (!res || !res.ok) { OH.toast.error(OH.i18n.t('common.actionFailed')); load(); return; }
                OH.toast.success(OH.i18n.t('orders.paymentAccepted'), OH.i18n.t('orders.paymentAcceptedDesc', { id }));
                load();
              });
            });
          },
        });
      });
    }
  }

  OH.pages = OH.pages || {};

})(window.OH = window.OH || {});

        // "avval ombordan to'liq" standartiga qaytariladi. Qo'lda o'zgartirilgan bo'lsa, saqlanadi (faqat yangi maksimumga qisqartiriladi).
        const currentVal = whManuallyEdited && prevVal ? Math.min(maxUse, Math.max(0, +prevVal.value || 0)) : maxUse;
        whHolder.innerHTML = `
          <div class="wh-stock-note">${I.warehouse} ${OH.i18n.t('oc.warehouseAvailable', { n: warehouseAvailable })}</div>
          <div class="wh-use-row">
            <input type="number" class="input" id="wh-use-qty" min="0" max="${maxUse}" value="${currentVal}" placeholder="${OH.i18n.t('oc.warehouseUsePlaceholder')}" />
            <button type="button" class="btn btn-ghost btn-sm" id="wh-use-all">${OH.i18n.t('oc.useAllFromWarehouse', { n: maxUse })}</button>
          </div>
          <p class="hint">${OH.i18n.t('oc.warehouseHint')}</p>`;
        OH.dom.qs('#wh-use-qty').addEventListener('input', () => { whManuallyEdited = true; updateSummary(); });
        OH.dom.qs('#wh-use-all').addEventListener('click', () => {
          OH.dom.qs('#wh-use-qty').value = maxUse;
          whManuallyEdited = false;
          updateSummary();
        });
      }

      const whInput = OH.dom.qs('#wh-use-qty');
      const maxUse = selectedProduct ? Math.min(qty, warehouseAvailable) : 0;
      const warehouseQty = whInput ? Math.max(0, Math.min(maxUse, Math.floor(+whInput.value || 0))) : 0;
      const sellerQty = qty - warehouseQty;

      const fulfillHolder = OH.dom.qs('#s-fulfill-holder');
      fulfillHolder.innerHTML = warehouseQty > 0
        ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('oc.fulfillSource')}</span><span>
            <span class="fulfill-chip">${OH.i18n.t('oc.fromWarehouseChip', { n: warehouseQty })}</span> ${sellerQty > 0 ? `<span class="fulfill-chip seller">${OH.i18n.t('oc.toSellersChip', { n: sellerQty })}</span>` : ''}

      OH.dom.qs('#s-total').textContent = F.money(qty * price);
      OH.dom.qs('#seller-count').textContent = OH.i18n.t('oc.sellersSelectedCount', { n: selectedSellers.size });
      OH.dom.qs('#seller-trigger-label').textContent = selectedSellers.size ? OH.i18n.t('oc.sellersSelectedTrigger', { n: selectedSellers.size }) : OH.i18n.t('oc.chooseSellers');

      // Agar butun buyurtma Admin Omboridan qoplansa, sotuvchi tanlash shart emas.
      const sellerWrap = OH.dom.qs('#seller-select-wrap');
      if (sellerWrap) sellerWrap.style.opacity = sellerQty === 0 ? '.5' : '1';

    OH.dom.qs('#btn-create').addEventListener('click', () => {
      const qty = Math.max(1, +OH.dom.qs('#f-qty').value || 1);

      const whInput = OH.dom.qs('#wh-use-qty');
      const maxUse = Math.min(qty, warehouseAvailable);
      const warehouseQty = whInput ? Math.max(0, Math.min(maxUse, Math.floor(+whInput.value || 0))) : 0;
      const sellerQty = qty - warehouseQty;
      if (sellerQty > 0 && !selectedSellers.size) return OH.toast.error(OH.i18n.t('oc.sellerNotSelected'), OH.i18n.t('oc.sellerNotSelectedDesc'));
      OH.api.createOrder({
        productId: selectedProduct.id, qty, price: selectedProduct.costPrice,

        sellerIds: Array.from(selectedSellers), warehouseQty,

        if (order.warehouseQty && order.sellerQty === 0) {

          OH.toast.success(OH.i18n.t('oc.created'), OH.i18n.t('oc.createdBroadcast', { n: order.broadcastTo.length }));
        }
        location.hash = '#/orders';
      });
    });
  }

  OH.pages = OH.pages || {};

    // ✨ YANGI (v1.4): Dashboard'dagi "E'tibor talab qiladi" blokidan (#/proposals?status=new)
    // kelganda holat filtri avtomatik o'rnatiladi.
    const qs = new URLSearchParams(location.hash.split('?')[1] || '');
    const presetStatus = qs.get('status');
    if (presetStatus && F.PROPOSAL_STATUS_META[presetStatus]) OH.dom.qs('#pr-status').value = presetStatus;

    function load() {
      const filters = {
        q: OH.dom.qs('#pr-search').value.trim(),
        status: OH.dom.qs('#pr-status').value,
      };
      if (!isAdmin) filters.sellerId = session.sellerId;
      OH.api.listProposals(filters).then((rows) => {
        const tbody = OH.dom.qs('#pr-tbody');
        const pagBox = OH.dom.qs('#pr-pagination');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="${isAdmin ? 7 : 6}"><div class="empty-state">${I.fileText}<h4>${OH.i18n.t('proposals.notFound')}</h4>${isAdmin ? '' : `<p>${OH.i18n.t('proposals.notFoundSellerHint')}</p>`}</div></td></tr>`;
          pagBox.innerHTML = '';
          return;
        }
        const pager = OH.table.paginate(rows, 8, (slice) => { tbody.innerHTML = slice.map((p) => rowHtml(p, isAdmin)).join(''); bindRows(); });
        pager.renderPage();
        pager.renderControls(pagBox);
      });
    }

    function bindRows() {
      OH.dom.qsa('#pr-tbody tr[data-id]').forEach((tr) => {
        const id = tr.dataset.id;
        const openIt = () => OH.api.getProposal(id).then((p) => { if (p) (isAdmin ? openAdminDetail(p) : openSellerDetail(p)); });
        tr.querySelector('[data-act="view"]').addEventListener('click', openIt);
      });

    // -------------------- SOTUVCHI: yangi taklif yuborish --------------------
    function openNewProposalForm() {
      let images = [];
      OH.modal.open({
        title: OH.i18n.t('proposals.newProposalTitle'),
        size: 'lg',
        bodyHtml: `
          <div class="field"><label>${OH.i18n.t('proposals.field.name')}</label><input class="input" id="pf2-name" placeholder="${OH.i18n.t('proposals.namePlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.description')}</label><textarea class="input" id="pf2-description" rows="3" placeholder="${OH.i18n.t('proposals.descPlaceholder')}"></textarea></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.wholesalePrice')}</label><input type="number" min="0" class="input" id="pf2-price" placeholder="${OH.i18n.t('proposals.pricePlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.moq')}</label><input type="number" min="1" class="input" id="pf2-moq" placeholder="${OH.i18n.t('proposals.moqPlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.colors')}</label><input class="input" id="pf2-colors" placeholder="${OH.i18n.t('proposals.colorsPlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.sizes')}</label><input class="input" id="pf2-sizes" placeholder="${OH.i18n.t('proposals.sizesPlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.features')}</label><textarea class="input" id="pf2-features" rows="2" placeholder="${OH.i18n.t('proposals.featuresPlaceholder')}"></textarea></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.sellerComment')}</label><textarea class="input" id="pf2-comment" rows="2" placeholder="${OH.i18n.t('proposals.commentPlaceholder')}"></textarea></div>

            <input type="file" accept="image/*" multiple class="input" id="pf2-images-input" />
            <div id="pf2-images-preview" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px"></div>
            <div class="hint">${OH.i18n.t('proposals.imagesHint')}</div>
          </div>`,
        footHtml: `<button class="btn btn-ghost" id="pf2-cancel">${OH.i18n.t('common.cancel')}</button><button class="btn btn-primary" id="pf2-submit">${OH.i18n.t('proposals.submit')}</button>`,
        onMount: (m) => {
          m.querySelector('#pf2-cancel').addEventListener('click', OH.modal.close);

          function renderPreview() {
            const box = m.querySelector('#pf2-images-preview');
            const thumbs = images.map((src, idx) => `
              <div style="position:relative;width:66px;height:66px">
                <img src="${src}" style="width:66px;height:66px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" alt="" />
                <button type="button" class="icon-btn btn-sm" data-rm="${idx}" style="position:absolute;top:-8px;right:-8px;width:22px;height:22px;background:var(--danger);color:#fff;border:none">${I.x.replace(/width="\d+" height="\d+"/, 'width="12" height="12"')}</button>
              </div>`).join('');
            const counter = `<div class="text-muted" style="font-size:11.5px;align-self:center">${OH.i18n.t('proposals.imagesCount', { n: images.length, max: MAX_IMAGES })}</div>`;
            box.innerHTML = thumbs + counter;
            box.querySelectorAll('[data-rm]').forEach((btn) => btn.addEventListener('click', () => {
              images.splice(+btn.dataset.rm, 1);
              renderPreview();
            }));
          }
          m.querySelector('#pf2-images-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            const remaining = MAX_IMAGES - images.length;
            if (remaining <= 0) { OH.toast.error(OH.i18n.t('proposals.maxImagesError', { n: MAX_IMAGES })); e.target.value = ''; return; }
            const toAdd = files.slice(0, remaining);
            if (files.length > toAdd.length) OH.toast.info(OH.i18n.t('proposals.someImagesAdded', { n: toAdd.length }), OH.i18n.t('proposals.maxImagesDesc', { n: MAX_IMAGES }));
            toAdd.forEach((file) => {
              const reader = new FileReader();
              reader.onload = () => { images.push(reader.result); renderPreview(); };
              reader.readAsDataURL(file);
            });
            e.target.value = '';
          });
          renderPreview();

          m.querySelector('#pf2-submit').addEventListener('click', () => {
            const name = m.querySelector('#pf2-name').value.trim();
            const description = m.querySelector('#pf2-description').value.trim();
            const wholesalePrice = +m.querySelector('#pf2-price').value || 0;
            if (!name) return OH.toast.error(OH.i18n.t('proposals.nameRequired'));
            if (!description) return OH.toast.error(OH.i18n.t('proposals.descRequired'));
            if (!wholesalePrice) return OH.toast.error(OH.i18n.t('proposals.priceRequired'));
            OH.api.createProposal({
              sellerId: session.sellerId,
              name, description, wholesalePrice,
              moq: +m.querySelector('#pf2-moq').value || 1,
              colors: m.querySelector('#pf2-colors').value.split(',').map((s) => s.trim()).filter(Boolean),
              sizes: m.querySelector('#pf2-sizes').value.split(',').map((s) => s.trim()).filter(Boolean),
              features: m.querySelector('#pf2-features').value.trim(),
              sellerComment: m.querySelector('#pf2-comment').value.trim(),
              images,
            }).then(() => {
              OH.modal.close();
              OH.toast.success(OH.i18n.t('proposals.sent'), OH.i18n.t('proposals.sentDesc'));
              load();
            });
          });
        },
      });
    }

    // -------------------- SOTUVCHI: o'z taklifini ko'rish (faqat o'qish) --------------------
    function openSellerDetail(p) {
      const st = F.PROPOSAL_STATUS_META[p.status] || F.PROPOSAL_STATUS_META.new;
      OH.modal.open({
        title: p.name,
        size: 'lg',
        bodyHtml: `
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('table.status')}</span><span class="badge ${st.cls}">${st.label}</span></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.tableSentDate')}</span><b>${F.dateTime(p.createdAt)}</b></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.tableWholesalePrice')}</span><b class="mono">${F.money(p.wholesalePrice)}</b></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.field.moqUnit')}</span><b>${p.moq || 1} ${OH.i18n.t('table.pcs')}</b></div>
          ${p.colors && p.colors.length ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.field.colorsView')}</span><b>${OH.dom.escapeHtml(p.colors.join(', '))}</b></div>` : ''}
          ${p.sizes && p.sizes.length ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.field.sizesView')}</span><b>${OH.dom.escapeHtml(p.sizes.join(', '))}</b></div>` : ''}
          <div class="section-title-row" style="margin-top:6px"><h3>${OH.i18n.t('proposals.descriptionTitle')}</h3></div>
          <p style="font-size:13.5px;color:var(--text-secondary);line-height:1.6">${OH.dom.escapeHtml(p.description || '—')}</p>
          ${p.features ? `<div class="section-title-row"><h3>${OH.i18n.t('proposals.featuresTitle')}</h3></div><p style="font-size:13.5px;color:var(--text-secondary);line-height:1.6">${OH.dom.escapeHtml(p.features)}</p>` : ''}
          ${p.sellerComment ? `<div class="section-title-row"><h3>${OH.i18n.t('proposals.yourCommentTitle')}</h3></div><p style="font-size:13.5px;color:var(--text-secondary);line-height:1.6">${OH.dom.escapeHtml(p.sellerComment)}</p>` : ''}
          <div class="section-title-row"><h3>${OH.i18n.t('proposals.imagesTitle')}</h3></div>
          ${imagesGalleryHtml(p.images)}
          ${p.status === 'rejected' ? `<div class="field" style="background:var(--danger-bg);border-radius:10px;padding:12px 14px;margin-top:14px"><label style="color:var(--danger)">${OH.i18n.t('proposals.rejectReasonLabel')}</label><div style="font-size:13.5px;color:var(--danger)">${OH.dom.escapeHtml(p.rejectReason || '—')}</div></div>` : ''}
          ${p.status === 'accepted' ? `<div class="field" style="background:var(--success-bg);border-radius:10px;padding:12px 14px;margin-top:14px"><div style="font-size:13.5px;color:var(--success)">${OH.i18n.t('proposals.acceptedNotice')}</div></div>` : ''}`,
        footHtml: `<button class="btn btn-primary" id="psd-close">${OH.i18n.t('common.close')}</button>`,
        onMount: (m) => m.querySelector('#psd-close').addEventListener('click', OH.modal.close),
      });
    }

    // -------------------- ADMIN: taklifni ko'rish / tahrirlash / qabul-rad etish --------------------
    function openAdminDetail(p) {
      const st = F.PROPOSAL_STATUS_META[p.status] || F.PROPOSAL_STATUS_META.new;
      const editable = p.status === 'new' || p.status === 'reviewing';
      OH.modal.open({
        title: p.name,
        size: 'lg',
        bodyHtml: `
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('table.seller')}</span><b>${OH.dom.escapeHtml(p.sellerName || '—')}</b></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.tableSentDate')}</span><b>${F.dateTime(p.createdAt)}</b></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('table.status')}</span><span class="badge ${st.cls}">${st.label}</span></div>
          ${p.status === 'rejected' ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.rejectReasonLabel')}</span><b>${OH.dom.escapeHtml(p.rejectReason || '—')}</b></div>` : ''}
          ${p.status === 'accepted' ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('proposals.field.createdProduct')}</span><b class="mono">${OH.dom.escapeHtml(p.productId || '—')}</b></div>` : ''}

          <div class="section-title-row" style="margin-top:6px"><h3>${OH.i18n.t('proposals.imagesTitle')} (${(p.images || []).length}/${MAX_IMAGES})</h3></div>
          ${imagesGalleryHtml(p.images)}

          <div class="section-title-row" style="margin-top:10px"><h3>${OH.i18n.t('proposals.productInfoTitle')}</h3></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.name')}</label><input class="input" id="pad-name" value="${OH.dom.escapeHtml(p.name)}" ${editable ? '' : 'disabled'} /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.description')}</label><textarea class="input" id="pad-description" rows="3" ${editable ? '' : 'disabled'}>${OH.dom.escapeHtml(p.description || '')}</textarea></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.wholesalePrice')}</label><input type="number" min="0" class="input" id="pad-price" value="${p.wholesalePrice || 0}" ${editable ? '' : 'disabled'} /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.moq')}</label><input type="number" min="1" class="input" id="pad-moq" value="${p.moq || 1}" ${editable ? '' : 'disabled'} /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.colors')}</label><input class="input" id="pad-colors" value="${OH.dom.escapeHtml((p.colors || []).join(', '))}" ${editable ? '' : 'disabled'} /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.sizes')}</label><input class="input" id="pad-sizes" value="${OH.dom.escapeHtml((p.sizes || []).join(', '))}" ${editable ? '' : 'disabled'} /></div>
          <div class="field"><label>${OH.i18n.t('proposals.field.features')}</label><textarea class="input" id="pad-features" rows="2" ${editable ? '' : 'disabled'}>${OH.dom.escapeHtml(p.features || '')}</textarea></div>
          ${p.sellerComment ? `<div class="section-title-row"><h3>${OH.i18n.t('proposals.sellerCommentTitle')}</h3></div><p style="font-size:13.5px;color:var(--text-secondary);line-height:1.6">${OH.dom.escapeHtml(p.sellerComment)}</p>` : ''}`,
        footHtml: editable
          ? `<button class="btn btn-ghost" id="pad-close">${OH.i18n.t('common.close')}</button>
             ${p.status === 'new' ? `<button class="btn btn-secondary" id="pad-review">${OH.i18n.t('proposals.reviewAction')}</button>` : ''}
             <button class="btn btn-secondary" id="pad-save">${OH.i18n.t('proposals.saveEditsAction')}</button>
             <button class="btn btn-danger" id="pad-reject">${OH.i18n.t('common.reject')}</button>
             <button class="btn btn-primary" id="pad-accept">${OH.i18n.t('proposals.acceptAction')}</button>`
          : `<button class="btn btn-primary" id="pad-close">${OH.i18n.t('common.close')}</button>`,
        onMount: (m) => {
          m.querySelector('#pad-close').addEventListener('click', OH.modal.close);
          if (!editable) return;

          function readEdits() {
            return {
              name: m.querySelector('#pad-name').value.trim(),
              description: m.querySelector('#pad-description').value.trim(),
              wholesalePrice: +m.querySelector('#pad-price').value || 0,
              moq: +m.querySelector('#pad-moq').value || 1,
              colors: m.querySelector('#pad-colors').value.split(',').map((s) => s.trim()).filter(Boolean),
              sizes: m.querySelector('#pad-sizes').value.split(',').map((s) => s.trim()).filter(Boolean),
              features: m.querySelector('#pad-features').value.trim(),
            };
          }
          function validate(edits) {
            if (!edits.name) { OH.toast.error(OH.i18n.t('proposals.nameRequired')); return false; }
            if (!edits.description) { OH.toast.error(OH.i18n.t('proposals.descRequired')); return false; }
            if (!edits.wholesalePrice) { OH.toast.error(OH.i18n.t('proposals.priceRequired')); return false; }
            return true;
          }

          m.querySelector('#pad-review')?.addEventListener('click', () => {
            OH.api.setProposalStatus(p.id, 'reviewing').then(() => {
              OH.modal.close();
              OH.toast.success(OH.i18n.t('proposals.reviewing'));
              load();
            });
          });

          m.querySelector('#pad-save').addEventListener('click', () => {
            const edits = readEdits();
            if (!validate(edits)) return;
            OH.api.updateProposal(p.id, edits).then(() => {
              OH.modal.close();
              OH.toast.success(OH.i18n.t('proposals.dataSaved'));
              load();
            });
          });

          m.querySelector('#pad-accept').addEventListener('click', () => {
            const edits = readEdits();
            if (!validate(edits)) return;
            OH.api.acceptProposal(p.id, edits).then((res) => {
              OH.modal.close();
              if (res && res.ok) OH.toast.success(OH.i18n.t('proposals.addedToCatalog'), res.product.sku + ' — ' + res.product.name);
              load();
            });
          });

          m.querySelector('#pad-reject').addEventListener('click', () => {
            OH.modal.open({
              title: OH.i18n.t('proposals.rejectTitle'),
              bodyHtml: `<div class="field"><label>${OH.i18n.t('proposals.rejectReasonRequired')}</label><textarea class="input" id="padr-reason" rows="3" placeholder="${OH.i18n.t('proposals.rejectReasonPlaceholder')}"></textarea></div>`,
              footHtml: `<button class="btn btn-ghost" id="padr-cancel">${OH.i18n.t('common.cancel')}</button><button class="btn btn-danger" id="padr-ok">${OH.i18n.t('common.reject')}</button>`,
              onMount: (m2) => {
                m2.querySelector('#padr-cancel').addEventListener('click', OH.modal.close);
                m2.querySelector('#padr-ok').addEventListener('click', () => {
                  const reason = m2.querySelector('#padr-reason').value.trim();
                  if (!reason) return OH.toast.error(OH.i18n.t('proposals.rejectReasonMissing'));
                  OH.api.setProposalStatus(p.id, 'rejected', { rejectReason: reason }).then(() => {
                    OH.modal.close();
                    OH.toast.info(OH.i18n.t('proposals.rejected'), p.name);
                    load();
                  });
                });
              },
            });
          });
        },
      });
    }

    load();
  }

  OH.pages = OH.pages || {};
  OH.pages.proposals = { mount };
})(window.OH = window.OH || {});


/* ===== pages/sellers.js ===== */
(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function cardHtml(s) {
    const st = F.SELLER_STATUS_META[s.status];
    return `<div class="card seller-card card-hover" data-id="${s.id}" style="cursor:pointer">

      </div>
      <div class="summary-row"><span class="text-muted">${OH.i18n.t('sellers.debtLabel')}</span><b class="mono ${s.debt > 0 ? 'text-danger' : 'text-success'}">${F.money(s.debt)}</b></div>
      <div class="summary-row"><span class="text-muted">${OH.i18n.t('sellers.paidLabel')}</span><b class="mono">${F.money(s.paid)}</b></div>

      <div class="page-head"><div></div>

      </div>
      <div class="toolbar">

    </div>`;

    OH.dom.qs('#f-search').addEventListener('input', OH.dom.debounce(load, 300));
    OH.dom.qs('#f-status').addEventListener('change', load);
    OH.dom.qs('#btn-add-seller')?.addEventListener('click', () => openForm());
    load();

    function load() {
      OH.api.listSellers({ q: OH.dom.qs('#f-search').value.trim() }).then((rows) => {

          return;
        }
        grid.innerHTML = rows.map(cardHtml).join('');
        OH.dom.qsa('.seller-card').forEach((c) => c.addEventListener('click', () => openProfile(c.dataset.id)));
      });
    }

    function openForm(seller) {
      const isEdit = !!seller;
      OH.modal.open({
        title: isEdit ? OH.i18n.t('sellers.editTitle') : OH.i18n.t('sellers.newTitle'),
        bodyHtml: `

              </select>
            </div>
          </div>
          <div class="section-title-row"><h3>${OH.i18n.t('sellers.loginInfoTitle')}</h3></div>

(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  const CLAIM_STATUS_META = {
    sent: { key: 'payments.claimSent', cls: 'badge-info' },
    confirmed: { key: 'payments.claimConfirmed', cls: 'badge-success' },
    rejected: { key: 'payments.claimRejected', cls: 'badge-danger' },
  };
  Object.keys(CLAIM_STATUS_META).forEach((k) => {
    Object.defineProperty(CLAIM_STATUS_META[k], 'label', { get() { return OH.i18n.t(CLAIM_STATUS_META[k].key); }, enumerable: true, configurable: true });
  });

  // Har bir buyurtma uchun ixcham to'lov tarixi qatori — jami/to'langan/qoldiq
  // aniq ko'rinadi (masalan 130 000 dan 100 000 to'langan bo'lsa, 30 000 qoldi deb chiqadi).
  function historyRowHtml(r, isSeller) {
    const st = r.remaining <= 0 ? CLAIM_STATUS_META.confirmed : (r.pendingClaim ? CLAIM_STATUS_META.sent : { label: OH.i18n.t('payments.partialPaid'), cls: 'badge-warning' });
    const canPay = !isSeller && r.orderStatus === 'done' && r.remaining > 0 && !r.pendingClaim;
    const canReview = isSeller && !!r.pendingClaim;
    return `<tr data-order="${r.orderId}">
      <td data-label="${OH.i18n.t('payments.tableDate')}">${F.date(r.lastDate)}</td>
      <td data-label="${OH.i18n.t('payments.tableOrder')}"><div class="cell-main">${OH.dom.escapeHtml(r.productName || r.orderId)}</div><div class="cell-sub">${r.orderId}${!isSeller ? ' · ' + OH.dom.escapeHtml(r.sellerName) : ''}</div></td>
      <td data-label="${OH.i18n.t('payments.tableTotal')}" class="mono">${F.money(r.total)}</td>
      <td data-label="${OH.i18n.t('payments.tablePaid')}" class="mono text-success">${F.money(r.paid)}</td>
      <td data-label="${OH.i18n.t('payments.tableRemaining')}" class="mono ${r.remaining > 0 ? 'text-danger' : 'text-muted'}">${F.money(r.remaining)}</td>
      <td data-label="${OH.i18n.t('payments.tableStatus')}"><span class="badge ${st.cls}">${st.label}</span></td>
      <td data-label="${OH.i18n.t('table.actions')}"><div class="row-actions">
        ${canPay ? `<button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="pay" data-tip="${OH.i18n.t('orders.tooltipPay')}">${I.wallet}</button>` : ''}
        ${canReview ? `<button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="review" data-tip="${OH.i18n.t('common.confirm')}">${I.payments}</button>` : ''}
      </div></td>
    </tr>`;
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isSeller = session.role === 'seller';
    container.innerHTML = `<div class="page">
      <div class="page-head"><div><h1>${OH.i18n.t('payments.pageTitle')}</h1><div class="crumb">${isSeller ? OH.i18n.t('payments.crumbSeller') : OH.i18n.t('payments.crumbAdmin')}</div></div><div></div></div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>${OH.i18n.t('payments.tableDate')}</th><th>${OH.i18n.t('payments.tableOrder')}</th><th>${OH.i18n.t('payments.tableTotal')}</th><th>${OH.i18n.t('payments.tablePaid')}</th><th>${OH.i18n.t('payments.tableRemaining')}</th><th>${OH.i18n.t('payments.tableStatus')}</th><th>${OH.i18n.t('table.actions')}</th></tr></thead>
          <tbody id="ph-tbody">${OH.skeleton.tableRows(4, 7)}</tbody>
        </table>
      </div>
    </div>`;

    load();

    function load() {
      OH.api.listOrderPaymentHistory(isSeller ? { sellerId: session.sellerId } : {}).then((rows) => {
        const tbody = OH.dom.qs('#ph-tbody');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">${I.payments}<h4>${OH.i18n.t('payments.noHistory')}</h4><p>${isSeller ? OH.i18n.t('payments.noHistorySellerDesc') : OH.i18n.t('payments.noHistoryAdminDesc')}</p></div></td></tr>`;
          return;
        }
        tbody.innerHTML = rows.map((r) => historyRowHtml(r, isSeller)).join('');
        bindRows(rows);
      });
    }

    function bindRows(rows) {
      OH.dom.qsa('#ph-tbody tr[data-order]').forEach((tr) => {
        const orderId = tr.dataset.order;
        const r = rows.find((x) => x.orderId === orderId);
        tr.querySelector('[data-act="pay"]')?.addEventListener('click', () => openPay(r));
        tr.querySelector('[data-act="review"]')?.addEventListener('click', () => openReview(r));
      });
    }

    // Admin: buyurtmaning qoldiq summasini (yoki bir qismini) sotuvchiga to'laydi.
    function openPay(r) {
      let receiptData = null;
      OH.modal.open({
        title: OH.i18n.t('payments.payTitle', { id: r.orderId }),
        bodyHtml: `
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">${OH.i18n.t('payments.remainingDesc', { name: OH.dom.escapeHtml(r.sellerName) })} <b class="mono text-danger">${F.money(r.remaining)}</b></p>
          <div class="field"><label>${OH.i18n.t('orders.payAmountLabel')}</label><input type="number" class="input" id="pf-amount" value="${r.remaining}" max="${r.remaining}" min="1" /></div>
          <div class="field"><label>${OH.i18n.t('orders.field.commentOptional')}</label><input class="input" id="pf-comment" placeholder="${OH.i18n.t('orders.commentPlaceholder')}" /></div>
          <div class="field"><label>${OH.i18n.t('orders.receiptLabel')}</label><input type="file" accept="image/*" class="input" id="pf-file" /></div>`,
        footHtml: `<button class="btn btn-ghost" id="pf-cancel">${OH.i18n.t('common.cancel')}</button><button class="btn btn-primary" id="pf-ok">${OH.i18n.t('common.send')}</button>`,
        onMount: (m) => {
          m.querySelector('#pf-cancel').addEventListener('click', OH.modal.close);
          m.querySelector('#pf-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => { receiptData = reader.result; };
            reader.readAsDataURL(file);
          });
          m.querySelector('#pf-ok').addEventListener('click', () => {
            const amount = Math.min(r.remaining, Math.max(0, +m.querySelector('#pf-amount').value || 0));
            if (amount <= 0) return OH.toast.error(OH.i18n.t('orders.amountRequired'));
            if (!receiptData) return OH.toast.error(OH.i18n.t('orders.receiptRequired'), OH.i18n.t('orders.receiptRequiredDesc'));
            OH.api.sendOrderPayment(r.orderId, amount, m.querySelector('#pf-comment').value.trim(), receiptData).then((res) => {
              if (!res || !res.ok) { OH.modal.close(); OH.toast.error(OH.i18n.t('common.actionFailed')); load(); return; }
              OH.modal.close();
              OH.toast.success(OH.i18n.t('orders.paymentSent'), OH.i18n.t('orders.paymentSentDesc', { name: r.sellerName }));
              load();
            });
          });
        },
      });
    }

    // Sotuvchi: admin yuborgan to'lovni ko'rib chiqadi — tasdiqlasa (yoki qoldiq nolga tushsa) buyurtma yopiladi.
    function openReview(r) {
      const claim = r.pendingClaim;
      if (!claim) return;
      OH.modal.open({
        title: OH.i18n.t('orders.reviewPayTitle', { id: r.orderId }),
        bodyHtml: `
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('table.date')}</span><b>${F.date(claim.date)}</b></div>
          <div class="summary-row"><span class="text-muted">${OH.i18n.t('orders.field.amount')}</span><b class="mono">${F.money(claim.amount)}</b></div>
          ${claim.comment ? `<div class="summary-row"><span class="text-muted">${OH.i18n.t('orders.field.comment')}</span><b>${OH.dom.escapeHtml(claim.comment)}</b></div>` : ''}
          ${claim.receipt ? `<div class="field" style="margin-top:14px"><label>${OH.i18n.t('orders.receipt')}</label><img src="${claim.receipt}" style="width:100%;border-radius:12px" /></div>` : `<p class="text-muted">${OH.i18n.t('orders.noReceipt')}</p>`}`,
        footHtml: `<button class="btn btn-ghost" id="rp-reject">${I.x} ${OH.i18n.t('common.reject')}</button><button class="btn btn-primary" id="rp-confirm">${I.check} ${OH.i18n.t('common.accept')}</button>`,
        onMount: (m) => {
          m.querySelector('#rp-reject').addEventListener('click', () => {
            OH.modal.close();
            OH.modal.open({
              title: OH.i18n.t('orders.rejectPaymentTitle'),
              bodyHtml: `<div class="field"><label>${OH.i18n.t('orders.reasonLabel')}</label><textarea class="input" id="rp-reason" rows="3" placeholder="${OH.i18n.t('orders.reasonPlaceholder')}"></textarea></div>`,
              footHtml: `<button class="btn btn-ghost" id="rp-reason-cancel">${OH.i18n.t('common.cancel')}</button><button class="btn btn-danger" id="rp-reason-ok">${OH.i18n.t('common.reject')}</button>`,
              onMount: (m2) => {
                m2.querySelector('#rp-reason-cancel').addEventListener('click', OH.modal.close);
                m2.querySelector('#rp-reason-ok').addEventListener('click', () => {
                  OH.api.rejectOrderPayment(claim.id, session.sellerId, m2.querySelector('#rp-reason').value.trim()).then(() => {
                    OH.modal.close(); OH.toast.info(OH.i18n.t('orders.paymentRejected')); load();
                  });
                });
              },
            });
          });
          m.querySelector('#rp-confirm').addEventListener('click', () => {
            OH.api.confirmOrderPayment(claim.id, session.sellerId).then((res) => {
              OH.modal.close();
              if (!res || !res.ok) { OH.toast.error(OH.i18n.t('common.actionFailed')); load(); return; }
              OH.toast.success(OH.i18n.t('orders.paymentAccepted'));
              load();
            });
          });
        },
      });
    }
  }

  OH.pages = OH.pages || {};
  OH.pages.payments = { mount };
})(window.OH = window.OH || {});

    // ✨ YANGI (v1.4): Dashboard'dagi "E'tibor talab qiladi" blokidan (#/warehouse?tab=defects)

    let pager;

        defPager.renderControls(pagBox);

    OH.dom.qs('#def-search').addEventListener('input', OH.dom.debounce(loadDefects, 300));

    function bindRowActions() {
      OH.dom.qsa('#wh-tbody tr[data-id]').forEach((tr) => {

    function openHistory(productId) {
      OH.api.listWarehouseTransactions({ productId }).then((txs) => {

        OH.api.listWarehouseStock({ includeEmpty: true }).then((all) => {
          const stock = all.find((x) => x.productId === productId);
          const rows = txs.length ? txs.map((t) => `

(function (OH) {

  const I = OH.icons;
  const TYPE_META = {

    seller: { i: I.users, bg: 'var(--success-bg)', c: 'var(--success)', key: 'notif.typeSeller' },
    payment: { i: I.wallet, bg: 'var(--warning-bg)', c: 'var(--warning)', key: 'notif.typePayment' },
    cancel: { i: I.x, bg: 'var(--danger-bg)', c: 'var(--danger)', key: 'notif.typeCancel' },
  };
  Object.keys(TYPE_META).forEach((k) => {
    Object.defineProperty(TYPE_META[k], 'label', { get() { return OH.i18n.t(TYPE_META[k].key); }, enumerable: true, configurable: true });
  });

  function itemHtml(n) {
    const m = TYPE_META[n.type] || TYPE_META.order;
    return `<div class="notif-page-item">
      <div class="notif-item__icon" style="background:${m.bg};color:${m.c}">${m.i}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;gap:10px">
          <b style="font-size:13.3px">${OH.dom.escapeHtml(n.title)}</b>
          ${n.unread ? `<span class="badge badge-info">${OH.i18n.t('notif.new')}</span>` : ''}
        </div>
        <p class="text-muted" style="font-size:12.5px;margin-top:3px">${OH.dom.escapeHtml(n.desc)}</p>
        <span class="text-muted" style="font-size:11px">${n.time}</span>
      </div>
    </div>`;
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isAdmin = session.role !== 'seller';
    
    container.innerHTML = `<div class="page">
      <div class="page-head"><div></div><div class="page-head__actions"><button class="btn btn-secondary" id="mark-all">${OH.i18n.t('header.markAllRead')}</button></div></div>
      <!-- TUZATISH: Priority filter qo'shildi -->
      <div class="toolbar">
        <select class="select" id="f-priority">
          <option value="all">${OH.i18n.t('notif.allMessages')}</option>
          <option value="urgent">${OH.i18n.t('notif.urgent')}</option>
          <option value="unread">${OH.i18n.t('notif.unread')}</option>
        </select>
        ${isAdmin ? `<select class="select" id="f-target">
          <option value="all">${OH.i18n.t('notif.allTarget')}</option>
          <option value="ADMIN">${OH.i18n.t('notif.targetAdmin')}</option>
          <option value="SELLER">${OH.i18n.t('notif.targetSeller')}</option>
        </select>` : ''}
      </div>
      <div class="tabs" id="notif-tabs" style="margin-bottom:16px">
        <button class="tab active" data-type="all">${OH.i18n.t('notif.tabAll')}</button>
        <button class="tab" data-type="order">${OH.i18n.t('notif.typeOrder')}</button>
        <button class="tab" data-type="seller">${OH.i18n.t('notif.typeSeller')}</button>
        <button class="tab" data-type="payment">${OH.i18n.t('notif.typePayment')}</button>
        <button class="tab" data-type="cancel">${OH.i18n.t('notif.typeCancel')}</button>
      </div>
      <div class="card" id="notif-list">${OH.skeleton.tableRows(1, 5)}</div>
    </div>`;

    let type = 'all';
    OH.dom.qsa('#notif-tabs .tab').forEach((t) => t.addEventListener('click', () => {
      OH.dom.qsa('#notif-tabs .tab').forEach((x) => x.classList.remove('active'));
      t.classList.add('active'); type = t.dataset.type; load();
    }));
    OH.dom.qs('#mark-all').addEventListener('click', () => OH.api.markAllRead().then(() => { OH.toast.success(OH.i18n.t('header.markedAllRead')); load(); }));
    OH.dom.qs('#f-priority')?.addEventListener('change', load);
    OH.dom.qs('#f-target')?.addEventListener('change', load);

    load();
    function load() {
      OH.api.listNotifications().then((rows) => {
        let filtered = type === 'all' ? rows : rows.filter((n) => n.type === type);
        const priority = OH.dom.qs('#f-priority')?.value;
        if (priority === 'urgent') filtered = filtered.filter((n) => n.type === 'cancel' || n.type === 'payment');
        if (priority === 'unread') filtered = filtered.filter((n) => n.unread);
        // Admin panelida "Admin uchun / Sotuvchi uchun" bo'yicha qo'shimcha filtr
        const targetSel = OH.dom.qs('#f-target')?.value;
        if (targetSel && targetSel !== 'all') filtered = filtered.filter((n) => (n.target || 'ALL') === targetSel);
        const box = OH.dom.qs('#notif-list');
        box.innerHTML = filtered.length ? filtered.map(itemHtml).join('') : `<div class="empty-state">${I.bell}<h4>${OH.i18n.t('header.noNotifications')}</h4></div>`;
      });
    }
  }

  OH.pages = OH.pages || {};
  OH.pages.notifications = { mount };
})(window.OH = window.OH || {});
