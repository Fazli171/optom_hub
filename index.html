      if (!info.eligible) {
        OH.toast.error("Qaytarish mumkin emas", "Faqat yakunlangan/yopilgan yoki Admin omboridan yetkazilgan buyurtmalar uchun qaytarish rasmiylashtiriladi");
        return;
      }
      if (info.maxReturnable <= 0) {
        OH.toast.info("Qaytarish uchun mahsulot qolmadi", order.id + " bo'yicha butun miqdor allaqachon qaytarilgan");
        return;
      }
      OH.modal.open({
        title: 'Qaytarishni rasmiylashtirish — ' + order.id,
        bodyHtml: `
          <div class="return-flow-box">
            <div class="rf-row"><span class="text-muted">Mahsulot</span><b>${OH.dom.escapeHtml(info.order.productName)}</b></div>
            <div class="rf-row"><span class="text-muted">Yakunlangan miqdor</span><b>${info.originalQty} dona</b></div>
            <div class="rf-row"><span class="text-muted">Ilgari qaytarilgan</span><b>${info.alreadyReturned} dona</b></div>
            <div class="rf-row total"><span class="text-muted">Qaytarish mumkin (maksimal)</span><b>${info.maxReturnable} dona</b></div>
          </div>
          <div class="field"><label>Qaytarilgan miqdor</label><input type="number" class="input" id="rf-qty" min="1" max="${info.maxReturnable}" value="1" /></div>
          <div class="field"><label>Qaytarish sababi</label><select class="select" id="rf-reason">${REASONS.map((r) => `<option value="${OH.dom.escapeHtml(r)}">${OH.dom.escapeHtml(r)}</option>`).join('')}</select></div>
          <div class="field"><label>Qaytarilgan sana</label><input type="date" class="input" id="rf-date" value="${new Date().toISOString().slice(0, 10)}" /></div>
          <div class="field"><label>Izoh (ixtiyoriy)</label><textarea class="input" id="rf-note" rows="3" placeholder="Qo'shimcha tafsilotlar..."></textarea></div>`,
        footHtml: `<button class="btn btn-ghost" id="rf-cancel">Bekor qilish</button><button class="btn btn-primary" id="rf-ok">${I.check} Qaytarishni tasdiqlash</button>`,
        onMount: (m) => {
          m.querySelector('#rf-cancel').addEventListener('click', OH.modal.close);
          m.querySelector('#rf-ok').addEventListener('click', () => {
            const qty = Math.floor(+m.querySelector('#rf-qty').value || 0);
            if (qty < 1 || qty > info.maxReturnable) {
              OH.toast.error("Noto'g'ri miqdor", 'Miqdor 1 dan ' + info.maxReturnable + " donagacha bo'lishi kerak");
              return;
            }
            OH.api.createReturn(order.id, {
              qty, reason: m.querySelector('#rf-reason').value,
              date: m.querySelector('#rf-date').value, note: m.querySelector('#rf-note').value.trim(),
            }).then((res) => {
              if (!res || !res.ok) { OH.toast.error('Amalga oshmadi'); return; }
              OH.modal.close();
              OH.toast.success('Qaytarish rasmiylashtirildi', qty + ' dona — ' + order.id + " omborga qabul qilinishi kutilmoqda");
              if (onDone) onDone();
            });
          });
        },
      });
    });
  }

  // ---------------------------------------------------------------------
  // ✨ YANGI (v1.3): "Qaytarilgan tovarni Admin omboriga qabul qilish" oynasi.
  // Ikki usul: 1) QR-kodni kamera orqali skanerlash (qo'llab-quvvatlansa),
  // 2) Order ID ni qo'lda kiritib "Tekshirish" tugmasi bilan topish.
  // Har bir muvaffaqiyatli amal — FAQAT bitta dona omborga qabul qilinadi.
  // ---------------------------------------------------------------------
  let scanStream = null;
  let scanRAF = null;
  let scanDetector = null;
  let lastScanCode = '';
  let lastScanAt = 0;

  function stopScanner() {
    if (scanRAF) cancelAnimationFrame(scanRAF);
    scanRAF = null;
    if (scanStream) { scanStream.getTracks().forEach((t) => t.stop()); scanStream = null; }
    scanDetector = null;
  }

  function infoCardHtml(info) {
    if (!info) return '';
    const pct = info.totalReturned ? Math.round((info.receivedQty / info.totalReturned) * 100) : 0;
    return `<div class="return-flow-box" id="recv-info-box">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px">
          ${info.img ? `<img src="${OH.dom.escapeHtml(info.img)}" class="thumb" alt="" onerror="this.style.opacity='0'" />` : ''}
          <div><b>${OH.dom.escapeHtml(info.productName || '—')}</b><div class="text-muted mono" style="font-size:11.5px">${info.orderId}${info.sku ? ' · ' + info.sku : ''}</div></div>
        </div>
        <div class="rf-row"><span class="text-muted">Qaytarilgan jami</span><b>${info.totalReturned} dona</b></div>
        <div class="rf-row"><span class="text-muted">Omborga qabul qilingan</span><b class="text-success">${info.receivedQty} dona</b></div>
        <div class="rf-row"><span class="text-muted">Qabul qilinishi kutilmoqda</span><b class="${info.pendingQty ? 'text-warning' : ''}">${info.pendingQty} dona</b></div>
        <div class="rf-row"><span class="text-muted">Qaytarish sababi</span><b>${OH.dom.escapeHtml(info.reason || '—')}${info.isDefectReason ? ' <span class="badge badge-danger" style="margin-left:4px">Brak</span>' : ''}</b></div>
        <div class="rf-row total"><span class="text-muted">Holati</span><b>${pct}% qabul qilindi</b></div>
      </div>`;
  }

  function openReceiveModal(onChange) {
    OH.modal.open({
      title: 'Qaytarilgan tovarni omborga qabul qilish',
      bodyHtml: `
        <div class="scan-tabs" id="recv-tabs">
          <button type="button" class="active" data-tab="qr">${I.qrcode} QR skanerlash</button>
          <button type="button" data-tab="manual">${I.barcode} Order ID kiritish</button>
        </div>
        <div id="recv-tab-qr" class="recv-tab-panel">
          <div class="scan-camera-box" id="scan-camera-box">
            <video id="scan-video" playsinline muted></video>
            <div class="scan-frame"></div>
          </div>
          <p class="hint" id="scan-status">Kamerani ishga tushirish uchun ruxsat bering — QR-kodni ramka ichiga tuting.</p>
          <div id="scan-confirm-box"></div>
        </div>
        <div id="recv-tab-manual" class="recv-tab-panel" style="display:none">
          <div class="field"><label>Order ID</label>
            <div style="display:flex;gap:8px">
              <input class="input" id="recv-order-id" placeholder="Masalan: ORD-12345" autocomplete="off" />
              <button class="btn btn-secondary" id="recv-check" style="white-space:nowrap">Tekshirish</button>
            </div>
          </div>
          <div id="recv-manual-result"></div>
        </div>
      `,
      footHtml: `<button class="btn btn-ghost" id="recv-close">Yopish</button>`,
      onMount: (m) => {
        const closeAll = () => { stopScanner(); OH.modal.close(); };
        m.querySelector('#recv-close').addEventListener('click', closeAll);

        // ---- Tab almashtirish ----
        OH.dom.qsa('[data-tab]', m).forEach((btn) => btn.addEventListener('click', () => {
          OH.dom.qsa('[data-tab]', m).forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          m.querySelector('#recv-tab-qr').style.display = tab === 'qr' ? '' : 'none';
          m.querySelector('#recv-tab-manual').style.display = tab === 'manual' ? '' : 'none';
          if (tab === 'qr') startScanner(m); else stopScanner();
        }));

        // ---- Order ID qo'lda kiritish ----
        function renderManualResult(info) {
          const box = m.querySelector('#recv-manual-result');
          if (!info) { box.innerHTML = `<p class="hint" style="color:var(--danger)">Bu Order ID bo'yicha qaytarish topilmadi.</p>`; return; }
          box.innerHTML = infoCardHtml(info) + (info.pendingQty > 0
            ? `<button class="btn btn-primary" id="recv-manual-receive" style="width:100%">${I.check} Omborga qabul qilish (1 dona)</button>`
            : `<p class="hint" style="color:var(--success)">Ushbu qaytarish bo'yicha barcha mahsulotlar allaqachon qabul qilingan.</p>`);
          const btn = box.querySelector('#recv-manual-receive');
          if (btn) btn.addEventListener('click', () => receiveUnit(info.orderId, renderManualResult));
        }
        m.querySelector('#recv-check').addEventListener('click', () => {
          const id = m.querySelector('#recv-order-id').value.trim().toUpperCase();
          if (!id) return;
          OH.api.getReturnUnitsInfo(id).then(renderManualResult);
        });
        m.querySelector('#recv-order-id').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') m.querySelector('#recv-check').click();
        });

        // ---- Umumiy: bitta donani qabul qilish (ham QR, ham qo'lda kiritishdan chaqiriladi) ----
        function receiveUnit(orderId, thenRender) {
          return OH.api.receiveNextReturnUnit(orderId).then((res) => {
            if (!res.ok) {
              if (res.reason === 'all-received') OH.toast.error("Ushbu qaytarish bo'yicha barcha mahsulotlar allaqachon qabul qilingan");
              else OH.toast.error('Buyurtma topilmadi', orderId);
              return res;
            }
            if (res.defect) OH.toast.error('Brak sifatida qabul qilindi', orderId + ' — 1 dona (Admin ombori stockiga qo\'shilmadi)');
            else OH.toast.success('Omborga qabul qilindi', orderId + ' — 1 dona Admin omboriga qo\'shildi');
            if (thenRender) thenRender(res.info);
            if (onChange) onChange();
            return res;
          });
        }

        // ---- QR kamera skaneri ----
        // ✨ TUZATILDI: avvalgi versiya BarcodeDetector API mavjud bo'lmasa (Safari/iOS,
        // Firefox va boshqa ko'plab brauzerlarda shunday) kamerani UMUMAN ochmasdan
        // to'xtab qolar edi. Endi kamera har doim so'raladi; BarcodeDetector bo'lsa —
        // undan, bo'lmasa — jsQR (kadrlarni canvas orqali o'qib QR aniqlaydigan
        // universal kutubxona) orqali skanerlash davom etadi.
        //
        // ✨ TUZATILDI (2): avvalgi versiya QR-kodni aniqlashi bilan DARHOL (avtomatik)
        // omborga qabul qilar edi — shu sabab bitta QR-kodni kamera bir necha marta
        // ketma-ket aniqlab, xato ravishda 2 marta hisoblab qo'yishi mumkin edi. Endi
        // QR aniqlangach, skanerlash TO'XTAYDI va foydalanuvchiga mahsulot ma'lumoti
        // bilan birga "Qabul qilish" tugmasi ko'rsatiladi — faqat shu tugma bosilgach,
        // 1 dona omborga qabul qilinadi. Shundan keyingina skanerlash davom etadi.
        let scanCanvas = null;
        let scanCtx = null;
        let scanPaused = false;

        function resumeScanning() {
          scanPaused = false;
          lastScanCode = '';
          const box = m.querySelector('#scan-confirm-box');
          if (box) box.innerHTML = '';
          const statusEl = m.querySelector('#scan-status');
          if (statusEl) statusEl.textContent = "QR-kodni ramka ichiga tuting — avtomatik aniqlanadi.";
        }

        function showScanConfirm(code) {
          scanPaused = true;
          const statusEl = m.querySelector('#scan-status');
          const box = m.querySelector('#scan-confirm-box');
          if (statusEl) statusEl.textContent = 'Aniqlandi: ' + code;
          if (box) box.innerHTML = `<p class="hint">Tekshirilmoqda...</p>`;
          OH.api.getReturnUnitsInfo(code).then((info) => {
            if (!box) return;
            if (!info) {
              box.innerHTML = `<p class="hint" style="color:var(--danger)">Bu QR-kod (${OH.dom.escapeHtml(code)}) bo'yicha qaytarish topilmadi.</p>
                <button class="btn btn-secondary btn-block" id="scan-rescan">${I.refresh} Qayta skanerlash</button>`;
              box.querySelector('#scan-rescan').addEventListener('click', resumeScanning);
              return;
            }
            if (info.pendingQty <= 0) {
              box.innerHTML = infoCardHtml(info) +
                `<p class="hint" style="color:var(--success)">Ushbu qaytarish bo'yicha barcha mahsulotlar allaqachon qabul qilingan.</p>
                 <button class="btn btn-secondary btn-block" id="scan-rescan">${I.refresh} Qayta skanerlash</button>`;
              box.querySelector('#scan-rescan').addEventListener('click', resumeScanning);
              return;
            }
            box.innerHTML = infoCardHtml(info) +
              `<button class="btn btn-primary btn-block" id="scan-confirm-receive">${I.check} Omborga qabul qilish (1 dona)</button>
               <button class="btn btn-ghost btn-block" id="scan-rescan" style="margin-top:8px">Bekor qilish / qayta skanerlash</button>`;
            box.querySelector('#scan-confirm-receive').addEventListener('click', (e) => {
              const btn = e.currentTarget;
              if (btn.disabled) return; // ikki marta bosilib ketmasligi uchun
              btn.disabled = true;
              btn.textContent = 'Qabul qilinmoqda...';
              const rescanBtn = box.querySelector('#scan-rescan');
              if (rescanBtn) rescanBtn.disabled = true;
              receiveUnit(code, () => {}).then((res) => {
                // ✨ TUZATILDI: darhol qayta skanerlashga o'tish o'rniga, avval qisqa
                // "qabul qilindi" tasdig'ini ko'rsatamiz — shundan keyingina skaner
                // qayta ishga tushadi. Shu tarzda: 1 QR → 1 tugma → tasdiq → keyingi
                // tovarni skanerlang → yana 1 tugma ... barcha tovarlar qabul
                // qilinguncha shu tartibda davom etadi, hech qanday dona qo'shimcha
                // bosilmasdan yoki tasodifan ikki marta hisoblanmasdan.
                if (box) {
                  const remaining = res && res.info ? res.info.pendingQty : null;
                  box.innerHTML = `<p class="hint" style="color:var(--success)">${I.check} Qabul qilindi.${remaining != null ? (remaining > 0 ? ' Yana ' + remaining + " dona qoldi — keyingi tovarni skanerlang." : ' Barcha tovarlar qabul qilindi.') : ''}</p>`;
                }
                setTimeout(resumeScanning, 900);
              });
            });
            box.querySelector('#scan-rescan').addEventListener('click', resumeScanning);
          }).catch(() => {
            if (box) box.innerHTML = `<p class="hint" style="color:var(--danger)">Tekshirishda xatolik yuz berdi.</p>
              <button class="btn btn-secondary btn-block" id="scan-rescan">${I.refresh} Qayta skanerlash</button>`;
            box?.querySelector('#scan-rescan')?.addEventListener('click', resumeScanning);
          });
        }

        function handleScannedCode(rawCode) {
          if (scanPaused) return;
          const code = String(rawCode).trim().toUpperCase();
          const now = Date.now();
          if (code !== lastScanCode || now - lastScanAt > 2000) {
            lastScanCode = code; lastScanAt = now;
            showScanConfirm(code);
          }
        }

        // ✨ YANGI: bitta umumiy kadr-dekodlash funksiyasi (avval "tick" va "tick2" da
        // ikki marta nusxalangan edi — endi bitta joyda, xato ehtimoli kamroq).
        function decodeVideoFrame(video) {
          if (scanDetector) {
            scanDetector.detect(video).then((codes) => {
              if (codes && codes[0] && codes[0].rawValue) handleScannedCode(codes[0].rawValue);
            }).catch(() => {});
          } else if (window.jsQR && video.videoWidth) {
            if (!scanCanvas) { scanCanvas = document.createElement('canvas'); scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true }); }
            scanCanvas.width = video.videoWidth;
            scanCanvas.height = video.videoHeight;
            scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
            try {
              const imgData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
              const result = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
              if (result && result.data) handleScannedCode(result.data);
            } catch (e) { /* kadr hali tayyor emas — urinishda davom etamiz */ }
          }
        }

        function runScanLoop(video) {
          const tick = () => {
            if (!scanStream) return;
            if (scanPaused) { scanRAF = requestAnimationFrame(tick); return; }
            if (video.readyState >= video.HAVE_CURRENT_DATA) decodeVideoFrame(video);
            scanRAF = requestAnimationFrame(tick);
          };
          scanRAF = requestAnimationFrame(tick);
        }

        function openCamera(root, statusEl, video) {
          statusEl.textContent = 'Kamera ochilmoqda...';
          navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } }).then((stream) => {
            scanStream = stream;
            video.srcObject = stream;
            video.setAttribute('playsinline', 'true');
            video.setAttribute('autoplay', 'true');
            video.play().catch(() => {});
            statusEl.textContent = "QR-kodni ramka ichiga tuting — avtomatik aniqlanadi.";
            runScanLoop(video);
          }).catch((err) => {
            const name = err && err.name;
            if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
              statusEl.textContent = "Kameraga ruxsat berilmadi. Brauzer sozlamalaridan kameraga ruxsat bering yoki \"Order ID kiritish\" bo'limidan foydalaning.";
            } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
              statusEl.textContent = "Kamera topilmadi — \"Order ID kiritish\" bo'limidan foydalaning.";
            } else if (name === 'NotReadableError') {
              statusEl.textContent = "Kamera boshqa ilova tomonidan band — uni yopib qayta urinib ko'ring yoki \"Order ID kiritish\" bo'limidan foydalaning.";
            } else if (name === 'OverconstrainedError') {
              // Ba'zi qurilmalarda orqa kamera (`environment`) so'rovi rad etiladi — istalgan
              // mavjud kamerani so'rab qayta urinamiz.
              navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                scanStream = stream; video.srcObject = stream; video.play().catch(() => {});
                statusEl.textContent = "QR-kodni ramka ichiga tuting — avtomatik aniqlanadi.";
                runScanLoop(video);
              }).catch(() => { statusEl.textContent = "Kameraga kirishda xatolik yuz berdi — \"Order ID kiritish\" bo'limidan foydalaning."; });
            } else {
              statusEl.textContent = "Kameraga kirishda xatolik yuz berdi — \"Order ID kiritish\" bo'limidan foydalaning.";
            }
          });
        }

        // ✨ TUZATILDI (3): ASOSIY XATO SHU YERDA EDI — agar hech qanday QR-dekoder
        // (BarcodeDetector ham, jsQR ham) topilmasa, avvalgi kod ogohlantirish matnini
        // BIR ZUM ko'rsatib, DARHOL "Kamera ochilmoqda..." va "QR-kodni ramka ichiga
        // tuting" matnlari bilan ustidan yozib yuborar, so'ng kamerani baribir ochib
        // yuborar edi. Natijada kamera go'yo ishlayotgandek ko'rinar, lekin dekoder
        // yo'qligi sababli QR-kodni HECH QACHON aniqlay olmas edi — foydalanuvchi esa
        // "ramka ichiga tutayapman, lekin tasdiqlamayapti" holatida qolib ketardi.
        // Endi: dekoder mavjudligi (kerak bo'lsa — jsQR'ni qayta yuklashga urinib)
        // KAMERA OCHILISHIDAN OLDIN aniq tekshiriladi; agar haqiqatan ham mavjud
        // bo'lmasa, o'zgarmas (ustidan yozilmaydigan) xato va "Qayta urinish" tugmasi
        // ko'rsatiladi, kamera esa bekorga ochilmaydi.
        function ensureDecoder(statusEl) {
          const hasNativeDetector = 'BarcodeDetector' in window;
          if (hasNativeDetector && !scanDetector) {
            try { scanDetector = new window.BarcodeDetector({ formats: ['qr_code'] }); }
            catch (e) { scanDetector = null; }
          }
          if (scanDetector || window.jsQR) return Promise.resolve(true);
          if (!window.OH_ensureLib) return Promise.resolve(false);
          statusEl.textContent = 'QR-dekoder yuklanmoqda...';
          return window.OH_ensureLib(() => !!window.jsQR, 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js');
        }

        function showDecoderError(root, statusEl) {
          statusEl.textContent = "QR-dekoder yuklanmadi (internet aloqasini tekshiring). Kamera ishga tushirilmadi.";
          const box = root.querySelector('#scan-confirm-box');
          if (box) {
            box.innerHTML = `<button class="btn btn-secondary btn-block" id="scan-decoder-retry">${I.refresh} Qayta urinish</button>
              <p class="hint" style="margin-top:8px">Yoki "Order ID kiritish" bo'limidan foydalaning.</p>`;
            const retryBtn = box.querySelector('#scan-decoder-retry');
            if (retryBtn) retryBtn.addEventListener('click', () => { box.innerHTML = ''; startScanner(root); });
          }
        }

        function startScanner(root) {
          const statusEl = root.querySelector('#scan-status');
          const video = root.querySelector('#scan-video');
          scanPaused = false;
          root.querySelector('#scan-confirm-box').innerHTML = '';

          // ✨ MUHIM: kamera faqat "xavfsiz manba"da ishlaydi — https://, localhost yoki
          // haqiqiy file:// (ba'zi brauzerlarda). Agar sahifa content://downloads kabi
          // Android "Fayllar" ilovasi orqali to'g'ridan-to'g'ri ochilgan bo'lsa yoki oddiy
          // http:// orqali ochilgan bo'lsa, brauzer ruxsat so'rovini UMUMAN chiqarmaydi —
          // bu HTML/JS kod bilan tuzatib bo'lmaydigan brauzer xavfsizlik qoidasi.
          if (window.isSecureContext === false) {
            statusEl.textContent = "Kamera ishlashi uchun sahifa xavfsiz manzil (https://) orqali ochilishi kerak. Hozir fayl to'g'ridan-to'g'ri (masalan, Fayllar ilovasi orqali) ochilgan — shu sabab brauzer ruxsat so'ramayapti. Saytni haqiqiy https:// domenga joylab oching (masalan, Netlify/GitHub Pages) yoki hozircha \"Order ID kiritish\" bo'limidan foydalaning.";
            return;
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusEl.textContent = "Ushbu qurilma/brauzerda kameraga kirish imkoni yo'q — \"Order ID kiritish\" bo'limidan foydalaning.";
            return;
          }

          statusEl.textContent = 'Tekshirilmoqda...';
          ensureDecoder(statusEl).then((ok) => {
            if (!ok) { showDecoderError(root, statusEl); return; }
            openCamera(root, statusEl, video);
          });
        }

        startScanner(m);
      },
      onClose: stopScanner,
    });
  }

  OH.returnsUI = { openReturnForm, openReceiveModal };
})(window.OH = window.OH || {});


/* ===== components/skeleton.js ===== */
(function (OH) {
  'use strict';

  function bar(w, h) {
    return `<div class="skel" style="width:${w || '100%'};height:${h || '14px'};margin-bottom:8px"></div>`;
  }

  function tableRows(cols, rows) {
    let html = '';
    for (let r = 0; r < (rows || 5); r++) {
      html += '<tr>';
      for (let c = 0; c < cols; c++) html += `<td>${bar(c === 0 ? '70%' : '50%', '13px')}</td>`;
      html += '</tr>';
    }
    return html;
  }

  function cards(n) {
    let html = '';
    for (let i = 0; i < n; i++) {
      html += `<div class="card card-pad">${bar('40%', '12px')}${bar('60%', '22px')}${bar('80%', '10px')}</div>`;
    }
    return html;
  }

  OH.skeleton = { bar, tableRows, cards };
})(window.OH = window.OH || {});


/* ===== components/charts.js ===== */
(function (OH) {
  'use strict';

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  /** Draws a smooth-ish line chart with gradient fill onto a canvas element. */
  function drawLineChart(canvas, labels, values, opts) {
    opts = opts || {};
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    const padL = 44, padR = 12, padT = 14, padB = 26;
    const max = Math.max(...values) * 1.15 || 1;
    const min = 0;
    const stepX = (W - padL - padR) / (values.length - 1 || 1);
    const accent = opts.color || '#E8A33D';
    const gridColor = cssVar('--border') || '#eee';
    const textColor = cssVar('--text-muted') || '#999';

    // grid
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1; ctx.font = '10.5px Inter, sans-serif'; ctx.fillStyle = textColor;
    const gridLines = 4;
    for (let i = 0; i <= gridLines; i++) {
      const y = padT + ((H - padT - padB) / gridLines) * i;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
      const val = max - (max / gridLines) * i;
      ctx.fillText(OH.format.numShort(val), 4, y + 3);
    }

    // points
    const pts = values.map((v, i) => ({
      x: padL + stepX * i,
      y: padT + (H - padT - padB) * (1 - (v - min) / (max - min || 1)),
    }));

    // gradient fill
    const grad = ctx.createLinearGradient(0, padT, 0, H - padB);
    grad.addColorStop(0, hexToRgba(accent, 0.35));
    grad.addColorStop(1, hexToRgba(accent, 0.02));
    ctx.beginPath();
    ctx.moveTo(pts[0].x, H - padB);
    pts.forEach((p) => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length - 1].x, H - padB);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // line
    ctx.beginPath();
    pts.forEach((p, i) => (i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)));
    ctx.strokeStyle = accent; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.stroke();

    // points dots
    pts.forEach((p) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.2, 0, Math.PI * 2);
      ctx.fillStyle = cssVar('--surface') || '#fff'; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = accent; ctx.stroke();
    });

    // x labels
    ctx.fillStyle = textColor; ctx.font = '10.5px Inter, sans-serif'; ctx.textAlign = 'center';
    labels.forEach((l, i) => ctx.fillText(l, pts[i].x, H - 8));
    ctx.textAlign = 'left';
  }

  function hexToRgba(hex, a) {
    const h = hex.replace('#', '');
    const bigint = parseInt(h.length === 3 ? h.split('').map((c) => c + c).join('') : h, 16);

      <svg viewBox="0 0 ${size} ${size}">
        <circle class="ring-track" cx="${size / 2}" cy="${size / 2}" r="${r}"></circle>
        <circle class="ring-value" cx="${size / 2}" cy="${size / 2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>

(function (OH) {
  'use strict';

  /**
   * Creates a pagination controller.
   * @param {Array} allRows full dataset
   * @param {number} pageSize
   * @param {(pageRows:Array)=>void} onRender called with the current page slice
   */
  function paginate(allRows, pageSize, onRender) {
    let page = 1;
    const totalPages = () => Math.max(1, Math.ceil(allRows.length / pageSize));

    function renderControls(container) {
      const tp = totalPages();
      if (!allRows.length) { container.innerHTML = ''; return; }
      let pages = '';
      for (let i = 1; i <= tp; i++) {
        if (i === 1 || i === tp || Math.abs(i - page) <= 1) {
          pages += `<button class="page-btn ${i === page ? 'active' : ''}" data-page="${i}">${i}</button>`;
        } else if (Math.abs(i - page) === 2) {
          pages += `<span class="text-muted" style="padding:0 2px">…</span>`;
        }
      }
      const start = (page - 1) * pageSize + 1;
      const end = Math.min(allRows.length, page * pageSize);
      container.innerHTML = `
        <span class="text-muted" style="font-size:12px">${start}–${end} / jami ${allRows.length} ta</span>
        <div class="pagination__pages">
          <button class="page-btn" id="pg-prev" ${page === 1 ? 'disabled' : ''}>${OH.icons.chevronLeft}</button>
          ${pages}
          <button class="page-btn" id="pg-next" ${page === tp ? 'disabled' : ''}>${OH.icons.chevronRight}</button>
        </div>`;
      container.querySelectorAll('[data-page]').forEach((b) => b.addEventListener('click', () => go(+b.dataset.page)));
      container.querySelector('#pg-prev')?.addEventListener('click', () => go(page - 1));
      container.querySelector('#pg-next')?.addEventListener('click', () => go(page + 1));
    }

    function go(p) {
      page = Math.min(Math.max(1, p), totalPages());
      renderPage();
    }
    function renderPage() {
      const slice = allRows.slice((page - 1) * pageSize, page * pageSize);
      onRender(slice, page);
    }

    return { renderControls, go, renderPage, get page() { return page; } };
  }

  OH.table = { paginate };
})(window.OH = window.OH || {});

  function loadExtra() {
    EXTRA_KEYS.forEach((key) => {
      const saved = OH.storage.get(key, null);
      if (Array.isArray(saved)) {
        D[key].length = 0;
        saved.forEach((item) => D[key].push(item));
      }
    });
  }
  function persistExtra() {
    EXTRA_KEYS.forEach((key) => OH.storage.set(key, D[key]));
  }

  function init() {
    OH.storage.remove(DB_KEY);
    loadExtra();
    return delay(true);
  }

  function addNotification(type, title, desc, target, sellerId, details) {
    // TUZATISH: Notifications tizimiga targeting (target + sellerId) va details qo'shildi.
    // target: 'ALL' (eski/umumiy), 'ADMIN' (faqat admin paneli), 'SELLER' (faqat sellerId'ga mos sotuvchi).
    const notif = { 
      id: uid('N'), 
      type, 
      title, 
      desc, 
      time: 'hozirgina', 
      unread: true,
      target: target || 'ALL', // 'ALL', 'ADMIN', 'SELLER'
      sellerId: sellerId || null, // target === 'SELLER' bo'lganda aynan shu sotuvchiga tegishli
      timestamp: new Date().toISOString(),
      details: details || {} // Keng ma'lumot uchun
    };
    D.notifications.unshift(notif);
    // Muhim bildirishnomalarni localStorage'da saqlab qo'yish
    if (type === 'cancel' || type === 'payment' || target === 'ADMIN') {
      const urgent = JSON.parse(localStorage.getItem('urgent_notifications') || '[]');
      urgent.push(notif);
      localStorage.setItem('urgent_notifications', JSON.stringify(urgent.slice(-50)));
    }
  }

  // -------------------- OVOZLI SIGNAL (yangi buyurtma uchun) --------------------
  // Eski ilovadagi "ring tone" — sotuvchi paneliga yangi buyurtma tushganda
  // qisqa ovozli signal beradi (WebAudio orqali, fayl kerak emas).
  function playRingTone() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.4);
    } catch (e) { /* audio yo'q — jim o'tkazamiz */ }
  }

  OH.api = {
    init,

    // ---------- AUTH ----------
    login(login, password, role) {
      role = role || 'admin';
      if (role === 'seller') {
        const seller = D.sellers.find((s) => s.login === login && s.password === password);
        return delay(seller ? { token: 'demo-token', name: seller.name, role: 'seller', roleLabel: 'Sotuvchi', sellerId: seller.id } : null)
          .then((res) => { if (!res) throw new Error('invalid'); return res; });
      }
      const auth = D.adminAuth || { login: 'admin', password: '12345' };
      const ok = login === auth.login && password === auth.password;
      return delay(ok ? { token: 'demo-token', name: 'Administrator', role: 'admin', roleLabel: 'Bosh admin' } : null)
        .then((res) => { if (!res) throw new Error('invalid'); return res; });
    },

    changePassword(oldPassword, newPassword) {
      const auth = D.adminAuth || { login: 'admin', password: '12345' };
      if (auth.password !== oldPassword) return Promise.reject(new Error('wrong-password'));
      auth.password = newPassword;
      D.adminAuth = auth;
      queueSave();
      return delay(true);
    },

    // ---------- DASHBOARD ----------
    getDashboardStats(scope) {
      scope = scope || {};
      let orders = D.orders;
      if (scope.sellerId) orders = orders.filter((o) => o.sellerId === scope.sellerId);

      const today = new Date().toISOString().slice(0, 10);
      const activeStatuses = ['new', 'processing', 'shipping'];
      const todays = orders.filter((o) => o.date === today);
      const active = orders.filter((o) => activeStatuses.includes(o.status));
      const done = orders.filter((o) => o.status === 'done');
      const cancelled = orders.filter((o) => o.status === 'cancelled');
      const valid = orders.filter((o) => o.status !== 'cancelled' && o.status !== 'pending');

      const totalSales = valid.reduce((s, o) => s + o.total, 0);
      const dailySales = todays.reduce((s, o) => s + o.total, 0);

      let commission = 0, logistics = 0, packaging = 0, ads = 0, otherCosts = 0, cogs = 0;
      valid.forEach((o) => {
        const p = D.products.find((x) => x.id === o.productId) || {};
        const commissionPct = p.commissionPct != null ? p.commissionPct : 8;
        commission += o.total * (commissionPct / 100);
        logistics += (p.logisticsCost || 0) * o.qty;
        packaging += (p.packagingCost || 0) * o.qty;
        ads += (p.adCost || 0) * o.qty;
        otherCosts += (p.otherCost || 0) * o.qty;
        cogs += (p.costPrice || 0) * o.qty;
      });
      commission = Math.round(commission); logistics = Math.round(logistics);
      packaging = Math.round(packaging); ads = Math.round(ads);
      otherCosts = Math.round(otherCosts); cogs = Math.round(cogs);
      const netProfit = totalSales - commission - logistics - packaging - ads - otherCosts - cogs;

      const unpaid = orders.filter((o) => o.paymentStatus === 'unpaid').reduce((s, o) => s + o.total, 0);
      const activeSellers = D.sellers.filter((s) => s.status === 'active').length;

      const bySeller = {};
      valid.forEach((o) => { bySeller[o.sellerId] = (bySeller[o.sellerId] || 0) + o.total; });
      let topSeller = null;
      Object.keys(bySeller).forEach((id) => {
        if (!topSeller || bySeller[id] > bySeller[topSeller.id]) {
          const s = D.sellers.find((x) => x.id === id);
          if (s) topSeller = { id, name: s.name, total: bySeller[id] };
        }
      });

      const byProduct = {};
      valid.forEach((o) => { byProduct[o.productId] = (byProduct[o.productId] || 0) + o.qty; });
      let bestProduct = null, worstProduct = null;
      Object.keys(byProduct).forEach((id) => {
        const p = D.products.find((x) => x.id === id);
        if (!p) return;
        const qty = byProduct[id];
        if (!bestProduct || qty > bestProduct.qty) bestProduct = { id, name: p.name, qty };
        if (!worstProduct || qty < worstProduct.qty) worstProduct = { id, name: p.name, qty };
      });

      // ✨ YANGI: Qo'shimcha analytika
      const totalExpenses = commission + logistics + packaging + ads + otherCosts + cogs;
      const profitMargin = totalSales > 0 ? Math.round((netProfit / totalSales) * 100) : 0;
      const conversionRate = orders.length > 0 ? Math.round((valid.length / orders.length) * 100) : 0;
      const avgOrderValue = valid.length > 0 ? Math.round(totalSales / valid.length) : 0;
      const repeatCustomers = D.sellers.filter((s) => (bySeller[s.id] || 0) > 1).length;
      
      // ✨ YANGI: Savdo dinamikasi (oxirgi 7 kun)
      const salesTrend = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().slice(0, 10);
        const dayOrders = valid.filter((o) => o.date === dateStr);
        const daySales = dayOrders.reduce((s, o) => s + o.total, 0);
        salesTrend.push({ date: date.toLocaleDateString('uz-UZ', { weekday: 'short' }), sales: daySales, orders: dayOrders.length });
      }
      
      // ✨ YANGI: Sotuvchi performance
      const sellerPerformance = Object.keys(bySeller).map((sid) => {
        const s = D.sellers.find((x) => x.id === sid);
        return { id: sid, name: s ? s.name : 'Unknown', sales: bySeller[sid], orders: valid.filter((o) => o.sellerId === sid).length };
      }).sort((a, b) => b.sales - a.sales).slice(0, 5);
      
      // ✨ YANGI: Mahsulot performance
      const productPerformance = Object.keys(byProduct).map((pid) => {
        const p = D.products.find((x) => x.id === pid);
        const pOrders = valid.filter((o) => o.productId === pid);
        const pSales = pOrders.reduce((s, o) => s + o.total, 0);
        return { id: pid, name: p ? p.name : 'Unknown', qty: byProduct[pid], sales: pSales };
      }).sort((a, b) => b.qty - a.qty).slice(0, 5);

      // ✨ YANGI (v1.2): Qaytarishlar va Admin Ombori statistikasi.
      // MUHIM: bu ikkalasi FAQAT alohida ko'rsatiladigan ma'lumot — umumiy savdo (totalSales)
      // va sof foyda (netProfit) hisob-kitobiga HECH QANDAY ta'sir qilmaydi (ular yuqorida,
      // o'zgarishsiz hisoblab bo'lingan). scope.returnsRange ('today'|'week'|'month'|'all')
      // faqat "Qaytarilgan tovarlar summasi" ko'rsatkichiga ta'sir qiladi.
      const returnsRange = scope.returnsRange || 'all';
      const now = new Date();
      let rangeStart = null;
      if (returnsRange === 'today') { rangeStart = new Date(now); rangeStart.setHours(0, 0, 0, 0); }
      else if (returnsRange === 'week') { rangeStart = new Date(now); rangeStart.setDate(rangeStart.getDate() - 7); }
      else if (returnsRange === 'month') { rangeStart = new Date(now); rangeStart.setMonth(rangeStart.getMonth() - 1); }
      let returnsInScope = D.returns.slice();
      if (rangeStart) returnsInScope = returnsInScope.filter((r) => new Date(r.createdAt) >= rangeStart);
      const returnsQty = returnsInScope.reduce((s, r) => s + r.qtyReturned, 0);
      const returnsValue = returnsInScope.reduce((s, r) => s + r.totalValue, 0);

      // Admin Omborida HOZIR turgan tovarlarning umumiy qiymati (joriy holat — sana bilan filtrlanmaydi).
      const warehouseQtyTotal = D.warehouseStock.reduce((s, w) => s + w.qty, 0);
      const warehouseValue = D.warehouseStock.reduce((s, w) => {
        const product = D.products.find((p) => p.id === w.productId);
        const unitPrice = product ? product.costPrice : 0;
        return s + unitPrice * w.qty;
      }, 0);
      // ✨ YANGI (v1.3): jami brak sifatida qabul qilingan donalar soni — sotiladigan
      // Admin ombori zaxirasiga va savdo/foyda hisobiga hech qanday ta'sir qilmaydi, faqat ma'lumot uchun.
      const defectCount = D.returnUnits.filter((u) => u.status === 'defect').length;

      return delay({
        todayOrders: todays.length, activeOrders: active.length, completedOrders: done.length, cancelledOrders: cancelled.length,
        dailySales, totalSales, commission, logistics, packaging, ads, otherCosts, cogs, netProfit, unpaid, activeSellers,
        topSeller, bestProduct, worstProduct,
        series: computeSalesSeries(valid),
        recentActivity: D.notifications.slice(0, 5),
        // ✨ YANGI: Qo'shimcha statistika
        totalExpenses,
        profitMargin,
        conversionRate,
        avgOrderValue,
        repeatCustomers,
        salesTrend,
        sellerPerformance,
        productPerformance,
        // ✨ YANGI (v1.2): Qaytarishlar va Admin Ombori — savdo/foydaga aralashmaydi, faqat ma'lumot uchun
        returnsQty, returnsValue, returnsRange,
        warehouseQtyTotal, warehouseValue, defectCount,
      });
    },

    getSellerStats(sellerId) {
      const seller = D.sellers.find((s) => s.id === sellerId);
      return this.getDashboardStats({ sellerId }).then((stats) => Object.assign(stats, {
        seller,
        recentOrders: D.orders.filter((o) => o.sellerId === sellerId).slice(0, 6),
      }));
    },

    // ✨ YANGI: Hisobotlar bo'limi uchun — tanlangan sana oralig'i (start/end, 'YYYY-MM-DD')
    // bo'yicha buyurtmalar, moliya va qaytarishlar statistikasini real ma'lumotlar asosida hisoblaydi.
    getReportStats(range) {
      range = range || {};
      const start = range.start || null;
      const end = range.end || null;
      const inRange = (dateStr) => {
        if (!dateStr) return false;
        if (start && dateStr < start) return false;
        if (end && dateStr > end) return false;
        return true;
      };

      const orders = D.orders.filter((o) => inRange(o.date));
      const by = (keys) => orders.filter((o) => keys.includes(o.status));
      const newlySent = by(['pending']);
      const accepted = by(['new']);
      const inProgress = by(['processing', 'shipping']);
      const delivered = by(['done', 'admin_warehouse']);
      const closedOrders = by(['closed']);
      const cancelledOrders = by(['cancelled']);
      const soldQty = orders.filter((o) => !['pending', 'cancelled'].includes(o.status)).reduce((s, o) => s + o.qty, 0);

      // Moliyaviy hisob — pending (hali qabul qilinmagan) va cancelled buyurtmalar hisobga kirmaydi,
      // bosh sahifadagi (getDashboardStats) mantiqiga mos.
      const valid = orders.filter((o) => o.status !== 'cancelled' && o.status !== 'pending');
      const totalSum = valid.reduce((s, o) => s + o.total, 0);
      let commission = 0, logistics = 0;
      valid.forEach((o) => {
        const p = D.products.find((x) => x.id === o.productId) || {};
        const commissionPct = p.commissionPct != null ? p.commissionPct : 8;
        commission += o.total * (commissionPct / 100);
        logistics += (p.logisticsCost || 0) * o.qty;
      });
      commission = Math.round(commission); logistics = Math.round(logistics);
      const netProfit = totalSum - commission - logistics;

      // Sotuvchilarga to'langan summa — shu davrda TASDIQLANGAN to'lovlar bo'yicha.
      const paymentsInRange = D.orderPayments.filter((p) => p.status === 'confirmed' && inRange((p.confirmedAt || p.createdAt || '').slice(0, 10)));
      const paidTotal = paymentsInRange.reduce((s, p) => s + p.amount, 0);

      // Hali to'lanishi kerak bo'lgan va qisman to'langan summalar — shu davrdagi buyurtmalar bo'yicha.
      let payableRemaining = 0, partialPaidSum = 0;
      valid.forEach((o) => {
        if (!o.sellerId) return;
        const payable = sellerPayableAmount(o);
        const paidForOrder = D.orderPayments.filter((p) => p.orderId === o.id && p.status === 'confirmed').reduce((s, p) => s + p.amount, 0);
        const remaining = Math.max(0, payable - paidForOrder);
        if (o.paymentStatus === 'partial') partialPaidSum += paidForOrder;
        if (remaining > 0 && o.paymentStatus !== 'paid') payableRemaining += remaining;
      });

      // Qaytarishlar — rasmiylashtirilgan sana ('date') tanlangan oraliqqa tushishi bo'yicha.
      const returnsInRange = D.returns.filter((r) => inRange(r.date));
      const returnedQty = returnsInRange.reduce((s, r) => s + r.qtyReturned, 0);
      const returnedValue = returnsInRange.reduce((s, r) => s + r.totalValue, 0);
      const returnIds = new Set(returnsInRange.map((r) => r.id));
      const unitsInRange = D.returnUnits.filter((u) => returnIds.has(u.returnId));
      const receivedUnits = unitsInRange.filter((u) => u.status === 'received').length;
      const pendingUnits = unitsInRange.filter((u) => u.status === 'pending').length;
      const defectUnits = unitsInRange.filter((u) => u.status === 'defect').length;

      return delay({
        range: { start, end },
        orders: {
          total: orders.length, newSent: newlySent.length, accepted: accepted.length,
          inProgress: inProgress.length, delivered: delivered.length, closed: closedOrders.length,
          cancelled: cancelledOrders.length, soldQty,
        },
        finance: { totalSum, paidTotal, payableRemaining, partialPaidSum, commission, logistics, netProfit },
        returns: {
          count: returnsInRange.length, qty: returnedQty, value: returnedValue,
          received: receivedUnits, pending: pendingUnits, defect: defectUnits,
        },
        rows: orders,
      });
    },

    // ---------- ORDERS ----------
    listOrders(filters) {
      filters = filters || {};
      let rows = D.orders.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
      if (filters.forSellerId) {
        const sid = filters.forSellerId;
        rows = rows.filter((o) => o.sellerId === sid || (o.status === 'pending' && (o.broadcastTo || []).includes(sid) && !(o.rejectedBy || []).includes(sid)));
      } else if (filters.sellerId && filters.sellerId !== 'all') {
        rows = rows.filter((o) => o.sellerId === filters.sellerId);
      }
      if (filters.status && filters.status !== 'all') rows = rows.filter((o) => o.status === filters.status);
      if (filters.paymentStatus && filters.paymentStatus !== 'all') rows = rows.filter((o) => o.paymentStatus === filters.paymentStatus);
      if (filters.date) rows = rows.filter((o) => o.date === filters.date);
      if (filters.q) {
        const q = filters.q.toLowerCase();
        rows = rows.filter((o) => o.id.toLowerCase().includes(q) || o.productName.toLowerCase().includes(q) || o.sellerName.toLowerCase().includes(q));
      }
      return delay(rows);
    },
    // ✨ YANGI (v1.2): "warehouseQty" — shu buyurtmaning Admin Omboridan qoplanadigan qismi.
    // Agar warehouseQty butun buyurtma miqdoriga teng bo'lsa, sotuvchilarga umuman
    // yuborilmaydi va buyurtma darhol "Admin omboridan yetkazildi" holatida yaratiladi.
    // Agar warehouseQty qisman bo'lsa, qolgan qism ilgarigidek sotuvchilarga broadcast qilinadi,
    // lekin qabul qilish faqat shu "sotuvchi ulushi" (sellerQty) doirasida bo'ladi — bitta
    // Order ID ostida ikkala manba ham (Admin Ombori + Sotuvchilar) birga kuzatiladi.
    createOrder(payload) {
      const product = D.products.find((p) => p.id === payload.productId);
      const sellers = (payload.sellerIds || []).map((id) => D.sellers.find((s) => s.id === id)).filter(Boolean);
      const now = new Date();
      const qty = payload.qty;
      const whStock = D.warehouseStock.find((w) => w.productId === product.id);
      const whAvailable = whStock ? whStock.qty : 0;
      const warehouseQty = Math.max(0, Math.min(qty, Math.floor(payload.warehouseQty || 0), whAvailable));
      const sellerQty = qty - warehouseQty;

      const order = {
        id: uid('ORD'),
        date: now.toISOString().slice(0, 10),
        createdAt: now.toISOString(),
        productId: product.id, productName: product.name, img: product.img,
        qty, price: payload.price, total: payload.price * qty,
        color: payload.color || '', size: payload.size || '',
        status: sellerQty === 0 ? 'admin_warehouse' : 'pending',
        sellerId: null, sellerName: sellerQty === 0 ? '—' : 'Kutilmoqda',
        acceptedAt: null,
        broadcastTo: sellerQty === 0 ? [] : sellers.map((s) => s.id), rejectedBy: [],
        paymentStatus: sellerQty === 0 ? 'not_applicable' : 'unpaid',
        comment: payload.comment || '',
        warehouseQty, sellerQty,
      };
      D.orders.unshift(order);

      if (warehouseQty > 0) {
        adjustWarehouseStock(product, -warehouseQty, { relatedOrderId: order.id, note: order.id + ' buyurtmasiga Admin Omboridan yetkazildi' });
      }

      if (sellerQty === 0) {
        addNotification('order', 'Buyurtma Admin Omboridan yetkazildi', order.id + ' — ' + product.name + ' (' + warehouseQty + ' dona)', 'ADMIN');
      } else {
        // Admin panelida umumiy xabar
        addNotification('order', 'Yangi buyurtma yuborildi', sellers.length + ' ta sotuvchiga — ' + product.name + (warehouseQty > 0 ? ' (' + warehouseQty + ' dona Admin Omboridan qoplandi)' : ''), 'ADMIN');
        // TUZATISH: har bir nomzod sotuvchiga FAQAT o'ziga tegishli shaxsiy bildirishnoma —
        // boshqa sotuvchilarga yuborilgan buyurtma ularning panelida ko'rinmaydi.
        sellers.forEach((s) => {
          addNotification('order', 'Sizga yangi buyurtma yuborildi', order.id + ' — ' + product.name + ' (' + sellerQty + ' dona)', 'SELLER', s.id);
        });
      }
      queueSave();
      persistExtra();
      return delay(order);
    },
    // TUZATISH: "actor" ('admin' | 'seller') orqali bildirishnoma to'g'ri tomonga yuboriladi —
    // admin holatni o'zgartirsa sotuvchiga, sotuvchi o'zgartirsa adminga xabar boradi.
    updateOrderStatus(orderId, status, actor) {
      const o = D.orders.find((x) => x.id === orderId);
      if (o) {
        o.status = status;
        if (status === 'cancelled') {
          if (actor === 'admin' && o.sellerId) {
            addNotification('cancel', 'Buyurtma bekor qilindi', 'Buyurtmangiz admin tomonidan bekor qilindi. (' + orderId + ')', 'SELLER', o.sellerId);
            addNotification('cancel', 'Buyurtma bekor qilindi', orderId + ' — admin tomonidan bekor qilindi', 'ADMIN');
          } else {
            addNotification('cancel', 'Buyurtma bekor qilindi', orderId, 'ADMIN');
          }
        }
        if (status === 'done') addNotification('order', 'Buyurtma yakunlandi', orderId + ' muvaffaqiyatli yetkazildi', 'ADMIN');
      }
      queueSave();
      return delay(o);
    },
    // Sotuvchi tomonidan buyurtmani (to'liq yoki qisman) qabul qilish.
    // Agar qabul qilingan miqdor buyurtma miqdoridan kam bo'lsa, qolgan miqdor uchun
    // yangi "pending" buyurtma yaratiladi va u boshqa sotuvchilarga ochiq bo'lib qoladi.
    // ✨ YANGI (v1.2): agar buyurtmaning bir qismi Admin Omboridan allaqachon qoplangan bo'lsa
    // (o.warehouseQty > 0), sotuvchi faqat qolgan "sellerQty" ulushini qabul qila oladi —
    // Admin Ombori ulushi bu hisobga kirmaydi va sotuvchiga to'lanmaydi (13-band).
    acceptOrder(orderId, sellerId, acceptQty) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o) return delay(null);
      if (o.status !== 'pending' || o.sellerId) {
        return delay({ ok: false, reason: 'taken', order: o });
      }
      const seller = D.sellers.find((s) => s.id === sellerId);
      const capQty = o.sellerQty != null ? o.sellerQty : o.qty;
      const warehousePortion = o.warehouseQty || 0;
      const qty = Math.max(1, Math.min(capQty, Math.floor(acceptQty || capQty)));
      if (qty < capQty) {
        const remainderSellerQty = capQty - qty;
        const remainder = Object.assign({}, o, {
          id: uid('ORD'),
          qty: remainderSellerQty,
          total: o.price * remainderSellerQty,
          sellerId: null, sellerName: 'Kutilmoqda', acceptedAt: null,
          status: 'pending',
          broadcastTo: (o.broadcastTo || []).slice(),
          rejectedBy: (o.rejectedBy || []).slice(),
          warehouseQty: 0, sellerQty: remainderSellerQty,
        });
        D.orders.unshift(remainder);
      }
      o.sellerQty = qty;
      o.qty = qty + warehousePortion;
      o.total = o.price * o.qty;
      o.sellerId = sellerId;
      o.sellerName = seller ? seller.name : '';
      o.status = 'new';
      o.acceptedAt = new Date().toISOString();
      // TUZATISH: Sotuvchi tomonida bildirishnoma — faqat shu sotuvchiga (sellerId) ko'rinadi
      addNotification('order', 'Buyurtma qabul qilindi', o.id + ' — ' + o.sellerName + ' (' + qty + ' dona)', 'SELLER', sellerId);
      // TUZATISH: Admin tomonida bildirishnoma
      addNotification('order', 'Sotuvchi buyurtmani qabul qildi', seller.name + ' — ' + o.id, 'ADMIN');
      queueSave();
      return delay({ ok: true, order: o });
    },
    // Sotuvchi o'ziga yuborilgan (hali hech kim olmagan) buyurtmadan voz kechadi — qolganlarga ochiq qoladi.
    rejectOrder(orderId, sellerId) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o) return delay(null);
      if (!o.rejectedBy) o.rejectedBy = [];
      if (!o.rejectedBy.includes(sellerId)) o.rejectedBy.push(sellerId);
      const seller = D.sellers.find((s) => s.id === sellerId);
      // TUZATISH: Admin tomonida bildirishnoma - sotuvchi rad etdi
      addNotification('cancel', 'Sotuvchi buyurtmani rad etdi', 
        (seller ? seller.name : sellerId) + ' — ' + o.id + ' qaytdan boshqa sotuvchilarga yuborilyapti', 'ADMIN');
      queueSave();
      return delay({ ok: true, order: o });
    },
    // ✨ YANGI: Admin sotuvchiga biriktirilgan (qabul qilingan) buyurtmaning ma'lum miqdorini
    // qisman yoki to'liq bekor qila oladi. FAQAT sotuvchi buyurtmani "Yetkazildi" holatiga
    // o'tkazmagunicha ('new' / 'processing' / 'shipping' holatlarida) ruxsat beriladi — bu cheklov
    // shu funksiya ICHIDA ham tekshiriladi, shuning uchun interfeys orqali chetlab bo'lmaydi.
    adminCancelOrderQty(orderId, cancelQty) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o) return delay({ ok: false, reason: 'not_found' });
      const ALLOWED_STATUSES = ['new', 'processing', 'shipping'];
      if (!o.sellerId || !ALLOWED_STATUSES.includes(o.status)) {
        return delay({ ok: false, reason: 'locked' });
      }
      const qty = Math.max(1, Math.min(o.qty, Math.floor(cancelQty || 0)));
      if (!(qty > 0)) return delay({ ok: false, reason: 'invalid_qty' });

      o.qty -= qty;
      if (o.sellerQty != null) o.sellerQty = Math.max(0, o.sellerQty - qty);
      o.total = o.price * o.qty;
      o.adminCancelledQty = (o.adminCancelledQty || 0) + qty;
      if (!o.adminCancellations) o.adminCancellations = [];
      o.adminCancellations.push({ qty, date: new Date().toISOString() });

      const seller = D.sellers.find((s) => s.id === o.sellerId);
      const fullyCancelled = o.qty <= 0;
      if (fullyCancelled) {
        o.qty = 0; o.total = 0;
        o.status = 'cancelled';
        addNotification('cancel', 'Buyurtmangiz bekor qilindi', 'Buyurtmangiz admin tomonidan bekor qilindi. (' + o.id + ')', 'SELLER', o.sellerId);
        addNotification('cancel', "Buyurtma to'liq bekor qilindi", (seller ? seller.name : '') + ' — ' + o.id, 'ADMIN');
      } else {
        addNotification('cancel', 'Buyurtmangizning bir qismi bekor qilindi', 'Buyurtmangizning ' + qty + ' dona qismi admin tomonidan bekor qilindi. (' + o.id + ')', 'SELLER', o.sellerId);
        addNotification('cancel', 'Buyurtma miqdori qisman bekor qilindi', (seller ? seller.name : '') + ' — ' + o.id + ' — ' + qty + ' dona', 'ADMIN');
      }
      queueSave();
      return delay({ ok: true, order: o, cancelledQty: qty, fullyCancelled });
    },
    deleteOrder(orderId) {
      D.orders = D.orders.filter((x) => x.id !== orderId);
      queueSave();
      return delay(true);
    },

    // ---------- ORDER PAYMENTS (Admin -> Sotuvchi, buyurtma bo'yicha, qisman to'lovni qo'llab-quvvatlaydi) ----------
    // "Yetkazildi" statusidagi buyurtma uchun ADMIN sotuvchiga to'lov qiladi va chek biriktiradi —
    // sotuvchi tasdiqlaguncha "Tasdiqlanishi kutilmoqda" holatida turadi. To'liq summa to'lanmaguncha
    // (masalan qisman to'lansa) buyurtma "Yetkazildi"da qoladi va admin qoldig'ini keyinroq to'lashi mumkin;
    // qoldiq nolga tushgach buyurtma avtomatik "Yopildi" statusiga o'tadi.
    sendOrderPayment(orderId, amount, comment, receiptDataUrl) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o || o.status !== 'done' || !o.sellerId) return delay({ ok: false });
      if (D.orderPayments.some((p) => p.orderId === orderId && p.status === 'sent')) return delay({ ok: false, reason: 'pending' });
      const paidSoFar = D.orderPayments.filter((p) => p.orderId === orderId && p.status === 'confirmed').reduce((sum, p) => sum + p.amount, 0);
      // TUZATISH (v1.2): sotuvchiga to'lanadigan summa faqat UNING ulushi (sellerQty) uchun
      // hisoblanadi — Admin Omboridan yetkazilgan qism bu summaga kirmaydi (13-band).
      const payable = sellerPayableAmount(o);
      const remaining = Math.max(0, payable - paidSoFar);
      const amt = Math.max(1, Math.min(amount, remaining || amount));
      const s = D.sellers.find((x) => x.id === o.sellerId);
      const claim = {
        id: uid('OPAY'), orderId, sellerId: o.sellerId, sellerName: s ? s.name : o.sellerName,
        amount: amt, receipt: receiptDataUrl || null, comment: comment || '',
        status: 'sent', date: new Date().toISOString().slice(0, 10), createdAt: new Date().toISOString(),
      };
      D.orderPayments.unshift(claim);
      o.paymentStatus = 'pending_confirm';
      addNotification('payment', "Buyurtma uchun to'lov yuborildi", o.id + ' — ' + OH.format.money(amt) + " — tasdiqlashingizni kuting", 'SELLER', o.sellerId);
      queueSave();
      return delay({ ok: true, claim });
    },
    listOrderPayments(filters) {
      filters = filters || {};
      let rows = D.orderPayments.slice();
      if (filters.orderId) rows = rows.filter((p) => p.orderId === filters.orderId);
      if (filters.sellerId) rows = rows.filter((p) => p.sellerId === filters.sellerId);
      if (filters.status) rows = rows.filter((p) => p.status === filters.status);
      return delay(rows);
    },
    // Buyurtmalar bo'yicha ixcham to'lovlar tarixi — har bir buyurtma uchun jami/to'langan/qoldiq.
    listOrderPaymentHistory(filters) {
      filters = filters || {};
      const byOrder = {};
      D.orderPayments.forEach((c) => { (byOrder[c.orderId] = byOrder[c.orderId] || []).push(c); });
      let rows = Object.keys(byOrder).map((orderId) => {
        const claims = byOrder[orderId].slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const o = D.orders.find((x) => x.id === orderId);
        const paid = claims.filter((c) => c.status === 'confirmed').reduce((sum, c) => sum + c.amount, 0);
        const total = o ? sellerPayableAmount(o) : claims[0].amount;
        return {
          orderId, sellerId: claims[0].sellerId, sellerName: claims[0].sellerName,
          productName: o ? o.productName : '', total, paid, remaining: Math.max(0, total - paid),
          lastDate: claims[0].date, pendingClaim: claims.find((c) => c.status === 'sent') || null,
          orderStatus: o ? o.status : null,
        };
      });
      if (filters.sellerId) rows = rows.filter((r) => r.sellerId === filters.sellerId);
      rows.sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));
      return delay(rows);
    },
    // Sotuvchi adminning buyurtma uchun yuborgan to'lovini qabul qildi — qoldiq nolga tushsa
    // buyurtma "Yopildi" statusiga o'tadi, aks holda "Qisman" holatda qoladi.
    confirmOrderPayment(claimId, sellerId) {
      const claim = D.orderPayments.find((p) => p.id === claimId);
      if (!claim || claim.status !== 'sent') return delay({ ok: false });
      if (sellerId && claim.sellerId !== sellerId) return delay({ ok: false });
      claim.status = 'confirmed';
      claim.confirmedAt = new Date().toISOString();
      const o = D.orders.find((x) => x.id === claim.orderId);
      if (o) {
        const paidTotal = D.orderPayments.filter((p) => p.orderId === o.id && p.status === 'confirmed').reduce((sum, p) => sum + p.amount, 0);
        if (paidTotal >= sellerPayableAmount(o)) { o.status = 'closed'; o.paymentStatus = 'paid'; }
        else o.paymentStatus = 'partial';
      }
      const s = D.sellers.find((x) => x.id === claim.sellerId);
      if (s) {
        const pay = Math.min(claim.amount, s.debt);
        s.debt -= pay; s.paid += pay;
      }
      addNotification('payment', "To'lov qabul qilindi", claim.sellerName + ' — ' + claim.orderId, 'ADMIN');
      queueSave();
      return delay({ ok: true, claim });
    },
    // Sotuvchi to'lovni rad etadi (masalan summa mos kelmasa) — admin qayta yuborishi kerak.
    rejectOrderPayment(claimId, sellerId, reason) {
      const claim = D.orderPayments.find((p) => p.id === claimId);
      if (!claim || claim.status !== 'sent') return delay({ ok: false });
      if (sellerId && claim.sellerId !== sellerId) return delay({ ok: false });
      claim.status = 'rejected';
      claim.rejectReason = reason || '';
      const o = D.orders.find((x) => x.id === claim.orderId);
      if (o) {
        const paidTotal = D.orderPayments.filter((p) => p.orderId === o.id && p.status === 'confirmed').reduce((sum, p) => sum + p.amount, 0);
        o.paymentStatus = paidTotal > 0 ? 'partial' : 'unpaid';
      }
      addNotification('payment', "To'lov rad etildi", claim.sellerName + ' — ' + claim.orderId + (reason ? ' — ' + reason : ''), 'ADMIN');
      queueSave();
      return delay({ ok: true, claim });
    },

    // ---------- NOTIFICATIONS ----------
    // TUZATISH: Admin va Sotuvchi bildirishnomalari qat'iy ajratildi. Sotuvchi faqat
    // o'ziga (sellerId mos) yoki umumiy (target !== 'ADMIN' && target !== 'SELLER') xabarlarni ko'radi;
    // "SELLER" target'idagi, lekin boshqa sotuvchiga tegishli xabarlar hech qachon ko'rinmaydi.
    // Admin esa faqat o'ziga tegishli ("ADMIN"/"ALL") xabarlarni ko'radi, sotuvchiga shaxsan
    // yuborilgan ("SELLER") xabarlarni ko'rmaydi.
    listNotifications() {

      const isSeller = session.role === 'seller';
      const rows = D.notifications.filter((n) => {
        if (isSeller) {
          if (n.target === 'ADMIN') return false;
          if (n.target === 'SELLER') return n.sellerId === session.sellerId;
          return true;
        }
        return n.target !== 'SELLER';
      });
      return delay(rows);
    },
    markAllRead() {
      const session = OH.storage.get('session', {}) || {};
      const isSeller = session.role === 'seller';
      D.notifications.forEach((n) => {
        const visible = isSeller
          ? (n.target !== 'ADMIN' && (n.target !== 'SELLER' || n.sellerId === session.sellerId))
          : (n.target !== 'SELLER');
        if (visible) n.unread = false;
      });
      queueSave();
      return delay(true);
    },

    // ---------- ✨ YANGI (v1.2): QAYTARISHLAR ----------
    // Faqat "done" / "closed" / "admin_warehouse" (yakunlangan/yopilgan/omboridan yetkazilgan)
    // buyurtmalar uchun qaytarish rasmiylashtirish mumkin. Qisman qaytarishni qo'llab-quvvatlaydi:
    // bir buyurtmadan bir necha marta qaytarish qilinishi mumkin, lekin jami qaytarilgan miqdor
    // hech qachon buyurtma miqdoridan oshmaydi (validatsiya qilinadi).
    getReturnableInfo(orderId) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o) return delay(null);
      const alreadyReturned = D.returns.filter((r) => r.orderId === orderId).reduce((s, r) => s + r.qtyReturned, 0);
      const eligible = RETURNABLE_STATUSES.includes(o.status);
      return delay({
        order: o, eligible, originalQty: o.qty, alreadyReturned,
        maxReturnable: Math.max(0, o.qty - alreadyReturned),
        netSold: o.qty - alreadyReturned,
      });
    },
    createReturn(orderId, payload) {
      const o = D.orders.find((x) => x.id === orderId);
      if (!o) return delay({ ok: false, reason: 'not-found' });
      if (!RETURNABLE_STATUSES.includes(o.status)) return delay({ ok: false, reason: 'not-eligible' });
      const alreadyReturned = D.returns.filter((r) => r.orderId === orderId).reduce((s, r) => s + r.qtyReturned, 0);
      const maxReturnable = o.qty - alreadyReturned;
      const qty = Math.floor(payload.qty || 0);
      if (qty < 1 || qty > maxReturnable) return delay({ ok: false, reason: 'invalid-qty', maxReturnable });
      const product = D.products.find((p) => p.id === o.productId);
      const rec = {
        id: uid('RET'),
        orderId: o.id,
        productId: o.productId,
        sku: o.productId,
        barcode: product ? product.barcode : '',
        productName: o.productName,
        img: o.img,
        sellerId: o.sellerId,
        sellerName: o.sellerName,
        originalQty: o.qty,
        previouslyReturned: alreadyReturned,
        qtyReturned: qty,
        reason: payload.reason || '',
        note: payload.note || '',
        date: payload.date || new Date().toISOString().slice(0, 10),
        unitPrice: o.price,
        totalValue: o.price * qty,
        status: 'pending_receive',
        createdAt: new Date().toISOString(),
      };
      D.returns.unshift(rec);
      // ✨ YANGI (v1.3): Qaytarish rasmiylashtirilishi Admin ombori stockini DARHOL oshirmaydi.
      // Buning o'rniga har bir dona uchun alohida "kutilmoqda" (pending) yozuv yaratiladi —
      // ular keyinchalik QR-kod skanerlash yoki Order ID qo'lda kiritish orqali, birma-bir,
      // admin tomonidan fizik qabul qilinishi kerak (bo'lim: receiveNextReturnUnit).
      for (let i = 1; i <= qty; i++) {
        D.returnUnits.push({
          id: uid('RU'), returnId: rec.id, orderId: o.id, unitIndex: i,
          status: 'pending', receivedAt: null,
        });
      }
      addNotification('cancel', 'Qaytarish rasmiylashtirildi', o.id + ' — ' + qty + " dona qaytarildi, omborga qabul qilinishi kutilmoqda (" + o.productName + ')', 'ADMIN');
      queueSave();
      persistExtra();
      return delay({ ok: true, return: rec });
    },
    // ✨ YANGI (v1.3): D.returns yozuvining holatini uning donalari (D.returnUnits) asosida qayta hisoblaydi.
    // pending_receive → hech bir dona qabul qilinmagan; partial_receive → ba'zilari qabul qilingan;
    // full_receive → barchasi qabul qilingan (kamida bittasi yaroqli); defect_received → barchasi brak sifatida qabul qilingan.
    _recomputeReturnStatus(returnId) {
      const rec = D.returns.find((r) => r.id === returnId);
      if (!rec) return null;
      const units = D.returnUnits.filter((u) => u.returnId === returnId);
      const receivedCount = units.filter((u) => u.status !== 'pending').length;
      if (receivedCount === 0) rec.status = 'pending_receive';
      else if (receivedCount < units.length) rec.status = 'partial_receive';
      else rec.status = units.every((u) => u.status === 'defect') ? 'defect_received' : 'full_receive';
      return rec;
    },
    listReturns(filters) {
      filters = filters || {};
      let rows = D.returns.slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      if (filters.q) {
        const q = filters.q.toLowerCase();
        rows = rows.filter((r) => r.orderId.toLowerCase().includes(q) || r.productName.toLowerCase().includes(q) ||
          (r.sellerName || '').toLowerCase().includes(q) || (r.sku || '').toLowerCase().includes(q) || (r.barcode || '').includes(q));
      }
      if (filters.sellerId && filters.sellerId !== 'all') rows = rows.filter((r) => r.sellerId === filters.sellerId);
      if (filters.dateFrom) rows = rows.filter((r) => r.date >= filters.dateFrom);
      if (filters.dateTo) rows = rows.filter((r) => r.date <= filters.dateTo);
      // ✨ YANGI (v1.3): har bir qatorga qabul qilingan/kutilayotgan donalar sonini biriktiramiz.
      rows = rows.map((r) => {
        const units = D.returnUnits.filter((u) => u.returnId === r.id);
        const received = units.filter((u) => u.status !== 'pending').length;
        const defect = units.filter((u) => u.status === 'defect').length;
        return Object.assign({}, r, { receivedQty: received, pendingQty: units.length - received, defectQty: defect });
      });
      return delay(rows);
    },
    getOrderReturns(orderId) {
      return delay(D.returns.filter((r) => r.orderId === orderId).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
    },

    // ---------- ✨ YANGI (v1.3): QAYTARILGAN TOVARNI ADMIN OMBORIGA DONA-DONA QABUL QILISH ----------
    // QR-kod skanerlash yoki Order ID ni qo'lda kiritish orqali chaqiriladi. Berilgan Order ID
    // bo'yicha eng birinchi "kutilmoqda" holatidagi donani topib, uni fizik qabul qilingan deb belgilaydi.
    // Sabab "Nosoz/brak mahsulot" bo'lsa — Admin ombori stockiga QO'SHILMAYDI, brak hisobiga o'tadi.
    getReturnUnitsInfo(orderId) {
      const id = (orderId || '').trim().toUpperCase();
      const relatedReturns = D.returns.filter((r) => r.orderId === id).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      if (!relatedReturns.length) return delay(null);
      const units = D.returnUnits.filter((u) => u.orderId === id);
      const last = relatedReturns[relatedReturns.length - 1];
      const received = units.filter((u) => u.status !== 'pending').length;
      const defect = units.filter((u) => u.status === 'defect').length;
      return delay({
        orderId: id,
        productName: last.productName,
        img: last.img,
        sku: last.sku,
        barcode: last.barcode,
        reason: last.reason,
        totalReturned: units.length,
        receivedQty: received,
        pendingQty: units.length - received,
        defectQty: defect,
        isDefectReason: last.reason === DEFECT_REASON,
      });
    },
    receiveNextReturnUnit(orderId) {
      const id = (orderId || '').trim().toUpperCase();
      const relatedReturns = D.returns.filter((r) => r.orderId === id);
      if (!relatedReturns.length) return delay({ ok: false, reason: 'not-found' });
      // Eng qadimgi "kutilmoqda" donani topamiz (FIFO) — bir nechta qaytarish partiyasi bo'lsa ham to'g'ri ishlaydi.
      const pendingUnits = D.returnUnits
        .filter((u) => u.orderId === id && u.status === 'pending')
        .sort((a, b) => a.id.localeCompare(b.id));
      if (!pendingUnits.length) return delay({ ok: false, reason: 'all-received' });
      const unit = pendingUnits[0];
      const rec = relatedReturns.find((r) => r.id === unit.returnId);
      const isDefect = rec && rec.reason === DEFECT_REASON;
      unit.status = isDefect ? 'defect' : 'received';
      unit.receivedAt = new Date().toISOString();
      if (isDefect) {
        addNotification('cancel', 'Brak mahsulot qabul qilindi', id + ' — 1 dona brak sifatida qabul qilindi (' + (rec ? rec.productName : '') + ')', 'ADMIN');
      } else {
        const product = D.products.find((p) => p.id === (rec ? rec.productId : null));
        if (product) adjustWarehouseStock(product, 1, { relatedOrderId: id, note: "1 dona — " + id + " dan Admin omboriga qabul qilindi", returnId: unit.returnId });
        addNotification('cancel', 'Tovar Admin omboriga qabul qilindi', id + ' — 1 dona omborga qabul qilindi (' + (rec ? rec.productName : '') + ')', 'ADMIN');
      }
      const updatedReturn = OH.api._recomputeReturnStatus(unit.returnId);
      queueSave();
      persistExtra();
      return this.getReturnUnitsInfo(id).then((info) => ({ ok: true, defect: isDefect, unit, return: updatedReturn, info }));
    },
    // ---------- ✨ YANGI (v1.3): BRAK MAHSULOTLAR ----------
    listDefects(filters) {
      filters = filters || {};
      let rows = D.returnUnits.filter((u) => u.status === 'defect').map((u) => {
        const rec = D.returns.find((r) => r.id === u.returnId) || {};
        return {
          id: u.id, orderId: u.orderId, productName: rec.productName, img: rec.img,
          sku: rec.sku, barcode: rec.barcode, sellerName: rec.sellerName,
          reason: rec.reason, receivedAt: u.receivedAt,
        };
      }).sort((a, b) => new Date(b.receivedAt) - new Date(a.receivedAt));
      if (filters.q) {
        const q = filters.q.toLowerCase();
        rows = rows.filter((r) => r.orderId.toLowerCase().includes(q) || (r.productName || '').toLowerCase().includes(q));
      }
      return delay(rows);
    },
    getDefectCount() {
      return delay(D.returnUnits.filter((u) => u.status === 'defect').length);
    },

    // ---------- BARCHA MA'LUMOTLARNI TOZALASH ----------
    // Sotuvchilar va mahsulotlar (o'zlari) saqlanib qoladi — faqat ular bilan bog'liq
    // barcha ko'rinadigan/o'qiladigan ma'lumotlar: buyurtmalar, to'lov da'volari,
    // bildirishnomalar, ✨ qaytarishlar va Admin Ombori (zaxira + harakatlar tarixi)
    // hamda sotuvchilarning qarz/to'langan/faol/tugallangan ko'rsatkichlari nolga tushiriladi.
    clearAllData() {
      D.orders.length = 0;
      D.notifications.length = 0;
      D.orderPayments.length = 0;
      D.returns.length = 0;
      D.warehouseStock.length = 0;
      D.warehouseTransactions.length = 0;
      D.returnUnits.length = 0;
      D.sellers.forEach((s) => {
        s.debt = 0; s.paid = 0; s.activeOrders = 0; s.completedOrders = 0;
      });
      queueSave();
      persistExtra();
      return delay(true);
    },
  };

  // Haqiqiy buyurtmalar asosida savdo grafigi: oxirgi 14 kun / 8 hafta / 6 oy.
  function computeSalesSeries(orders) {
    function bucket(count, keyFn, labelFn) {
      const now = new Date();
      const labels = [], values = [];
      for (let i = count - 1; i >= 0; i--) {
        const d = new Date(now); keyFn(d, i);
        labels.push(labelFn(d)); values.push(0);
      }
      return { labels, values };
    }
    const daily = bucket(14, (d, i) => d.setDate(d.getDate() - i), (d) => d.toISOString().slice(5, 10));
    const monthly = bucket(6, (d, i) => d.setMonth(d.getMonth() - i), (d) => d.toISOString().slice(0, 7));
    const weekly = { labels: [], values: [] };

    orders.forEach((o) => {
      const od = new Date(o.date);
      if (isNaN(od)) return;
      const dayIdx = daily.labels.indexOf(od.toISOString().slice(5, 10));
      if (dayIdx > -1) daily.values[dayIdx] += o.total;
      const monthIdx = monthly.labels.indexOf(od.toISOString().slice(0, 7));
      if (monthIdx > -1) monthly.values[monthIdx] += o.total;
    });

    const now = new Date();
    for (let i = 0; i < 8; i++) {
      const weekStart = new Date(now); weekStart.setDate(weekStart.getDate() - (7 - i) * 7);
      const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() - (7 - i - 1) * 7);
      weekly.labels.push(weekStart.toISOString().slice(5, 10));
      weekly.values.push(orders.filter((o) => { const od = new Date(o.date); return od >= weekStart && od < weekEnd; }).reduce((s, o) => s + o.total, 0));
    }
    return { daily, weekly, monthly };
  }

  function generateBarcode() {
    let code = '478';
    for (let i = 0; i < 10; i++) code += Math.floor(Math.random() * 10);
    return code;
  }
  OH.api.generateBarcode = generateBarcode;

  // ✨ YANGI (v1.2): faqat shu holatlardan qaytarish rasmiylashtirish mumkin.
  const RETURNABLE_STATUSES = ['done', 'closed', 'admin_warehouse'];

  // ✨ YANGI (v1.3): qaytarish shu sabab bilan rasmiylashtirilgan bo'lsa, uning donalari omborga
  // qabul qilinganda Admin ombori sotiladigan stockiga QO'SHILMAYDI — brak hisobiga o'tadi.
  const DEFECT_REASON = 'Nosoz/brak mahsulot';

  // Sotuvchiga to'lanishi kerak bo'lgan summa — buyurtmaning FAQAT sotuvchi orqali
  // bajarilgan qismi (sellerQty) uchun. Admin Omboridan yetkazilgan qism kirmaydi (13-band).
  function sellerPayableAmount(o) {
    const q = o.sellerQty != null ? o.sellerQty : o.qty;
    return o.price * q;
  }
  OH.api.sellerPayableAmount = sellerPayableAmount;

  // Admin Ombori zaxirasini +/- ga o'zgartiradi va harakat tarixiga yozadi.
  // delta > 0 — omborga kirim (masalan qaytarishdan), delta < 0 — ombordan chiqim (buyurtmaga berildi).
  function adjustWarehouseStock(product, delta, opts) {
    opts = opts || {};
    let w = D.warehouseStock.find((x) => x.productId === product.id);
    if (!w) {
      w = { id: uid('WH'), productId: product.id, sku: product.id, name: product.name, img: product.img, barcode: product.barcode, qty: 0, lastUpdated: new Date().toISOString() };
      D.warehouseStock.unshift(w);
    }
    w.qty = Math.max(0, w.qty + delta);
    w.lastUpdated = new Date().toISOString();
    D.warehouseTransactions.unshift({
      id: uid('WTX'),
      type: delta >= 0 ? 'in' : 'out',
      productId: product.id, sku: product.id, name: product.name,
      qty: Math.abs(delta),
      relatedOrderId: opts.relatedOrderId || null,
      returnId: opts.returnId || null,
      note: opts.note || '',
      date: new Date().toISOString(),
      balanceAfter: w.qty,
    });
    persistExtra();
    return w;
  }
})(window.OH = window.OH || {});

    // ✨ TUZATILDI: "#btn-collapse" (hamburger) tugmasi HAR SAHIFA o'zgarganda

    shell.addEventListener('click', (e) => {

      </div>`;
  }

  function kpiCard(icon, iconBg, iconColor, label, value) {
    return `<div class="card card-pad kpi-card card-hover">
      <div class="kpi-top"><div class="kpi-icon" style="background:${iconBg};color:${iconColor}">${icon}</div></div>
      <div><div class="kpi-value">${value}</div><div class="kpi-label">${label}</div></div>
    </div>`;

  // Sotuvchi paneliga har safar kirganda, oxirgi ko'rilganidan beri kelgan
  // "yangi" holatdagi buyurtmalar bo'lsa — ovozli signal beradi (eski
  // ilovadagi "ring tone" xatti-harakati).
  function checkNewOrderRing(sellerId, recentOrders) {
    const key = 'lastSeenOrder:' + sellerId;
    const lastSeenId = OH.storage.get(key, null);
    const newOnes = recentOrders.filter((o) => o.status === 'new');
    if (newOnes.length && newOnes[0].id !== lastSeenId) {
      OH.api.playRingTone();
      OH.toast.info('Yangi buyurtma bor', newOnes[0].productName);
    }
    if (recentOrders[0]) OH.storage.set(key, recentOrders[0].id);
  }

    const session = OH.storage.get('session', {}) || {};
    const sellerId = session.sellerId;
    container.innerHTML = skeleton();

    OH.api.getSellerStats(sellerId).then((s) => {
      const seller = s.seller || {};
      checkNewOrderRing(sellerId, s.recentOrders || []);

            ${kpiCard(I.check, 'var(--success-bg)', 'var(--success)', 'Tugallangan', s.completedOrders)}

          <div class="mini-stats">
            <div class="card card-pad mini-stat"><span>Umumiy savdo</span><b class="mono">${F.money(s.totalSales)}</b></div>
