    const fulfillBreakdown = (!isSeller && (o.warehouseQty || (o.sellerQty != null && o.sellerQty !== o.qty)))
      ? `<div class="fulfill-breakdown">
          ${o.warehouseQty ? `<span class="fulfill-chip">${I.warehouse} Ombordan: ${o.warehouseQty}</span>` : ''}
          ${o.sellerQty ? `<span class="fulfill-chip seller">${I.sellers} Sotuvchidan: ${o.sellerQty}</span>` : ''}
        </div>` : '';
    const sellerCell = isOpenToMe
      ? '<span class="badge badge-info">Siz uchun ochiq</span>'
      : (o.sellerId
          ? `<div><div class="cell-main">${OH.dom.escapeHtml(o.sellerName)}</div><div class="cell-sub">Qabul: ${F.dateTime(o.acceptedAt)}</div></div>`
          : '<span class="text-muted">Kutilmoqda</span>');
    return `<tr data-id="${o.id}">
      <td data-label="ID" class="mono cell-main">${o.id}</td>
      <td data-label="Yaratilgan">
        <div class="cell-main">${F.date(o.createdAt || o.date)}</div>
        <div class="cell-sub">${F.dateTime(o.createdAt || o.date).split(', ')[1] || ''}</div>
      </td>
      <td data-label="Mahsulot">
        <div class="cell-product">
          ${o.img ? `<img src="${OH.dom.escapeHtml(o.img)}" class="thumb" alt="" onerror="this.style.opacity='0'" />` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted)">${I.image}</div>`}
          <div><div class="cell-main">${OH.dom.escapeHtml(o.productName)}</div><div class="cell-sub">${o.productId} · ${F.money(o.price)}${o.color ? ' · ' + OH.dom.escapeHtml(o.color) : ''}${o.size ? ' · ' + OH.dom.escapeHtml(o.size) : ''}</div></div>
        </div>
      </td>
      <td data-label="Miqdor">${o.qty} dona${fulfillBreakdown}</td>
      <td data-label="Jami summa" class="mono cell-main">${F.money(o.total)}</td>
      <td data-label="Holati"><span class="badge ${st.cls}">${st.label}</span></td>
      <td data-label="Sotuvchi">${sellerCell}</td>
      <td data-label="To'lov"><span class="badge ${pay.cls}">${pay.label}</span></td>
      <td data-label="Amallar">
        <div class="row-actions">
          <button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="view" data-tip="Ko'rish">${I.eye}</button>
          ${isSeller ? sellerActions : adminActions}
        </div>
      </td>
    </tr>`;
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isSeller = session.role === 'seller';
    container.innerHTML = `<div class="page">
      <div class="page-head"><div></div>
        <div class="page-head__actions">${isSeller ? '' : `<a href="#/order-create" class="btn btn-primary">${I.plus} Yangi buyurtma</a>`}</div>
      </div>
      <div id="toolbar-holder"></div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Yaratilgan</th><th>Mahsulot</th><th>Miqdor</th><th>Jami summa</th><th>Holati</th><th>Sotuvchi</th><th>To'lov</th><th>Amallar</th></tr></thead>
          <tbody id="orders-tbody">${OH.skeleton.tableRows(9, 6)}</tbody>
        </table>
        <div class="pagination" id="orders-pagination"></div>
      </div>
    </div>`;

    OH.api.listSellers().then((sellers) => {
      OH.dom.qs('#toolbar-holder').innerHTML = toolbarHtml(sellers, isSeller);
      bindFilters();
      load();
    });

    let pager;
    function load() {
      const filters = {
        q: OH.dom.qs('#f-search')?.value.trim(),
        status: OH.dom.qs('#f-status')?.value,
        paymentStatus: OH.dom.qs('#f-payment')?.value,
        date: OH.dom.qs('#f-date')?.value,
      };
      if (isSeller) filters.forSellerId = session.sellerId;
      else filters.sellerId = OH.dom.qs('#f-seller')?.value;
      OH.dom.qs('#orders-tbody').innerHTML = OH.skeleton.tableRows(9, 5);
      OH.api.listOrders(filters).then((rows) => {
        const tbody = OH.dom.qs('#orders-tbody');
        const pagBox = OH.dom.qs('#orders-pagination');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">${I.orders}<h4>Buyurtma topilmadi</h4><p>Filtr shartlariga mos buyurtma yo'q</p></div></td></tr>`;
          pagBox.innerHTML = '';
          return;
        }
        pager = OH.table.paginate(rows, 8, (slice) => { tbody.innerHTML = slice.map((o) => rowHtml(o, isSeller, session.sellerId)).join(''); bindRowActions(); });
        pager.renderPage();
        pager.renderControls(pagBox);
      });
    }

    function bindFilters() {
      OH.dom.qs('#f-search').addEventListener('input', OH.dom.debounce(load, 350));
      OH.dom.qs('#f-status').addEventListener('change', load);
      OH.dom.qs('#f-payment').addEventListener('change', load);
      OH.dom.qs('#f-seller')?.addEventListener('change', load);
      OH.dom.qs('#f-date').addEventListener('change', load);
      OH.dom.qs('#f-clear').addEventListener('click', () => {
        OH.dom.qs('#f-search').value = ''; OH.dom.qs('#f-status').value = 'all';
        OH.dom.qs('#f-payment').value = 'all';
        const sellerSel = OH.dom.qs('#f-seller'); if (sellerSel) sellerSel.value = 'all';
        OH.dom.qs('#f-date').value = '';
        load();
      });
    }

    function bindRowActions() {
      OH.dom.qsa('#orders-tbody tr[data-id]').forEach((tr) => {
        const id = tr.dataset.id;
        tr.querySelector('[data-act="view"]').addEventListener('click', () => openView(id));
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', () => openEdit(id));
        tr.querySelector('[data-act="del"]')?.addEventListener('click', () => {
          OH.modal.confirm({
            title: "Buyurtmani o'chirish",
            message: `${id} raqamli buyurtmani o'chirmoqchimisiz? Bu amalni bekor qilib bo'lmaydi.`,
            confirmText: "O'chirish",
            onConfirm: () => OH.api.deleteOrder(id).then(() => { OH.toast.success("Buyurtma o'chirildi"); load(); }),
          });
        });
        tr.querySelector('[data-act="process"]')?.addEventListener('click', () => openSellerProcess(id));
        tr.querySelector('[data-act="pay"]')?.addEventListener('click', () => openAdminPayOrder(id));
        tr.querySelector('[data-act="cancel-qty"]')?.addEventListener('click', () => openAdminCancelQty(id));
        tr.querySelector('[data-act="review-pay"]')?.addEventListener('click', () => openSellerReviewPayment(id));
        tr.querySelector('[data-act="qr"]')?.addEventListener('click', () => {
          OH.api.listOrders().then((rows) => {
            const o = rows.find((x) => x.id === id);
            if (o && OH.qrPrintModal) OH.qrPrintModal.openPrintModal(o);
          });
        });
        tr.querySelector('[data-act="return"]')?.addEventListener('click', () => {
          OH.api.listOrders().then((rows) => {
            const o = rows.find((x) => x.id === id);
            if (o && OH.returnsUI) OH.returnsUI.openReturnForm(o, load);
          });
        });
      });
    }

    function openView(id) {
      OH.api.listOrders().then((rows) => {
        const o = rows.find((x) => x.id === id);
        if (!o) return;
        const st = F.ORDER_STATUS_META[o.status];
        const pay = F.PAYMENT_STATUS_META[o.paymentStatus];
        // Sotuvchiga hali biriktirilmagan, ochiq buyurtma bo'lsa — qabul qilish/rad etish shu oynada amalga oshiriladi.
        const isOpenToMe = isSeller && o.status === 'pending' && (o.broadcastTo || []).includes(session.sellerId) && !o.sellerId && !(o.rejectedBy || []).includes(session.sellerId);
        const bodyHtml = `
            <div class="summary-row"><span class="text-muted">Mahsulot</span><b>${OH.dom.escapeHtml(o.productName)}</b></div>
            <div class="summary-row"><span class="text-muted">Yaratilgan sana</span><b>${F.dateTime(o.createdAt || o.date)}</b></div>
            <div class="summary-row"><span class="text-muted">Miqdor</span><b>${o.qty} dona</b></div>
            ${(!isSeller && (o.warehouseQty || (o.sellerQty != null && o.sellerQty !== o.qty))) ? `
            <div class="summary-row"><span class="text-muted">Yetkazib berish manbasi</span>
              <span>
                ${o.warehouseQty ? `<span class="fulfill-chip">Admin Omboridan: ${o.warehouseQty} dona</span> ` : ''}
                ${o.sellerQty ? `<span class="fulfill-chip seller">Sotuvchilar orqali: ${o.sellerQty} dona</span>` : ''}
              </span>
            </div>` : ''}
            ${o.color ? `<div class="summary-row"><span class="text-muted">Rang</span><b>${OH.dom.escapeHtml(o.color)}</b></div>` : ''}
            ${o.size ? `<div class="summary-row"><span class="text-muted">O'lcham</span><b>${OH.dom.escapeHtml(o.size)}</b></div>` : ''}
            <div class="summary-row"><span class="text-muted">Narx (dona)</span><b class="mono">${F.money(o.price)}</b></div>
            <div class="summary-row"><span class="text-muted">Holati</span><span class="badge ${st.cls}">${st.label}</span></div>
            <div class="summary-row"><span class="text-muted">Qabul qilgan sotuvchi</span><b>${o.sellerId ? OH.dom.escapeHtml(o.sellerName) : '<span class="text-muted">Hali qabul qilinmagan</span>'}</b></div>
            ${o.sellerId ? `<div class="summary-row"><span class="text-muted">Qabul qilingan sana</span><b>${F.dateTime(o.acceptedAt)}</b></div>` : ''}
            <div class="summary-row"><span class="text-muted">To'lov</span><span class="badge ${pay.cls}">${pay.label}</span></div>
            ${o.comment ? `<div class="summary-row"><span class="text-muted">Izoh</span><b>${OH.dom.escapeHtml(o.comment)}</b></div>` : ''}
            ${o.refuseReason ? `<div class="summary-row"><span class="text-muted">Rad etish sababi</span><b class="text-danger">${OH.dom.escapeHtml(o.refuseReason)}</b></div>` : ''}
            ${o.adminCancelledQty ? `<div class="summary-row"><span class="text-muted">Admin tomonidan bekor qilingan</span><b class="text-danger">${o.adminCancelledQty} dona</b></div>` : ''}
            <div class="summary-total"><span>Jami summa</span><b>${F.money(o.total)}</b></div>
            ${isOpenToMe ? `
            <div class="seller-accept-box">
              <div class="field" style="margin-bottom:0">
                <label>Qabul qilish miqdori (mavjud: ${o.qty} dona)</label>
                <input type="number" class="input" id="accept-qty" min="1" max="${o.qty}" value="${o.qty}" />
                <p class="hint">Butun miqdorni qabul qilishingiz shart emas — qolgan qismi boshqa sotuvchilar uchun faol buyurtmalar ro'yxatida qoladi.</p>
              </div>
            </div>` : ''}`;
        const canReturnHere = !isSeller && ['done', 'closed', 'admin_warehouse'].includes(o.status);
        const footHtml = isOpenToMe
          ? `<button class="btn btn-ghost" id="view-reject">${I.x} Rad etish</button><button class="btn btn-primary" id="view-accept">${I.check} Buyurtmani qabul qilish</button>`
          : (!isSeller
              ? `<button class="btn btn-ghost" id="close-view">Yopish</button>
                 ${canReturnHere ? `<button class="btn btn-secondary" id="view-return">${I.undo} Qaytarishni rasmiylashtirish</button>` : ''}
                 <button class="btn btn-primary" id="view-qr">${I.qrcode} QR-kodlarni chop etish</button>`
              : `<button class="btn btn-secondary" id="close-view">Yopish</button>`);
        OH.modal.open({
          title: o.id,
          bodyHtml, footHtml,
          onMount: (m) => {
            m.querySelector('#view-qr')?.addEventListener('click', () => { OH.modal.close(); OH.qrPrintModal?.openPrintModal(o); });
            m.querySelector('#view-return')?.addEventListener('click', () => { OH.modal.close(); OH.returnsUI?.openReturnForm(o, load); });
            if (!isOpenToMe) { m.querySelector('#close-view').addEventListener('click', OH.modal.close); return; }
            m.querySelector('#view-reject').addEventListener('click', () => {
              OH.modal.close();
              OH.api.rejectOrder(id, session.sellerId).then(() => { OH.toast.info('Buyurtma rad etildi', id); load(); });
            });
            m.querySelector('#view-accept').addEventListener('click', () => {
              const qtyInput = m.querySelector('#accept-qty');
              const acceptQty = Math.max(1, Math.min(o.qty, Math.floor(+qtyInput.value || o.qty)));
              OH.api.acceptOrder(id, session.sellerId, acceptQty).then((res) => {
                OH.modal.close();
                if (!res || !res.ok) { OH.toast.error('Ulgurmadingiz', 'Bu buyurtmani boshqa sotuvchi allaqachon qabul qilgan'); load(); return; }
                OH.toast.success('Buyurtma qabul qilindi', id + ' — ' + acceptQty + ' dona sizga biriktirildi');
                load();
              });
            });
          },
        });
      });
    }

    function openEdit(id) {
      OH.api.listOrders().then((rows) => {
        const o = rows.find((x) => x.id === id);
        if (!o) return;
        OH.modal.open({
          title: 'Holatni o\'zgartirish — ' + o.id,
          bodyHtml: `<div class="field"><label>Yangi holat</label><select class="select" id="edit-status">${manualStatusOptions(o.status)}</select></div>`,
          footHtml: `<button class="btn btn-ghost" id="edit-cancel">Bekor qilish</button><button class="btn btn-primary" id="edit-save">Saqlash</button>`,
          onMount: (m) => {
            m.querySelector('#edit-cancel').addEventListener('click', OH.modal.close);
            m.querySelector('#edit-save').addEventListener('click', () => {
              const val = m.querySelector('#edit-status').value;
              OH.api.updateOrderStatus(id, val, 'admin').then(() => {
                OH.modal.close();
                OH.toast.success('Holat yangilandi', o.id + ' — ' + F.ORDER_STATUS_META[val].label);
                load();
              });
            });
          },
        });
      });
    }
    // ✨ YANGI: Admin sotuvchiga biriktirilgan buyurtmaning kerakli miqdorini qisman yoki
    // to'liq bekor qiladi. Faqat sotuvchi "Yetkazildi"ga o'tkazmaguncha ochiq (tugma o'zi ham
    // shu holatda ko'rinmaydi, bundan tashqari amal API darajasida ham tekshiriladi).
    function openAdminCancelQty(id) {
      OH.api.listOrders().then((rows) => {
        const o = rows.find((x) => x.id === id);
        if (!o) return;
        if (!o.sellerId || !['new', 'processing', 'shipping'].includes(o.status)) {
          OH.toast.error('Amal mumkin emas', "Bu buyurtma allaqachon yetkazilgan yoki yopilgan");
          return;
        }
        OH.modal.open({
          title: 'Miqdorni bekor qilish — ' + o.id,
          bodyHtml: `
            <div class="summary-row"><span class="text-muted">Sotuvchi</span><b>${OH.dom.escapeHtml(o.sellerName)}</b></div>
            <div class="summary-row"><span class="text-muted">Qabul qilingan</span><b>${o.qty} dona</b></div>
            ${o.adminCancelledQty ? `<div class="summary-row"><span class="text-muted">Ilgari bekor qilingan</span><b class="text-danger">${o.adminCancelledQty} dona</b></div>` : ''}
            <div class="field" style="margin-top:14px">
              <label>Bekor qilinadigan miqdor (max: ${o.qty} dona)</label>
              <input type="number" class="input" id="cq-qty" min="1" max="${o.qty}" value="1" />
              <p class="hint">Butun miqdorni kiritsangiz, buyurtma to'liq "Bekor qilingan" holatiga o'tadi.</p>
            </div>`,
          footHtml: `<button class="btn btn-ghost" id="cq-cancel">Bekor qilish</button><button class="btn btn-danger" id="cq-ok">Tasdiqlash</button>`,
          onMount: (m) => {
            m.querySelector('#cq-cancel').addEventListener('click', OH.modal.close);
            m.querySelector('#cq-ok').addEventListener('click', () => {
              const qty = Math.max(1, Math.min(o.qty, Math.floor(+m.querySelector('#cq-qty').value || 0)));
              OH.api.adminCancelOrderQty(id, qty).then((res) => {
                OH.modal.close();
                if (!res || !res.ok) { OH.toast.error('Amalga oshmadi', "Buyurtma holati o'zgargan bo'lishi mumkin"); load(); return; }
                OH.toast.success(res.fullyCancelled ? "Buyurtma to'liq bekor qilindi" : 'Miqdor bekor qilindi', o.id + ' — ' + res.cancelledQty + ' dona bekor qilindi');
                load();
              });
            });
          },
        });
      });
    }
    // Sotuvchi o'zi qabul qilgan buyurtmani qayta ishlaydi — bosqichma-bosqich holatni yangilaydi.
    const SELLER_STATUS_OPTIONS = ['processing', 'shipping', 'done', 'cancelled'];
    function openSellerProcess(id) {
      OH.api.listOrders().then((rows) => {
        const o = rows.find((x) => x.id === id);
        if (!o) return;
        const options = SELLER_STATUS_OPTIONS.map((k) =>
          `<option value="${k}" ${k === o.status ? 'selected' : ''}>${F.ORDER_STATUS_META[k].label}</option>`).join('');
        OH.modal.open({
          title: 'Buyurtmani qayta ishlash — ' + o.id,
          bodyHtml: `
            <div class="summary-row"><span class="text-muted">Mahsulot</span><b>${OH.dom.escapeHtml(o.productName)}</b></div>
            <div class="summary-row"><span class="text-muted">Hozirgi holat</span><span class="badge ${F.ORDER_STATUS_META[o.status].cls}">${F.ORDER_STATUS_META[o.status].label}</span></div>
            <div class="field" style="margin-top:14px"><label>Yangi holat</label><select class="select" id="proc-status">${options}</select></div>`,
          footHtml: `<button class="btn btn-ghost" id="proc-cancel">Bekor qilish</button><button class="btn btn-primary" id="proc-save">Saqlash</button>`,
          onMount: (m) => {
            m.querySelector('#proc-cancel').addEventListener('click', OH.modal.close);
            m.querySelector('#proc-save').addEventListener('click', () => {
              const val = m.querySelector('#proc-status').value;
              OH.api.updateOrderStatus(id, val, 'seller').then(() => {
                OH.modal.close();
                OH.toast.success('Holat yangilandi', o.id + ' — ' + F.ORDER_STATUS_META[val].label);
                load();
              });
            });
          },
        });
      });
    }

    // Admin "Yetkazildi" statusidagi buyurtma uchun sotuvchiga to'lov qiladi va chek biriktiradi.
    function openAdminPayOrder(id) {
      OH.api.listOrders().then((rows) => {
        const o = rows.find((x) => x.id === id);
        if (!o) return;
        let receiptData = null;
        // TUZATISH (v1.2): sotuvchiga faqat UNING bajargan ulushi (sellerQty) uchun to'lov shakllanadi —
        // agar bir qismi Admin Omboridan yetkazilgan bo'lsa, o'sha qism bu summaga kirmaydi.
        const payable = OH.api.sellerPayableAmount(o);
        OH.modal.open({
          title: "To'lov qilish — " + o.id,
          bodyHtml: `
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">${OH.dom.escapeHtml(o.sellerName)} uchun to'lanadigan summa (${o.sellerQty != null ? o.sellerQty : o.qty} dona, faqat sotuvchi ulushi): <b class="mono">${F.money(payable)}</b></p>
            ${o.warehouseQty ? `<p class="hint">Bu buyurtmaning ${o.warehouseQty} donasi Admin Omboridan yetkazilgan — shu qism uchun sotuvchiga to'lov shakllanmaydi.</p>` : ''}
            <div class="field"><label>To'lanadigan summa</label><input type="number" class="input" id="pf-amount" value="${payable}" min="1" /></div>
            <div class="field"><label>Izoh (ixtiyoriy)</label><input class="input" id="pf-comment" placeholder="Masalan: naqd to'landi" /></div>
            <div class="field"><label>Chek/kvitansiya rasmi *</label><input type="file" accept="image/*" class="input" id="pf-file" /></div>`,
          footHtml: `<button class="btn btn-ghost" id="pf-cancel">Bekor qilish</button><button class="btn btn-primary" id="pf-ok">Yuborish</button>`,
          onMount: (m) => {
            m.querySelector('#pf-cancel').addEventListener('click', OH.modal.close);
            m.querySelector('#pf-file').addEventListener('change', (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = () => { receiptData = reader.result; };
              reader.readAsDataURL(file);
            });
            m.querySelector('#pf-ok').addEventListener('click', () => {
              const amount = Math.max(0, +m.querySelector('#pf-amount').value || 0);
              if (amount <= 0) return OH.toast.error("Summani kiriting");
              if (!receiptData) return OH.toast.error("Chek rasmi majburiy", "Iltimos to'lov chekini yuklang");
              OH.api.sendOrderPayment(id, amount, m.querySelector('#pf-comment').value.trim(), receiptData).then((res) => {
                if (!res || !res.ok) { OH.modal.close(); OH.toast.error("Amalga oshmadi"); load(); return; }
                OH.modal.close();
                OH.toast.success("To'lov yuborildi", o.sellerName + " tasdiqlashini kuting");
                load();
              });
            });
          },
        });
      });
    }

    // Sotuvchi admin yuborgan to'lov chekini ko'rib chiqadi — tasdiqlasa buyurtma "Yopildi" bo'ladi.
    function openSellerReviewPayment(id) {
      OH.api.listOrderPayments({ orderId: id, sellerId: session.sellerId, status: 'sent' }).then((rows) => {
        const claim = rows[0];
        if (!claim) { OH.toast.error("To'lov topilmadi"); return; }
        OH.modal.open({
          title: "To'lovni ko'rib chiqish — " + id,
          bodyHtml: `
            <div class="summary-row"><span class="text-muted">Sana</span><b>${F.date(claim.date)}</b></div>
            <div class="summary-row"><span class="text-muted">Summa</span><b class="mono">${F.money(claim.amount)}</b></div>
            ${claim.comment ? `<div class="summary-row"><span class="text-muted">Izoh</span><b>${OH.dom.escapeHtml(claim.comment)}</b></div>` : ''}
            ${claim.receipt ? `<div class="field" style="margin-top:14px"><label>Chek</label><img src="${claim.receipt}" style="width:100%;border-radius:12px" /></div>` : '<p class="text-muted">Chek biriktirilmagan</p>'}`,
          footHtml: `<button class="btn btn-ghost" id="rp-reject">${I.x} Rad etish</button><button class="btn btn-primary" id="rp-confirm">${I.check} Qabul qilish</button>`,
          onMount: (m) => {
            m.querySelector('#rp-reject').addEventListener('click', () => {
              OH.modal.close();
              OH.modal.open({
                title: "To'lovni rad etish",
                bodyHtml: `<div class="field"><label>Sababi</label><textarea class="input" id="rp-reason" rows="3" placeholder="Masalan: summa mos kelmadi..."></textarea></div>`,
                footHtml: `<button class="btn btn-ghost" id="rp-reason-cancel">Bekor qilish</button><button class="btn btn-danger" id="rp-reason-ok">Rad etish</button>`,
                onMount: (m2) => {
                  m2.querySelector('#rp-reason-cancel').addEventListener('click', OH.modal.close);
                  m2.querySelector('#rp-reason-ok').addEventListener('click', () => {
                    OH.api.rejectOrderPayment(claim.id, session.sellerId, m2.querySelector('#rp-reason').value.trim()).then(() => {
                      OH.modal.close(); OH.toast.info("To'lov rad etildi"); load();
                    });
                  });

              });
            });
            m.querySelector('#rp-confirm').addEventListener('click', () => {
              OH.api.confirmOrderPayment(claim.id, session.sellerId).then((res) => {
                OH.modal.close();
                if (!res || !res.ok) { OH.toast.error("Amalga oshmadi"); load(); return; }

                load();
              });
            });
          },
        });
      });
    }
  }

  OH.pages = OH.pages || {};

(function (OH) {

          <div class="card-head"><h3>Xulosa / Buyurtma yaratish</h3></div>

          <div class="summary-row"><span class="text-muted">Miqdor</span><b id="s-qty">1 dona</b></div>
          <div class="summary-row"><span class="text-muted">Rang / O'lcham</span><b id="s-variant">—</b></div>

          <div class="oc-seller-select" id="seller-select-wrap">
            <button type="button" class="oc-seller-trigger" id="seller-trigger"><span id="seller-trigger-label">Sotuvchilarni tanlang</span>${I.chevronDown}</button>
            <div class="oc-seller-panel" id="seller-panel">${OH.skeleton.bar('100%', '32px')}</div>
          </div>

          <button class="btn btn-primary btn-block" style="margin-top:18px" id="btn-create">${I.plus} Buyurtmani yaratish</button>
          <p class="text-muted" style="font-size:11.5px;margin-top:10px;line-height:1.6">Buyurtma tanlangan sotuvchilarning barchasiga yuboriladi. Ulardan qaysi biri birinchi bo'lib qabul qilsa, buyurtma o'shanga biriktiriladi.</p>
        </div>
      </div>
    </div>`;

    let selectedProduct = null;
    let allProductsCache = [];
    let warehouseAvailable = 0; // ✨ YANGI (v1.2): tanlangan mahsulot uchun Admin Omboridagi mavjud miqdor
    let whManuallyEdited = false; // admin "Ombordan foydalanish" maydonini qo'lda o'zgartirdimi
    const selectedSellers = new Set();
    let allSellersCache = [];

    function renderProductList(list) {
      const box = OH.dom.qs('#product-list');
      if (!list.length) { box.innerHTML = `<div class="oc-product-empty">Mahsulot topilmadi</div>`; return; }
      box.innerHTML = list.map((p) => `
        <div class="product-pick ${selectedProduct && selectedProduct.id === p.id ? 'selected' : ''}" data-id="${p.id}">
          ${p.img ? `<img src="${OH.dom.escapeHtml(p.img)}" class="thumb" alt="" onerror="this.style.opacity='0'" />` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted)">${I.image}</div>`}
          <div style="flex:1"><div class="cell-main">${OH.dom.escapeHtml(p.name)}</div><div class="cell-sub">${p.category || ''} · ${p.barcode || ''}</div></div>
          <b class="mono" data-tip="Ulgurji narxi">${F.money(p.costPrice)}</b>
        </div>`).join('');
      OH.dom.qsa('.product-pick').forEach((el) => el.addEventListener('click', () => {
        OH.dom.qsa('.product-pick').forEach((x) => x.classList.remove('selected'));
        el.classList.add('selected');
        selectedProduct = allProductsCache.find((p) => p.id === el.dataset.id);
        renderVariantSelectors();
        whManuallyEdited = false;
        OH.api.getWarehouseStockForProduct(selectedProduct.id).then((qty) => {
          warehouseAvailable = qty || 0;
          updateSummary();
        });
      }));
    }

    // Rang/o'lcham tanlovlari tanlangan mahsulotning o'ziga tegishli variantlaridan olinadi.
    function renderVariantSelectors() {
      const colorSel = OH.dom.qs('#f-color');
      const sizeSel = OH.dom.qs('#f-size');
      const colors = selectedProduct?.colors || [];
      const sizes = selectedProduct?.sizes || [];
      colorSel.innerHTML = colors.length
        ? `<option value="">Tanlanmagan</option>` + colors.map((c) => `<option value="${OH.dom.escapeHtml(c)}">${OH.dom.escapeHtml(c)}</option>`).join('')
        : `<option value="">Bu mahsulotda rang yo'q</option>`;
      colorSel.disabled = !colors.length;
      sizeSel.innerHTML = sizes.length
        ? `<option value="">Tanlanmagan</option>` + sizes.map((s) => `<option value="${OH.dom.escapeHtml(s)}">${OH.dom.escapeHtml(s)}</option>`).join('')
        : `<option value="">Bu mahsulotda o'lcham yo'q</option>`;
      sizeSel.disabled = !sizes.length;
    }

    OH.api.listProducts().then((allProducts) => {
      allProductsCache = allProducts.filter((p) => p.status !== 'inactive');
      if (!allProductsCache.length) {
        OH.dom.qs('#product-list').innerHTML = `<div class="empty-state">${I.image}<h4>Mahsulot topilmadi</h4><p>Sotuvda mavjud mahsulot yo'q</p></div>`;
        return;
      }
      renderProductList(allProductsCache);
      OH.dom.qs('#f-product-search').addEventListener('input', OH.dom.debounce((e) => {
        const q = e.target.value.trim().toLowerCase();
        const filtered = !q ? allProductsCache : allProductsCache.filter((p) =>
          p.name.toLowerCase().includes(q) || (p.barcode || '').toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q));
        renderProductList(filtered);
      }, 250));
    });

    // ---- compact sotuvchilar multi-select (dropdown + checkbox list) ----
    const trigger = OH.dom.qs('#seller-trigger');
    const panel = OH.dom.qs('#seller-panel');
    trigger.addEventListener('click', () => {
      trigger.classList.toggle('open');
      panel.classList.toggle('show');
    });
    container.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && !trigger.contains(e.target)) { panel.classList.remove('show'); trigger.classList.remove('open'); }
    });

    function renderSellerPanel(list) {
      panel.innerHTML = `
        <div class="oc-seller-search"><input class="input" id="seller-search" placeholder="Sotuvchi qidirish..." /></div>
        ${list.length ? list.map((s) => `
          <label class="oc-seller-item"><input type="checkbox" data-id="${s.id}" ${selectedSellers.has(s.id) ? 'checked' : ''}/> ${OH.dom.escapeHtml(s.name)}</label>
        `).join('') : `<div class="oc-product-empty">Sotuvchi topilmadi</div>`}`;
      OH.dom.qsa('.oc-seller-item input', panel).forEach((cb) => cb.addEventListener('change', () => {
        if (cb.checked) selectedSellers.add(cb.dataset.id); else selectedSellers.delete(cb.dataset.id);
        updateSummary();
      }));
      OH.dom.qs('#seller-search', panel).addEventListener('input', OH.dom.debounce((e) => {
        const q = e.target.value.trim().toLowerCase();
        renderSellerPanel(!q ? allSellersCache : allSellersCache.filter((s) => s.name.toLowerCase().includes(q)));
      }, 200));
    }

    OH.api.listSellers({ }).then((sellers) => {
      allSellersCache = sellers.filter((s) => s.status !== 'blocked');
      renderSellerPanel(allSellersCache);
    });

    OH.dom.qs('#f-qty').addEventListener('input', updateSummary);
    OH.dom.qs('#f-color').addEventListener('change', updateSummary);
    OH.dom.qs('#f-size').addEventListener('change', updateSummary);

    function updateSummary() {
      const qty = Math.max(1, +OH.dom.qs('#f-qty').value || 1);
      const price = selectedProduct ? selectedProduct.costPrice : 0;
      const color = OH.dom.qs('#f-color').value;
      const size = OH.dom.qs('#f-size').value;
      OH.dom.qs('#s-product').textContent = selectedProduct ? selectedProduct.name : '—';
      OH.dom.qs('#s-qty').textContent = qty + ' dona';
      OH.dom.qs('#s-variant').textContent = (color || size) ? [color, size].filter(Boolean).join(' / ') : '—';
      OH.dom.qs('#s-price').textContent = F.money(price);

      // ✨ YANGI (v1.2): Admin Ombori tekshiruvi va foydalanish tanlovi.
      // Standart holatda tizim AVVAL Admin Omboridagi mavjud miqdorni taklif qiladi
      // (ustuvorlik — 9-band), qolgan qism esa avtomatik sotuvchilarga yuboriladi.
      // Admin xohlasa bu miqdorni pastga tushirib/kamaytirib o'zgartira oladi (11-band — yakuniy qaror admin qo'lida).
      const whHolder = OH.dom.qs('#wh-note-holder');
      if (!selectedProduct || warehouseAvailable <= 0) {
        whHolder.innerHTML = selectedProduct
          ? `<div class="wh-stock-note empty">${I.warehouse} Admin omborida bu mahsulotdan zaxira yo'q</div>` : '';
      } else {
        const maxUse = Math.min(qty, warehouseAvailable);
        const prevVal = OH.dom.qs('#wh-use-qty');
        // Agar admin hali qo'lda o'zgartirmagan bo'lsa — miqdor o'zgarganda ham har doim
        // "avval ombordan to'liq" standartiga qaytariladi. Qo'lda o'zgartirilgan bo'lsa, saqlanadi (faqat yangi maksimumga qisqartiriladi).
        const currentVal = whManuallyEdited && prevVal ? Math.min(maxUse, Math.max(0, +prevVal.value || 0)) : maxUse;
        whHolder.innerHTML = `
          <div class="wh-stock-note">${I.warehouse} Admin omborida: <b>${warehouseAvailable} dona</b> mavjud — avval shu yerdan olinadi</div>
          <div class="wh-use-row">
            <input type="number" class="input" id="wh-use-qty" min="0" max="${maxUse}" value="${currentVal}" placeholder="Ombordan foydalanish miqdori" />
            <button type="button" class="btn btn-ghost btn-sm" id="wh-use-all">Hammasini ombordan olish (${maxUse})</button>
          </div>
          <p class="hint">Standart bo'yicha buyurtma AVVAL Admin Omboridan qoplanadi, qolgani sotuvchilarga yuboriladi. Kerak bo'lsa miqdorni pastga tushirib o'zgartirishingiz mumkin.</p>`;
        OH.dom.qs('#wh-use-qty').addEventListener('input', () => { whManuallyEdited = true; updateSummary(); });
        OH.dom.qs('#wh-use-all').addEventListener('click', () => {
          OH.dom.qs('#wh-use-qty').value = maxUse;
          whManuallyEdited = false;
          updateSummary();
        });
      }

      const whInput = OH.dom.qs('#wh-use-qty');
      const maxUse = selectedProduct ? Math.min(qty, warehouseAvailable) : 0;
      const warehouseQty = whInput ? Math.max(0, Math.min(maxUse, Math.floor(+whInput.value || 0))) : 0;
      const sellerQty = qty - warehouseQty;

      const fulfillHolder = OH.dom.qs('#s-fulfill-holder');
      fulfillHolder.innerHTML = warehouseQty > 0
        ? `<div class="summary-row"><span class="text-muted">Yetkazib berish manbasi</span><span>
            <span class="fulfill-chip">Ombordan: ${warehouseQty}</span> ${sellerQty > 0 ? `<span class="fulfill-chip seller">Sotuvchilarga: ${sellerQty}</span>` : ''}
          </span></div>` : '';

      OH.dom.qs('#s-total').textContent = F.money(qty * price);
      OH.dom.qs('#seller-count').textContent = selectedSellers.size + ' ta tanlangan';
      OH.dom.qs('#seller-trigger-label').textContent = selectedSellers.size ? selectedSellers.size + ' ta sotuvchi tanlandi' : 'Sotuvchilarni tanlang';

      // Agar butun buyurtma Admin Omboridan qoplansa, sotuvchi tanlash shart emas.
      const sellerWrap = OH.dom.qs('#seller-select-wrap');
      if (sellerWrap) sellerWrap.style.opacity = sellerQty === 0 ? '.5' : '1';
    }

    OH.dom.qs('#btn-create').addEventListener('click', () => {
      const qty = Math.max(1, +OH.dom.qs('#f-qty').value || 1);
      if (!selectedProduct) return OH.toast.error('Mahsulot tanlanmagan', 'Iltimos ro\'yxatdan mahsulot tanlang');
      const whInput = OH.dom.qs('#wh-use-qty');
      const maxUse = Math.min(qty, warehouseAvailable);
      const warehouseQty = whInput ? Math.max(0, Math.min(maxUse, Math.floor(+whInput.value || 0))) : 0;
      const sellerQty = qty - warehouseQty;
      if (sellerQty > 0 && !selectedSellers.size) return OH.toast.error('Sotuvchi tanlanmagan', 'Kamida bitta sotuvchini belgilang');
      OH.api.createOrder({
        productId: selectedProduct.id, qty, price: selectedProduct.costPrice,
        color: OH.dom.qs('#f-color').value, size: OH.dom.qs('#f-size').value,
        sellerIds: Array.from(selectedSellers), warehouseQty,
      }).then((order) => {
        if (order.warehouseQty && order.sellerQty === 0) {
          OH.toast.success('Buyurtma yaratildi', order.id + ' — to\'liq Admin Omboridan yetkazildi');
        } else if (order.warehouseQty) {
          OH.toast.success('Buyurtma yaratildi', order.warehouseQty + ' dona ombordan, ' + order.sellerQty + ' dona ' + order.broadcastTo.length + ' ta sotuvchiga yuborildi');
        } else {
          OH.toast.success('Buyurtma yaratildi', order.broadcastTo.length + ' ta sotuvchiga yuborildi');
        }
        location.hash = '#/orders';
      });
    });
  }

  OH.pages = OH.pages || {};
  OH.pages.orderCreate = { mount };
})(window.OH = window.OH || {});

(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function barcodeBars(code) {
    return Array.from(code).map((d) => `<span style="height:${30 + (parseInt(d, 10) * 3)}px"></span>`).join('');
  }

  function rowHtml(p) {
    const st = F.PRODUCT_STATUS_META[p.status];
    const thumb = p.img
      ? `<img src="${OH.dom.escapeHtml(p.img)}" class="thumb" alt="" onerror="this.style.opacity='0'" />`
      : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted)">${I.image}</div>`;
    const variants = [p.colors && p.colors.length ? p.colors.length + ' rang' : '', p.sizes && p.sizes.length ? p.sizes.length + " o'lcham" : ''].filter(Boolean).join(' · ');
    return `<tr data-id="${p.id}">
      <td data-label="">${thumb}</td>
      <td data-label="Nomi" class="cell-main">${OH.dom.escapeHtml(p.name)}${variants ? `<div class="cell-sub">${variants}</div>` : ''}</td>
      <td data-label="Shtrix-kod" class="mono text-muted">${p.barcode}</td>

        <button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="edit" data-tip="Tahrirlash">${I.edit}</button>
        <button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="del" data-tip="O'chirish">${I.trash}</button>

  function mount(container) {
    container.innerHTML = `<div class="page">

      </div>
      <div class="toolbar">
        <div class="input-icon-wrap toolbar__search">${I.search}<input class="input" id="f-search" placeholder="Nomi yoki shtrix kod bo'yicha qidirish..." /></div>

        <select class="select" id="f-status">
          <option value="all">Barcha statuslar</option>
          <option value="active">Sotuvda</option>
          <option value="inactive">Nofaol</option>

      <div class="table-wrap">

          <tbody id="p-tbody">${OH.skeleton.tableRows(6, 6)}</tbody>
        </table>
        <div class="pagination" id="p-pagination"></div>
      </div>
    </div>`;

    OH.dom.qs('#btn-add').addEventListener('click', () => openForm());
    OH.dom.qs('#f-search').addEventListener('input', OH.dom.debounce(load, 300));
    OH.dom.qs('#f-category').addEventListener('change', load);
    OH.dom.qs('#f-status').addEventListener('change', load);
    OH.dom.qs('#f-clear').addEventListener('click', () => {
      OH.dom.qs('#f-search').value = ''; OH.dom.qs('#f-category').value = 'all'; OH.dom.qs('#f-status').value = 'all';
      load();
    });

    OH.api.listProductCategories().then((cats) => {
      const sel = OH.dom.qs('#f-category');
      cats.forEach((c) => sel.insertAdjacentHTML('beforeend', `<option value="${OH.dom.escapeHtml(c)}">${OH.dom.escapeHtml(c)}</option>`));
    });

    function load() {
      OH.api.listProducts({
        q: OH.dom.qs('#f-search').value.trim(),
        category: OH.dom.qs('#f-category').value,
        status: OH.dom.qs('#f-status').value,
      }).then((rows) => {
        const tbody = OH.dom.qs('#p-tbody');
        const pagBox = OH.dom.qs('#p-pagination');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">${I.products}<h4>Mahsulot topilmadi</h4></div></td></tr>`;
          pagBox.innerHTML = '';
          return;
        }
        const pager = OH.table.paginate(rows, 8, (slice) => { tbody.innerHTML = slice.map(rowHtml).join(''); bindRows(); });
        pager.renderPage();
        pager.renderControls(pagBox);
      });
    }

    function bindRows() {
      OH.dom.qsa('#p-tbody tr[data-id]').forEach((tr) => {
        const id = tr.dataset.id;
        tr.querySelector('[data-act="edit"]').addEventListener('click', () => {
          OH.api.listProducts().then((rows) => openForm(rows.find((x) => x.id === id)));
        });
        tr.querySelector('[data-act="del"]').addEventListener('click', () => {
          OH.modal.confirm({
            title: "Mahsulotni o'chirish",
            message: "Bu mahsulotni ombordan butunlay o'chirmoqchimisiz?",
            confirmText: "O'chirish",
            onConfirm: () => OH.api.deleteProduct(id).then(() => { OH.toast.success("Mahsulot o'chirildi"); load(); }),
          });
        });
      });
    }

    function openForm(product) {
      const isEdit = !!product;
      OH.modal.open({
        title: isEdit ? "Mahsulotni tahrirlash" : "Yangi mahsulot qo'shish",

        bodyHtml: `
          <div class="field"><label>Mahsulot nomi *</label><input class="input" id="pf-name" value="${OH.dom.escapeHtml(product?.name || '')}" /></div>
          <div class="field"><label>SKU Kodi (Unikal) *</label><input class="input mono" id="pf-sku" value="${OH.dom.escapeHtml(product?.sku || '')}" /></div>
          <div class="field"><label>Shtrixkod (Ixtiyoriy)</label><input class="input mono" id="pf-barcode" value="${OH.dom.escapeHtml(product?.barcode || '')}" /></div>

          <div class="field"><label>Ulgurji Narxi (Tannarx UZS) *</label><input type="number" min="0" class="input pf-cost" id="pf-costPrice" value="${product?.costPrice ?? ''}" /></div>
          <div class="field"><label>Sotilish Narxi (Marketplace UZS)</label><input type="number" min="0" class="input pf-cost" id="pf-price" value="${product?.price ?? ''}" placeholder="Ixtiyoriy" /></div>
          <div class="field"><label>Marketpleys Foizi (%)</label><input type="number" min="0" max="100" class="input pf-cost" id="pf-commissionPct" value="${product?.commissionPct ?? ''}" placeholder="Masalan: 12" /></div>
          <div class="field"><label>Logistika Summasi (UZS)</label><input type="number" min="0" class="input pf-cost" id="pf-logisticsCost" value="${product?.logisticsCost ?? ''}" placeholder="Masalan: 15000" /></div>
          <div class="field"><label>Status</label><select class="select" id="pf-status">

            <option value="inactive" ${product?.status === 'inactive' ? 'selected' : ''}>Nofaol</option>
          </select></div>
          <div class="field"><label>Rasm URL manzili</label><input class="input" id="pf-img" value="${OH.dom.escapeHtml(product?.img || '')}" placeholder="https://..." /></div>

          <div class="field">
            <label>Mavjud Ranglar (checkbox bilan tanlash yoki yangi qo'shish)</label>
            <div id="pf-color-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px"></div>

              <input class="input" id="pf-color-new" placeholder="Yangi rang: Qora, Oq, Qizil..." style="flex:1" />

            <label>Mavjud O'lchamlar (vergul bilan ajratilgan)</label>
            <input class="input" id="pf-sizes" value="${OH.dom.escapeHtml((product?.sizes || []).join(', '))}" placeholder="Masalan: S, M, L, XL" />
            <div class="hint">Kiyim uchun: XS, S, M, L, XL, XXL yoki 36, 37, 38... (poyabzal uchun)</div>
          </div>

          <div class="summary-total"><span>Sof foyda (dona uchun, avtomatik)</span><b class="mono" id="pf-net-profit">0 so'm</b></div>`,
        footHtml: `<button class="btn btn-ghost" id="pf-cancel">Bekor qilish</button><button class="btn btn-primary" id="pf-save">${isEdit ? 'Saqlash' : "Qo'shish"}</button>`,
        onMount: (m) => {
          m.querySelector('#pf-cancel').addEventListener('click', OH.modal.close);

          // Ranglar: mavjud (barcha mahsulotlardagi) + shu mahsulotda tanlangan ranglar checkbox ro'yxati.
          const selectedColors = new Set(product?.colors || []);
          function renderColorList(allColors) {
            const box = m.querySelector('#pf-color-list');
            const colors = Array.from(new Set([...allColors, ...selectedColors]));
            box.innerHTML = colors.length
              ? colors.map((c) => `<label class="chip-checkbox"><input type="checkbox" value="${OH.dom.escapeHtml(c)}" ${selectedColors.has(c) ? 'checked' : ''}/> ${OH.dom.escapeHtml(c)}</label>`).join('')
              : `<span class="text-muted" style="font-size:12.5px">Hali rang qo'shilmagan</span>`;
            box.querySelectorAll('input[type="checkbox"]').forEach((cb) => cb.addEventListener('change', () => {
              if (cb.checked) selectedColors.add(cb.value); else selectedColors.delete(cb.value);
            }));
          }
          OH.api.listProductColors().then(renderColorList);
          m.querySelector('#pf-color-add').addEventListener('click', () => {
            const input = m.querySelector('#pf-color-new');
            const val = input.value.trim();
            if (!val) return;
            selectedColors.add(val);
            input.value = '';
            OH.api.listProductColors().then(renderColorList);
          });

          function recalcNetProfit() {
            const price = +m.querySelector('#pf-price').value || 0;
            const costPrice = +m.querySelector('#pf-costPrice').value || 0;
            const commissionPct = +m.querySelector('#pf-commissionPct').value || 0;
            const logisticsCost = +m.querySelector('#pf-logisticsCost').value || 0;
            const net = price - costPrice - (price * commissionPct / 100) - logisticsCost;
            const el = m.querySelector('#pf-net-profit');
            el.textContent = F.money(net);
            el.className = 'mono ' + (net >= 0 ? 'text-success' : 'text-danger');
          }
          m.querySelectorAll('.pf-cost').forEach((inp) => inp.addEventListener('input', recalcNetProfit));
          recalcNetProfit();

          m.querySelector('#pf-save').addEventListener('click', () => {
            const name = m.querySelector('#pf-name').value.trim();
            const sku = m.querySelector('#pf-sku').value.trim();
            const category = m.querySelector('#pf-category').value.trim();
            const costPrice = +m.querySelector('#pf-costPrice').value || 0;
            if (!name) return OH.toast.error('Mahsulot nomi kiritilmagan');
            if (!sku) return OH.toast.error('SKU kodi kiritilmagan');
            if (!category) return OH.toast.error('Kategoriya kiritilmagan');
            if (!costPrice) return OH.toast.error('Ulgurji narxi kiritilmagan');
            OH.api.listProducts().then((all) => {
              const dup = all.find((p) => p.sku === sku && p.id !== product?.id);
              if (dup) return OH.toast.error('Bu SKU kodi allaqachon mavjud', "Boshqa SKU kiriting");
              const status = m.querySelector('#pf-status').value;
              const sizes = m.querySelector('#pf-sizes').value.split(',').map((s) => s.trim()).filter(Boolean);
              OH.api.saveProduct({
                id: product?.id, name, sku, category, costPrice, status,
                price: +m.querySelector('#pf-price').value || 0,
                commissionPct: +m.querySelector('#pf-commissionPct').value || 0,
                logisticsCost: +m.querySelector('#pf-logisticsCost').value || 0,
                barcode: m.querySelector('#pf-barcode').value.trim() || undefined,
                img: m.querySelector('#pf-img').value.trim() || null,
                colors: Array.from(selectedColors),
                sizes,
              }).then(() => {
                OH.modal.close();
                OH.toast.success(isEdit ? 'Mahsulot yangilandi' : "Mahsulot qo'shildi");
                load();
              });
            });
          });
        },
      });
    }

    load();
  }

  OH.pages = OH.pages || {};
  OH.pages.products = { mount };
})(window.OH = window.OH || {});


/* ===== pages/sellers.js ===== */
(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  function cardHtml(s) {
    const st = F.SELLER_STATUS_META[s.status];
    return `<div class="card seller-card card-hover" data-id="${s.id}" style="cursor:pointer">
      <div class="seller-card__top">
        <div class="seller-avatar">${OH.dom.initials(s.name).toUpperCase()}</div>
        <div style="flex:1"><div class="cell-main">${OH.dom.escapeHtml(s.name)}</div><div class="cell-sub">${s.phone}</div></div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      <div class="seller-card__stats">
        <div><b>${s.activeOrders}</b><span>FAOL</span></div>
        <div><b>${s.completedOrders}</b><span>TUGALLANGAN</span></div>
      </div>
      <div class="summary-row"><span class="text-muted">To'lanishi kerak</span><b class="mono ${s.debt > 0 ? 'text-danger' : 'text-success'}">${F.money(s.debt)}</b></div>
      <div class="summary-row"><span class="text-muted">To'langan</span><b class="mono">${F.money(s.paid)}</b></div>

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isAdmin = session.role !== 'seller';
    container.innerHTML = `<div class="page">
      <div class="page-head"><div></div>
        <div class="page-head__actions">${isAdmin ? `<button class="btn btn-primary" id="btn-add-seller">${I.plus} Sotuvchi qo'shish</button>` : ''}</div>
      </div>
      <div class="toolbar">
        <div class="input-icon-wrap toolbar__search">${I.search}<input class="input" id="f-search" placeholder="Ism yoki telefon raqami bo'yicha qidirish..." /></div>
        <select class="select" id="f-status">
          <option value="all">Barcha statuslar</option>
          <option value="active">Faol</option>
          <option value="inactive">Nofaol</option>
          <option value="blocked">Bloklangan</option>
        </select>
      </div>
      <div class="seller-grid" id="seller-grid">${OH.skeleton.cards(6)}</div>
    </div>`;

    OH.dom.qs('#f-search').addEventListener('input', OH.dom.debounce(load, 300));
    OH.dom.qs('#f-status').addEventListener('change', load);
    OH.dom.qs('#btn-add-seller')?.addEventListener('click', () => openForm());
    load();

    function load() {
      OH.api.listSellers({ q: OH.dom.qs('#f-search').value.trim() }).then((rows) => {
        const statusFilter = OH.dom.qs('#f-status').value;
        if (statusFilter !== 'all') rows = rows.filter((s) => s.status === statusFilter);
        const grid = OH.dom.qs('#seller-grid');
        if (!rows.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">${I.sellers}<h4>Sotuvchi topilmadi</h4></div>`;
          return;
        }
        grid.innerHTML = rows.map(cardHtml).join('');
        OH.dom.qsa('.seller-card').forEach((c) => c.addEventListener('click', () => openProfile(c.dataset.id)));
      });
    }

    function openForm(seller) {
      const isEdit = !!seller;
      OH.modal.open({
        title: isEdit ? 'Sotuvchini tahrirlash' : "Yangi sotuvchi qo'shish",
        bodyHtml: `
          <div class="field"><label>To'liq ismi</label><input class="input" id="sf-name" value="${OH.dom.escapeHtml(seller?.name || '')}" placeholder="Masalan: Aziz Karimov" /></div>
          <div class="form-row-2">
            <div class="field"><label>Telefon raqami</label><input class="input" id="sf-phone" value="${OH.dom.escapeHtml(seller?.phone || '')}" placeholder="+998 90 123 45 67" /></div>
            <div class="field"><label>Status</label>
              <select class="select" id="sf-status">
                <option value="active" ${seller?.status === 'active' || !seller ? 'selected' : ''}>Faol</option>
                <option value="inactive" ${seller?.status === 'inactive' ? 'selected' : ''}>Nofaol</option>
                <option value="blocked" ${seller?.status === 'blocked' ? 'selected' : ''}>Bloklangan</option>
              </select>
            </div>
          </div>
          <div class="section-title-row"><h3>Tizimga kirish ma'lumotlari</h3></div>
          <div class="form-row-2">
            <div class="field"><label>Login</label><input class="input" id="sf-login" value="${OH.dom.escapeHtml(seller?.login || '')}" placeholder="seller_login" /></div>
            <div class="field"><label>Parol</label>
              <div style="display:flex;gap:8px">
                <input class="input mono" id="sf-password" value="${OH.dom.escapeHtml(seller?.password || Math.random().toString(36).slice(2, 8))}" />
                <button class="btn btn-secondary" id="sf-gen-pass" data-tip="Yangi parol yaratish">${I.refresh}</button>
              </div>
            </div>
          </div>`,
        footHtml: `<button class="btn btn-ghost" id="sf-cancel">Bekor qilish</button><button class="btn btn-primary" id="sf-save">${isEdit ? 'Saqlash' : "Qo'shish"}</button>`,
        onMount: (m) => {
          m.querySelector('#sf-cancel').addEventListener('click', OH.modal.close);
          m.querySelector('#sf-gen-pass').addEventListener('click', () => {
            m.querySelector('#sf-password').value = Math.random().toString(36).slice(2, 8);
          });
          m.querySelector('#sf-save').addEventListener('click', () => {
            const name = m.querySelector('#sf-name').value.trim();
            const phone = m.querySelector('#sf-phone').value.trim();
            if (!name) return OH.toast.error('Ism kiritilmagan');
            if (!phone) return OH.toast.error('Telefon raqami kiritilmagan');
            OH.api.saveSeller({
              id: seller?.id, name, phone,
              status: m.querySelector('#sf-status').value,
              login: m.querySelector('#sf-login').value.trim(),
              password: m.querySelector('#sf-password').value,
            }).then(() => {
              OH.modal.close();
              OH.toast.success(isEdit ? 'Sotuvchi yangilandi' : "Sotuvchi qo'shildi");
              load();
            });
          });
        },
      });
    }

    function openProfile(id) {
      Promise.all([OH.api.getSeller(id), OH.api.getSellerOrders(id)]).then(([s, orders]) => {
        const st = F.SELLER_STATUS_META[s.status];
        // TUZATISH: Buyurtma qabul etish/rad etish tarixi va qarzi detallari
        OH.modal.open({
          title: 'Sotuvchi profili', size: 'lg',
          bodyHtml: `
            <div class="profile-hero">
              <div class="seller-avatar">${OH.dom.initials(s.name).toUpperCase()}</div>
              <div style="flex:1"><h3 style="font-size:18px">${OH.dom.escapeHtml(s.name)}</h3><div class="text-muted" style="font-size:12.5px">${s.phone} · ${s.id}</div></div>
              <span class="badge ${st.cls}">${st.label}</span>
            </div>
            <div class="seller-card__stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
              <div><b>${s.activeOrders}</b><span>FAOL</span></div>
              <div><b>${s.completedOrders}</b><span>TUGALLANGAN</span></div>
              <div><b class="mono text-danger">${F.numShort(s.debt)}</b><span>TO'LANADI</span></div>
              <div><b class="mono text-success">${F.numShort(s.paid)}</b><span>TO'LANGAN</span></div>
            </div>
            ${isAdmin ? `
            <div class="section-title-row" style="margin-top:0"><h3>Tizimga kirish ma'lumotlari</h3></div>
            <div class="summary-row"><span class="text-muted">Login</span><b class="mono">${OH.dom.escapeHtml(s.login || '—')}</b></div>
            <div class="summary-row"><span class="text-muted">Parol</span><b class="mono">${OH.dom.escapeHtml(s.password || '—')}</b></div>` : ''}
            <div class="section-title-row"><h3>Buyurtmalar tarixi</h3></div>
            <div class="table-wrap" style="max-height:280px;overflow-y:auto">
              <table class="data-table">
                <thead><tr><th>ID</th><th>Mahsulot</th><th>Sana</th><th>Holati</th></tr></thead>
                <tbody>${orders.length ? orders.map((o) => `<tr><td data-label="ID" class="mono">${o.id}</td><td data-label="Mahsulot">${OH.dom.escapeHtml(o.productName)}</td><td data-label="Sana">${F.date(o.date)}</td><td data-label="Holati"><span class="badge ${F.ORDER_STATUS_META[o.status].cls}">${F.ORDER_STATUS_META[o.status].label}</span></td></tr>`).join('') : `<tr><td colspan="4" class="text-muted" style="text-align:center;padding:24px">Buyurtmalar mavjud emas</td></tr>`}</tbody>
              </table>
            </div>`,
          footHtml: isAdmin
            ? `<button class="btn btn-danger" id="del-seller" style="margin-right:auto">${I.trash} O'chirish</button>
               <button class="btn btn-secondary" id="regen-pass">${I.key} Parolni yangilash</button>
               <button class="btn btn-secondary" id="edit-seller">${I.edit} Tahrirlash</button>
               <button class="btn btn-primary" id="close-p">Yopish</button>`
            : `<button class="btn btn-secondary" id="close-p">Yopish</button>`,
          onMount: (m) => {
            m.querySelector('#close-p').addEventListener('click', OH.modal.close);
            m.querySelector('#edit-seller')?.addEventListener('click', () => { OH.modal.close(); openForm(s); });
            m.querySelector('#regen-pass')?.addEventListener('click', () => {
              OH.api.regenerateSellerCredentials(s.id).then((updated) => {
                OH.toast.success('Parol yangilandi', 'Yangi parol: ' + updated.password);
                OH.modal.close();
                openProfile(s.id);
              });
            });
            m.querySelector('#del-seller')?.addEventListener('click', () => {
              OH.modal.confirm({
                title: "Sotuvchini o'chirish",
                message: `${s.name} tizimdan butunlay o'chiriladi. Davom etasizmi?`,
                confirmText: "O'chirish",
                onConfirm: () => OH.api.deleteSeller(s.id).then(() => {
                  OH.toast.success("Sotuvchi o'chirildi");
                  OH.modal.close();
                  load();
                }),
              });
            });
          },
        });
      });
    }
  }

  OH.pages = OH.pages || {};
  OH.pages.sellers = { mount };
})(window.OH = window.OH || {});


/* ===== pages/payments.js ===== */
(function (OH) {
  'use strict';
  const I = OH.icons, F = OH.format;

  const CLAIM_STATUS_META = {
    sent: { label: 'Yuborilgan', cls: 'badge-info' },
    confirmed: { label: "To'landi", cls: 'badge-success' },
    rejected: { label: 'Rad etilgan', cls: 'badge-danger' },
  };

  // Har bir buyurtma uchun ixcham to'lov tarixi qatori — jami/to'langan/qoldiq
  // aniq ko'rinadi (masalan 130 000 dan 100 000 to'langan bo'lsa, 30 000 qoldi deb chiqadi).
  function historyRowHtml(r, isSeller) {
    const st = r.remaining <= 0 ? CLAIM_STATUS_META.confirmed : (r.pendingClaim ? CLAIM_STATUS_META.sent : { label: 'Chala to\'lov', cls: 'badge-warning' });
    const canPay = !isSeller && r.orderStatus === 'done' && r.remaining > 0 && !r.pendingClaim;
    const canReview = isSeller && !!r.pendingClaim;
    return `<tr data-order="${r.orderId}">
      <td data-label="Sana">${F.date(r.lastDate)}</td>
      <td data-label="Buyurtma"><div class="cell-main">${OH.dom.escapeHtml(r.productName || r.orderId)}</div><div class="cell-sub">${r.orderId}${!isSeller ? ' · ' + OH.dom.escapeHtml(r.sellerName) : ''}</div></td>
      <td data-label="Jami" class="mono">${F.money(r.total)}</td>
      <td data-label="To'landi" class="mono text-success">${F.money(r.paid)}</td>
      <td data-label="Qoldi" class="mono ${r.remaining > 0 ? 'text-danger' : 'text-muted'}">${F.money(r.remaining)}</td>
      <td data-label="Holat"><span class="badge ${st.cls}">${st.label}</span></td>
      <td data-label="Amallar"><div class="row-actions">
        ${canPay ? `<button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="pay" data-tip="To'lov qilish">${I.wallet}</button>` : ''}
        ${canReview ? `<button class="icon-btn btn-sm" style="width:33px;height:33px" data-act="review" data-tip="Ko'rib chiqish">${I.payments}</button>` : ''}
      </div></td>
    </tr>`;
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isSeller = session.role === 'seller';
    container.innerHTML = `<div class="page">
      <div class="page-head"><div><h1>To'lovlar tarixi</h1><div class="crumb">${isSeller ? "Buyurtmalaringiz uchun qilingan to'lovlar" : "Har bir buyurtma bo'yicha to'lov holati"}</div></div><div></div></div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Sana</th><th>Buyurtma</th><th>Jami</th><th>To'landi</th><th>Qoldi</th><th>Holat</th><th>Amallar</th></tr></thead>
          <tbody id="ph-tbody">${OH.skeleton.tableRows(4, 7)}</tbody>
        </table>
      </div>
    </div>`;

    load();

    function load() {
      OH.api.listOrderPaymentHistory(isSeller ? { sellerId: session.sellerId } : {}).then((rows) => {
        const tbody = OH.dom.qs('#ph-tbody');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">${I.payments}<h4>Hozircha to'lov tarixi yo'q</h4><p>${isSeller ? "Buyurtmangiz yetkazilib, admin to'lov qilgach shu yerda ko'rinadi" : "Buyurtma \"Yetkazildi\" bo'lgach, sotuvchiga to'lov qiling"}</p></div></td></tr>`;
          return;
        }
        tbody.innerHTML = rows.map((r) => historyRowHtml(r, isSeller)).join('');
        bindRows(rows);
      });
    }

    function bindRows(rows) {
      OH.dom.qsa('#ph-tbody tr[data-order]').forEach((tr) => {
        const orderId = tr.dataset.order;
        const r = rows.find((x) => x.orderId === orderId);
        tr.querySelector('[data-act="pay"]')?.addEventListener('click', () => openPay(r));
        tr.querySelector('[data-act="review"]')?.addEventListener('click', () => openReview(r));
      });
    }

    // Admin: buyurtmaning qoldiq summasini (yoki bir qismini) sotuvchiga to'laydi.
    function openPay(r) {
      let receiptData = null;
      OH.modal.open({
        title: "To'lov qilish — " + r.orderId,
        bodyHtml: `
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">${OH.dom.escapeHtml(r.sellerName)} uchun qoldiq: <b class="mono text-danger">${F.money(r.remaining)}</b></p>
          <div class="field"><label>To'lanadigan summa</label><input type="number" class="input" id="pf-amount" value="${r.remaining}" max="${r.remaining}" min="1" /></div>
          <div class="field"><label>Izoh (ixtiyoriy)</label><input class="input" id="pf-comment" placeholder="Masalan: naqd to'landi" /></div>
          <div class="field"><label>Chek/kvitansiya rasmi *</label><input type="file" accept="image/*" class="input" id="pf-file" /></div>`,
        footHtml: `<button class="btn btn-ghost" id="pf-cancel">Bekor qilish</button><button class="btn btn-primary" id="pf-ok">Yuborish</button>`,
        onMount: (m) => {
          m.querySelector('#pf-cancel').addEventListener('click', OH.modal.close);
          m.querySelector('#pf-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => { receiptData = reader.result; };
            reader.readAsDataURL(file);
          });
          m.querySelector('#pf-ok').addEventListener('click', () => {
            const amount = Math.min(r.remaining, Math.max(0, +m.querySelector('#pf-amount').value || 0));
            if (amount <= 0) return OH.toast.error("Summani kiriting");
            if (!receiptData) return OH.toast.error("Chek rasmi majburiy", "Iltimos to'lov chekini yuklang");
            OH.api.sendOrderPayment(r.orderId, amount, m.querySelector('#pf-comment').value.trim(), receiptData).then((res) => {
              if (!res || !res.ok) { OH.modal.close(); OH.toast.error("Amalga oshmadi"); load(); return; }
              OH.modal.close();
              OH.toast.success("To'lov yuborildi", r.sellerName + " tasdiqlashini kuting");
              load();
            });
          });
        },
      });
    }

    // Sotuvchi: admin yuborgan to'lovni ko'rib chiqadi — tasdiqlasa (yoki qoldiq nolga tushsa) buyurtma yopiladi.
    function openReview(r) {
      const claim = r.pendingClaim;
      if (!claim) return;
      OH.modal.open({
        title: "To'lovni ko'rib chiqish — " + r.orderId,
        bodyHtml: `
          <div class="summary-row"><span class="text-muted">Sana</span><b>${F.date(claim.date)}</b></div>
          <div class="summary-row"><span class="text-muted">Summa</span><b class="mono">${F.money(claim.amount)}</b></div>
          ${claim.comment ? `<div class="summary-row"><span class="text-muted">Izoh</span><b>${OH.dom.escapeHtml(claim.comment)}</b></div>` : ''}
          ${claim.receipt ? `<div class="field" style="margin-top:14px"><label>Chek</label><img src="${claim.receipt}" style="width:100%;border-radius:12px" /></div>` : '<p class="text-muted">Chek biriktirilmagan</p>'}`,
        footHtml: `<button class="btn btn-ghost" id="rp-reject">${I.x} Rad etish</button><button class="btn btn-primary" id="rp-confirm">${I.check} Qabul qilish</button>`,
        onMount: (m) => {
          m.querySelector('#rp-reject').addEventListener('click', () => {
            OH.modal.close();
            OH.modal.open({
              title: "To'lovni rad etish",
              bodyHtml: `<div class="field"><label>Sababi</label><textarea class="input" id="rp-reason" rows="3" placeholder="Masalan: summa mos kelmadi..."></textarea></div>`,
              footHtml: `<button class="btn btn-ghost" id="rp-reason-cancel">Bekor qilish</button><button class="btn btn-danger" id="rp-reason-ok">Rad etish</button>`,
              onMount: (m2) => {
                m2.querySelector('#rp-reason-cancel').addEventListener('click', OH.modal.close);
                m2.querySelector('#rp-reason-ok').addEventListener('click', () => {
                  OH.api.rejectOrderPayment(claim.id, session.sellerId, m2.querySelector('#rp-reason').value.trim()).then(() => {
                    OH.modal.close(); OH.toast.info("To'lov rad etildi"); load();
                  });
                });
              },
            });
          });
          m.querySelector('#rp-confirm').addEventListener('click', () => {
            OH.api.confirmOrderPayment(claim.id, session.sellerId).then((res) => {
              OH.modal.close();
              if (!res || !res.ok) { OH.toast.error("Amalga oshmadi"); load(); return; }
              OH.toast.success("To'lov qabul qilindi");
              load();
            });
          });
        },
      });
    }
  }

  OH.pages = OH.pages || {};
  OH.pages.payments = { mount };
})(window.OH = window.OH || {});

  // ---------- Sana oralig'ini hisoblash ----------
  function fmtDate(d) { return d.toISOString().slice(0, 10); }
  function computeRangeDates(key, customStart, customEnd) {
    const today = new Date();
    const todayStr = fmtDate(today);
    if (key === 'today') return { start: todayStr, end: todayStr, label: 'Bugun — ' + F.date(todayStr) };
    if (key === 'yesterday') {
      const y = new Date(today); y.setDate(y.getDate() - 1);
      return { start: fmtDate(y), end: fmtDate(y), label: 'Kecha — ' + F.date(fmtDate(y)) };
    }
    if (key === '7d') {
      const s = new Date(today); s.setDate(s.getDate() - 6);
      return { start: fmtDate(s), end: todayStr, label: 'Oxirgi 7 kun — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === '30d') {
      const s = new Date(today); s.setDate(s.getDate() - 29);
      return { start: fmtDate(s), end: todayStr, label: 'Oxirgi 30 kun — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === 'month') {
      const s = new Date(today.getFullYear(), today.getMonth(), 1);
      return { start: fmtDate(s), end: todayStr, label: 'Joriy oy — ' + F.date(fmtDate(s)) + ' → ' + F.date(todayStr) };
    }
    if (key === 'custom') {
      const s = customStart || todayStr, e = customEnd || todayStr;
      return { start: s, end: e, label: 'Maxsus oraliq — ' + F.date(s) + ' → ' + F.date(e) };
    }
    return { start: todayStr, end: todayStr, label: 'Bugun — ' + F.date(todayStr) };
  }

    ];
    const wsSummary = XLSX.utils.aoa_to_sheet(summary);

    const detailHeader = ['Buyurtma ID', 'Sana', 'Mahsulot', 'Miqdor', 'Narx', 'Jami summa', 'Holati', 'Sotuvchi', "To'lov holati"];
    const detailRows = stats.rows.map((x) => [x.id, x.date, x.productName, x.qty, x.price, x.total, F.ORDER_STATUS_META[x.status].label, x.sellerName, F.PAYMENT_STATUS_META[x.paymentStatus] ? F.PAYMENT_STATUS_META[x.paymentStatus].label : x.paymentStatus]);
    const wsDetail = XLSX.utils.aoa_to_sheet([detailHeader].concat(detailRows));
    wsDetail['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 26 }, { wch: 8 }, { wch: 12 }, { wch: 14 }, { wch: 22 }, { wch: 20 }, { wch: 20 }];

    const wb = XLSX.utils.book_new();

    h2('6. Batafsil buyurtmalar ro\'yxati');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
    ensureSpace();
    doc.text('ID', marginX, y);

    if (stats.rows.length > rowsToPrint.length) {
      ensureSpace();
      doc.setFont('helvetica', 'italic'); doc.setFontSize(9);
      doc.text('... va yana ' + (stats.rows.length - rowsToPrint.length) + " ta qator (to'liq ro'yxat uchun Excel eksportidan foydalaning)", marginX, y);
    }

          <p class="hint">Faqat "Yakunlandi", "Yopildi" yoki "Admin omboridan yetkazildi" holatidagi buyurtmalar uchun qaytarish rasmiylashtirish mumkin.</p>`,

(function (OH) {

    cancel: { i: I.x, bg: 'var(--danger-bg)', c: 'var(--danger)', label: 'Bekor qilingan' },
  };

  function itemHtml(n) {
    const m = TYPE_META[n.type] || TYPE_META.order;
    return `<div class="notif-page-item">
      <div class="notif-item__icon" style="background:${m.bg};color:${m.c}">${m.i}</div>

      </div>
    </div>`;
  }

  function mount(container) {
    const session = OH.storage.get('session', {}) || {};
    const isAdmin = session.role !== 'seller';
    
    container.innerHTML = `<div class="page">
      <div class="page-head"><div></div><div class="page-head__actions"><button class="btn btn-secondary" id="mark-all">Barchasini o'qish</button></div></div>

      <div class="toolbar">
        <select class="select" id="f-priority">
          <option value="all">Barcha xabarlar</option>

          <option value="unread">O'qilmagan</option>

        ${isAdmin ? `<select class="select" id="f-target">

        <button class="tab" data-type="order">Buyurtma</button>
        <button class="tab" data-type="seller">Sotuvchi</button>
        <button class="tab" data-type="payment">To'lov</button>
        <button class="tab" data-type="cancel">Bekor qilingan</button>
      </div>
      <div class="card" id="notif-list">${OH.skeleton.tableRows(1, 5)}</div>
    </div>`;

    let type = 'all';
    OH.dom.qsa('#notif-tabs .tab').forEach((t) => t.addEventListener('click', () => {
      OH.dom.qsa('#notif-tabs .tab').forEach((x) => x.classList.remove('active'));
      t.classList.add('active'); type = t.dataset.type; load();
    }));

    OH.dom.qs('#f-priority')?.addEventListener('change', load);
    OH.dom.qs('#f-target')?.addEventListener('change', load);

    load();
    function load() {
      OH.api.listNotifications().then((rows) => {
        let filtered = type === 'all' ? rows : rows.filter((n) => n.type === type);
        const priority = OH.dom.qs('#f-priority')?.value;
        if (priority === 'urgent') filtered = filtered.filter((n) => n.type === 'cancel' || n.type === 'payment');
        if (priority === 'unread') filtered = filtered.filter((n) => n.unread);
        // Admin panelida "Admin uchun / Sotuvchi uchun" bo'yicha qo'shimcha filtr
        const targetSel = OH.dom.qs('#f-target')?.value;
        if (targetSel && targetSel !== 'all') filtered = filtered.filter((n) => (n.target || 'ALL') === targetSel);
        const box = OH.dom.qs('#notif-list');
        box.innerHTML = filtered.length ? filtered.map(itemHtml).join('') : `<div class="empty-state">${I.bell}<h4>Bildirishnoma yo'q</h4></div>`;
      });
    }
  }

  OH.pages = OH.pages || {};
  OH.pages.notifications = { mount };

                <b>Sotuvchilar va mahsulotlar ro'yxati o'zgarishsiz saqlanib qoladi.</b> Bu amalni bekor qilib bo'lmaydi.
