<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f0c29"/>
<title>Rus Tili Lug'at Testi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0c29;font-family:'Segoe UI',Tahoma,sans-serif;overflow-x:hidden;min-height:100vh}
input,button,textarea{font-family:inherit}
button{cursor:pointer}
button:active{opacity:0.82;transform:scale(0.97)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.shake{animation:shake 0.5s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}
#app{min-height:100vh;background:linear-gradient(145deg,#0f0c29 0%,#302b63 50%,#24243e 100%);display:flex;align-items:flex-start;justify-content:center;padding:20px 14px 70px;overflow-y:auto}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:34px 20px;max-width:440px;width:100%;text-align:center;margin-top:8px}
.wrap{max-width:440px;width:100%;margin-top:8px}
.btn-primary{background:linear-gradient(135deg,#f5c518,#e8a000);color:#1a1a2e;border:none;border-radius:16px;padding:15px 0;width:100%;font-size:16px;font-weight:800;box-shadow:0 8px 20px rgba(245,197,24,0.3);margin-bottom:10px;display:block}
.btn-danger{background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;border:none;border-radius:16px;padding:13px 0;width:100%;font-size:15px;font-weight:700;box-shadow:0 6px 15px rgba(248,113,113,0.2);margin-bottom:10px;display:block}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.13);border-radius:16px;padding:12px 0;width:100%;font-size:14px;font-weight:600;display:block;margin-bottom:6px}
.btn-back{background:transparent;border:none;color:rgba(255,255,255,0.45);font-size:14px;padding:4px 0}
.opt-btn{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:13px;padding:14px;display:flex;align-items:center;gap:10px;width:100%;color:#fff;text-align:left;font-size:15px;font-weight:600;margin-bottom:8px}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:#4ade80}
.opt-btn.wrong{background:rgba(248,113,113,0.2);border-color:#f87171}
.opt-btn.dim{opacity:0.35}
.opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#f5c518;flex-shrink:0}
.tab-row{display:flex;gap:4px;margin-bottom:13px;background:rgba(255,255,255,0.04);border-radius:14px;padding:4px}
.tab{flex:1;background:transparent;border:none;color:rgba(255,255,255,0.45);padding:9px 2px;border-radius:10px;font-size:12px;font-weight:600}
.tab.active{background:rgba(245,197,24,0.18);color:#f5c518}
.word-row{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:9px 11px;display:flex;align-items:center;justify-content:space-between;gap:7px;margin-bottom:6px}
.form-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:17px}
.form-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:11px 13px;color:#fff;font-size:14px;outline:none;margin-bottom:13px;display:block}
.form-textarea{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:11px 13px;color:#fff;font-size:12px;outline:none;margin-bottom:13px;display:block;resize:vertical;font-family:monospace}
.form-label{display:block;color:rgba(255,255,255,0.45);font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.msg-ok{background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.28);border-radius:10px;padding:9px 11px;color:#4ade80;font-size:13px;margin-bottom:11px}
.msg-err{background:rgba(248,113,113,0.13);border:1px solid rgba(248,113,113,0.28);border-radius:10px;padding:9px 11px;color:#f87171;font-size:13px;margin-bottom:11px}
.word-list{max-height:56vh;overflow-y:auto}
.speaker-icon{font-size:16px;cursor:pointer;background:rgba(255,255,255,0.1);border-radius:50%;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_VOCAB=[
  {id:1,rus:"Привет",uzbek:"Salom"},{id:2,rus:"Спасибо",uzbek:"Rahmat"},{id:3,rus:"Пожалуйста",uzbek:"Iltimos"},
  {id:4,rus:"Да",uzbek:"Ha"},{id:5,rus:"Нет",uzbek:"Yo'q"},{id:6,rus:"Хорошо",uzbek:"Yaxshi"},
  {id:7,rus:"Плохо",uzbek:"Yomon"},{id:8,rus:"Извините",uzbek:"Kechirasiz"},{id:9,rus:"Понятно",uzbek:"Tushunarli"},
  {id:10,rus:"Конечно",uzbek:"Albatta"},{id:11,rus:"Вода",uzbek:"Suv"},{id:12,rus:"Хлеб",uzbek:"Non"},
  {id:13,rus:"Молоко",uzbek:"Sut"},{id:14,rus:"Мясо",uzbek:"Go'sht"},{id:15,rus:"Рис",uzbek:"Guruch"},
  {id:16,rus:"Яблоко",uzbek:"Olma"},{id:17,rus:"Чай",uzbek:"Choy"},{id:18,rus:"Кофе",uzbek:"Qahva"},
  {id:19,rus:"Суп",uzbek:"Sho'rva"},{id:20,rus:"Сахар",uzbek:"Shakar"},{id:21,rus:"Дом",uzbek:"Uy"},
  {id:22,rus:"Стол",uzbek:"Stol"},{id:23,rus:"Стул",uzbek:"Stul"},{id:24,rus:"Окно",uzbek:"Deraza"},
  {id:25,rus:"Дверь",uzbek:"Eshik"},{id:26,rus:"Кровать",uzbek:"Karavot"},{id:27,rus:"Кухня",uzbek:"Oshxona"},
  {id:28,rus:"Ванная",uzbek:"Hammom"},{id:29,rus:"Машина",uzbek:"Mashina"},{id:30,rus:"Автобус",uzbek:"Avtobus"},
  {id:31,rus:"Поезд",uzbek:"Poyezd"},{id:32,rus:"Самолёт",uzbek:"Samolyot"},{id:33,rus:"Метро",uzbek:"Metro"},
  {id:34,rus:"Такси",uzbek:"Taksi"},{id:35,rus:"Школа",uzbek:"Maktab"},{id:36,rus:"Университет",uzbek:"Universitet"},
  {id:37,rus:"Книга",uzbek:"Kitob"},{id:38,rus:"Ручка",uzbek:"Qalam"},{id:39,rus:"Тетрадь",uzbek:"Daftar"},
  {id:40,rus:"Учитель",uzbek:"O'qituvchi"},{id:41,rus:"Урок",uzbek:"Dars"},{id:42,rus:"Работа",uzbek:"Ish"},
  {id:43,rus:"Деньги",uzbek:"Pul"},{id:44,rus:"Банк",uzbek:"Bank"},{id:45,rus:"Цена",uzbek:"Narx"},
  {id:46,rus:"Время",uzbek:"Vaqt"},{id:47,rus:"Сегодня",uzbek:"Bugun"},{id:48,rus:"Завтра",uzbek:"Ertaga"},
  {id:49,rus:"Вчера",uzbek:"Kecha"},{id:50,rus:"Уtro",uzbek:"Ertalab"},{id:51,rus:"Вечер",uzbek:"Kechqurun"},
  {id:52,rus:"Ночь",uzbek:"Tun"},{id:53,rus:"Неделя",uzbek:"Hafta"},{id:54,rus:"Месяц",uzbek:"Oy"},
  {id:55,rus:"Год",uzbek:"Yil"},{id:56,rus:"Друг",uzbek:"Do'st"},{id:57,rus:"Семья",uzbek:"Oila"},
  {id:58,rus:"Мама",uzbek:"Ona"},{id:59,rus:"Папа",uzbek:"Ota"},{id:60,rus:"Брат",uzbek:"Aka/Uka"},
  {id:61,rus:"Сестра",uzbek:"Opa/Singil"},{id:62,rus:"Муж",uzbek:"Er"},{id:63,rus:"Жена",uzbek:"Xotin"},
  {id:64,rus:"Сын",uzbek:"O'g'il"},{id:65,rus:"Дочь",uzbek:"Qiz"},{id:66,rus:"Город",uzbek:"Shahar"},
  {id:67,rus:"Страна",uzbek:"Mamlakat"},{id:68,rus:"Улица",uzbek:"Ko'cha"},{id:69,rus:"Магазин",uzbek:"Do'kon"},
  {id:70,rus:"Больница",uzbek:"Kasalxona"},{id:71,rus:"Аптека",uzbek:"Dorixona"},{id:72,rus:"Рынок",uzbek:"Bozor"}
];

// ── STATE ──
let vocab=[], screen='home', pool=[], selected=null,
    wrongWordsList=[], form={rus:'',uzbek:''}, formErr='', formOk='', 
    editId=null, adminTab='list', searchQ='', delConfirm=null, 
    csvText='', csvRes='', stats={total:0, correct:0};

function loadVocab(){
  try{const s=localStorage.getItem('rlv5_smart');if(s)return JSON.parse(s);}catch(e){}
  return DEFAULT_VOCAB.map(w=>({...w}));
}
function saveVocab(){try{localStorage.setItem('rlv5_smart',JSON.stringify(vocab));}catch(e){}}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getOptions(correct){
  return shuffle([correct,...shuffle(vocab.filter(w=>w.id!==correct.id)).slice(0,3)]);
}
function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const speak = new SpeechSynthesisUtterance(text);
    speak.lang = 'ru-RU';
    window.speechSynthesis.speak(speak);
  }
}

// ── RENDER ──
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(screen==='home') renderHome(app);
  else if(screen==='quiz') renderQuiz(app);
  else if(screen==='result') renderResult(app);
  else if(screen==='admin') renderAdmin(app);
}

// ── HOME ──
function renderHome(root){
  root.innerHTML=`
  <div class="card">
    <div style="font-size:42px;margin-bottom:12px">🇷🇺 ➔ 🇺🇿</div>
    <h1 style="font-size:32px;font-weight:800;color:#fff;margin:0 0 6px;letter-spacing:-1px">Rus Tili<br><span style="color:#f5c518">Lug'at Testi</span></h1>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:24px">Ovozli va aqlli cheksiz takrorlash tizimi</p>
    
    <div style="background:rgba(255,255,255,0.06);border-radius:18px;padding:14px;margin-bottom:24px;display:flex;justify-content:center;gap:30px">
      <div>
        <div style="font-size:24px;font-weight:800;color:#f5c518">${vocab.length}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px">Jami So'z</div>
      </div>
      <div style="border-left:1px solid rgba(255,255,255,0.1)"></div>
      <div>
        <div style="font-size:24px;font-weight:800;color:#4ade80">3-4 Savol</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px">Spaced Loop</div>
      </div>
    </div>

    <button class="btn-primary" id="startBtn">Testni Boshlash ▶</button>
    <button class="btn-ghost" id="adminBtn">⚙️ So'zlarni Boshqarish / Backup</button>
  </div>`;

  document.getElementById('startBtn').onclick=startQuiz;
  document.getElementById('adminBtn').onclick=()=>{adminTab='list';screen='admin';render();};
}

// ── QUIZ ──
function startQuiz(){
  if(vocab.length<4){alert("Testni boshlash uchun bazada kamida 4 ta so'z bo'lishi kerak!");return;}
  pool=shuffle(vocab);
  stats={total:0, correct:0};
  wrongWordsList=[];
  selected=null;
  screen='quiz';
  render();
}

function renderQuiz(root){
  if(pool.length===0){pool=shuffle(vocab);} 
  const currentWord=pool[0]; 
  const options=getOptions(currentWord);

  const div=document.createElement('div');
  div.className='wrap';
  div.innerHTML=`
    <div style="display:flex;justify-content:between;align-items:center;margin-bottom:14px;gap:10px">
      <div style="color:rgba(255,255,255,0.65);font-size:14px;font-weight:600;flex:1;text-align:left">Savollar soni: ${stats.total}</div>
      <span style="background:rgba(74,222,128,0.15);color:#4ade80;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700">✅ To'g'ri: ${stats.correct}</span>
    </div>
    
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:30px 20px;text-align:center;margin-bottom:16px;cursor:pointer" id="soundTrigger">
      <h2 style="font-size:42px;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-0.5px">
        ${currentWord.rus} <span class="speaker-icon">🔊</span>
      </h2>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;margin:0">O'zbekcha tarjimasi nima?</p>
    </div>
    <div id="opts"></div>
    <button class="btn-danger" id="stopBtn" style="margin-top:12px">Testni Yakunlash ⏹</button>
  `;

  root.appendChild(div);
  speakText(currentWord.rus);

  document.getElementById('soundTrigger').onclick=()=>speakText(currentWord.rus);
  document.getElementById('stopBtn').onclick=()=>{screen='result';render();};

  const optsDiv=document.getElementById('opts');
  options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.innerHTML=`<span class="opt-letter">${['A','B','C','D'][i]}</span><span style="flex:1">${opt.uzbek}</span>`;
    b.onclick=()=>pickAnswer(opt,currentWord);
    optsDiv.appendChild(b);
  });
}

function pickAnswer(opt,correctWord){
  if(selected)return;
  selected=opt;
  stats.total++;
  const isOk=opt.id===correctWord.id;
  
  if(isOk) {
    stats.correct++;
  } else {
    // TXT yuklab olish ro'yxatiga dublikatsiz qo'shish
    if(!wrongWordsList.some(w=>w.id===correctWord.id)){
      wrongWordsList.push(correctWord);
    }
    
    // Aqlli takrorlash: Xato qilingan so'zni aniq 3-4 tadan keyingi o'ringa tiqish
    // Agar pool uzunligi kichik bo'lsa, avtomat ro'yxat oxiriga tushadi
    let insertIndex = Math.min(4, pool.length);
    pool.splice(insertIndex, 0, correctWord);
  }

  document.querySelectorAll('.opt-btn').forEach(b=>{
    const txt=b.querySelector('span:last-child').textContent;
    const isThis=txt===opt.uzbek;
    const isCorr=txt===correctWord.uzbek;
    if(isCorr){b.classList.add('correct');b.innerHTML+=`<span style="color:#4ade80;font-weight:700;margin-left:auto">✓</span>`;}
    else if(isThis&&!isOk){b.classList.add('wrong');b.innerHTML+=`<span style="color:#f87171;font-weight:700;margin-left:auto">✗</span>`;}
    else b.classList.add('dim');
  });

  if(!isOk){
    const shakeBtn=document.querySelector('.opt-btn.wrong');
    if(shakeBtn){shakeBtn.classList.add('shake');setTimeout(()=>shakeBtn.classList.remove('shake'),600);}
  }

  setTimeout(()=>{
    selected=null;
    pool.shift(); // Joriy so'ralgan so'zni olib tashlaydi
    render();
  },isOk?600:1200);
}

// ── RESULT ──
function renderResult(root){
  const pct=stats.total > 0 ? Math.round((stats.correct/stats.total)*100) : 0;
  let downloadBtnHtml='';
  
  if(wrongWordsList.length > 0){
    downloadBtnHtml=`
      <button class="btn-primary" id="dlWrongBtn" style="background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;box-shadow:0 8px 20px rgba(248,113,113,0.3);margin-top:15px;margin-bottom:15px">
        ❌ Xatolarni Yuklab Olish (.txt) 📥
      </button>
    `;
  } else {
    downloadBtnHtml=`<p style="color:#4ade80;font-size:14px;font-weight:700;margin:15px 0">Ajoyib! Biror marta ham xato qilmadingiz! 🎉</p>`;
  }

  root.innerHTML=`
  <div class="card">
    <div style="font-size:52px;margin-bottom:7px">🏁</div>
    <h2 style="color:#fff;font-size:22px;font-weight:700;margin:0 0 14px">Test yakunlandi</h2>
    <div style="display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:3px">
      <span style="font-size:54px;font-weight:900;color:#f5c518;line-height:1">${stats.correct}</span>
      <span style="font-size:20px;color:rgba(255,255,255,0.45);font-weight:600">/ ${stats.total}</span>
    </div>
    <div style="color:rgba(255,255,255,0.45);font-size:14px;margin-bottom:10px">To'g'ri javob ko'rsatkichi: ${pct}%</div>
    
    ${downloadBtnHtml}

    <button class="btn-primary" id="retryBtn">Qayta Boshlash 🔄</button>
    <button class="btn-ghost" id="homeBtn">Bosh Sahifa</button>
  </div>`;

  document.getElementById('retryBtn').onclick=startQuiz;
  document.getElementById('homeBtn').onclick=()=>{screen='home';render();};
  
  if(wrongWordsList.length > 0){
    document.getElementById('dlWrongBtn').onclick=()=>{
      let textContent = wrongWordsList.map(w => `${w.rus},${w.uzbek}`).join('\n');
      let blob = new Blob([textContent], {type: "text/plain;charset=utf-8"});
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `test_xatolari_backup.txt`;
      link.click();
    };
  }
}

// ── ADMIN ──
function renderAdmin(root){
  const filtered=vocab.filter(w=>
    (!searchQ||w.rus.toLowerCase().includes(searchQ.toLowerCase())||w.uzbek.toLowerCase().includes(searchQ.toLowerCase()))
  );

  const wrap=document.createElement('div');
  wrap.className='wrap';
  wrap.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px">
      <button class="btn-back" id="aBack">← Orqaga</button>
      <h2 style="color:#fff;font-size:17px;font-weight:700;margin:0">⚙️ Boshqarish Panel</h2>
      <span style="background:rgba(245,197,24,0.18);color:#f5c518;border-radius:12px;padding:3px 10px;font-size:13px;font-weight:700">${vocab.length} ta</span>
    </div>
    <div class="tab-row">
      <button class="tab ${adminTab==='list'?'active':''}" id="tList">📋 Ro'yxat</button>
      <button class="tab ${adminTab==='add'?'active':''}" id="tAdd">${editId?'✏️ Tahrirlash':'➕ Qo\'shish'}</button>
      <button class="tab ${adminTab==='csv'?'active':''}" id="tCSV">📥 Import / Eksport</button>
    </div>
    <div id="tabContent"></div>`;

  root.appendChild(wrap);

  document.getElementById('aBack').onclick=()=>{screen='home';render();};
  document.getElementById('tList').onclick=()=>{adminTab='list';editId=null;form={rus:'',uzbek:''};render();};
  document.getElementById('tAdd').onclick=()=>{adminTab='add';render();};
  document.getElementById('tCSV').onclick=()=>{adminTab='csv';render();};

  const tc=document.getElementById('tabContent');

  if(adminTab==='list'){
    tc.innerHTML=`
      <input class="form-input" style="margin-bottom:8px" placeholder="🔍 Qidirish..." id="srch" value="${searchQ}"/>
      <div class="word-list" id="wlist"></div>`;

    document.getElementById('srch').oninput=e=>{searchQ=e.target.value;render();};

    const wl=document.getElementById('wlist');
    filtered.forEach(word=>{
      const row=document.createElement('div');
      row.className='word-row';
      row.innerHTML=`
        <div style="display:flex;align-items:center;gap:6px;flex:1;text-align:left;cursor:pointer" onclick="speakText('${word.rus}')">
          <span style="color:#fff;font-weight:700;font-size:15px">${word.rus} 🔊</span>
          <span style="color:rgba(255,255,255,0.25);font-size:12px">➔</span>
          <span style="color:#f5c518;font-size:14px">${word.uzbek}</span>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button style="background:rgba(255,255,255,0.07);border:none;border-radius:8px;width:30px;height:30px;font-size:13px" data-edit="${word.id}">✏️</button>
          <button style="background:${delConfirm===word.id?'rgba(248,113,113,0.4)':'rgba(248,113,113,0.09)'};border:none;border-radius:8px;width:30px;height:30px;font-size:13px;color:${delConfirm===word.id?'#fff':'inherit'}" data-del="${word.id}">${delConfirm===word.id?'?':'🗑'}</button>
        </div>`;
      
      row.querySelector('[data-edit]').onclick=()=>{
        form={rus:word.rus,uzbek:word.uzbek};
        editId=word.id;adminTab='add';formErr='';formOk='';render();
      };
      row.querySelector('[data-del]').onclick=()=>{
        if(delConfirm===word.id){
          vocab=vocab.filter(w=>w.id!==word.id);
          saveVocab();
          delConfirm=null;
          render();
        }else{
          delConfirm=word.id;
          render();
          setTimeout(()=>{if(delConfirm===word.id){delConfirm=null;render();}},3000);
        }
      };
      wl.appendChild(row);
    });
  }

  if(adminTab==='add'){
    tc.innerHTML=`
    <div class="form-card" style="text-align:left">
      <h3 style="color:#fff;font-size:15px;font-weight:700;margin:0 0 13px">${editId?'✏️ Tahrirlash':'➕ Yangi so\'z'}</h3>
      ${formErr?`<div class="msg-err">${formErr}</div>`:''}
      ${formOk?`<div class="msg-ok">${formOk}</div>`:''}
      <label class="form-label">Ruscha so'z *</label>
      <input class="form-input" id="fRus" placeholder="Masalan: Привет" value="${form.rus}"/>
      <label class="form-label">O'zbekcha tarjimasi *</label>
      <input class="form-input" id="fUz" placeholder="Masalan: Salom" value="${form.uzbek}"/>
      <button class="btn-primary" id="saveBtn">${editId?' Saqlash':' Qo\'shish'}</button>
      ${editId?`<button class="btn-ghost" id="cancelBtn">Bekor qilish</button>`:''}
    </div>`;

    document.getElementById('fRus').oninput=e=>{form.rus=e.target.value;};
    document.getElementById('fUz').oninput=e=>{form.uzbek=e.target.value;};

    document.getElementById('saveBtn').onclick=()=>{
      formErr='';formOk='';
      const rus=form.rus.trim();
      const uzbek=form.uzbek.trim();
      
      if(!rus||!uzbek){formErr="Ikkala maydonni ham to'ldiring!";render();return;}
      
      if(editId!==null){
        vocab=vocab.map(w=>w.id===editId?{...w,rus,uzbek}:w);
        saveVocab();formOk='✅ So\'z yangilandi!';editId=null;
      } else {
        vocab.push({id:Date.now(),rus,uzbek});
        saveVocab();formOk='✅ Yangi so\'z qo\'shildi!';
      }
      form={rus:'',uzbek:''};
      render();
    };
    if(editId){
      document.getElementById('cancelBtn').onclick=()=>{editId=null;form={rus:'',uzbek:''};render();};
    }
  }

  if(adminTab==='csv'){
    tc.innerHTML=`
    <div class="form-card" style="text-align:left;margin-bottom:15px">
      <h3 style="color:#fff;font-size:15px;font-weight:700;margin:0 0 11px">📥 CSV Formatda Import</h3>
      <p style="color:rgba(255,255,255,0.45);font-size:12px;margin-bottom:7px">Format: <code style="background:rgba(255,255,255,0.09);padding:1px 5px;border-radius:4px;font-size:11px">ruscha,uzbekcha</code></p>
      ${csvRes?`<div class="msg-ok">${csvRes}</div>`:''}
      <textarea class="form-textarea" rows="4" id="csvTa" placeholder="Кошка,Mushuk&#10;Собака,It">${csvText}</textarea>
      <button class="btn-primary" id="csvBtn">Import qilish ⚡</button>
    </div>
    
    <div class="form-card" style="text-align:left">
      <h3 style="color:#fff;font-size:15px;font-weight:700;margin:0 0 6px">📤 Jami Baza Rezerv Nusxasi (Backup)</h3>
      <p style="color:rgba(255,255,255,0.45);font-size:12px;margin-bottom:12px">Lug'atdagi barcha so'zlarni telefonga matn (.txt) fayl shaklida saqlab oling.</p>
      <button class="btn-ghost" id="expBtn" style="color:#f5c518;border-color:rgba(245,197,24,0.3)">Faylga Yuklab Olish 💾</button>
    </div>`;

    document.getElementById('csvTa').oninput=e=>{csvText=e.target.value;};

    document.getElementById('csvBtn').onclick=()=>{
      if(!csvText.trim()){alert("Matn maydoni bo'sh!"); return;}
      const lines = csvText.split('\n');
      let count = 0;
      lines.forEach((line, index)=>{
        if(!line.trim()) return;
        const parts = line.split(',');
        if(parts.length >= 2){
          const rus = parts[0].trim();
          const uzbek = parts[1].trim();
          if(rus && uzbek){
            vocab.push({id:Date.now() + index, rus, uzbek});
            count++;
          }
        }
      });
      if(count > 0){
        saveVocab();
        csvRes = `✅ ${count} ta so'z muvaffaqiyatli qo'shildi!`;
        csvText = '';
      } else {
        csvRes = `❌ Format noto'g'ri.`;
      }
      render();
    };

    document.getElementById('expBtn').onclick=()=>{
      if(vocab.length===0){alert("Eksport qilish uchun so'z yo'q!");return;}
      let textContent = vocab.map(w => `${w.rus},${w.uzbek}`).join('\n');
      let blob = new Blob([textContent], {type: "text/plain;charset=utf-8"});
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `rus_tili_lugat_backup.txt`;
      link.click();
    };
  }
}

// ── INITIALIZATION ──
vocab=loadVocab();
render();
</script>
</body>
</html>
