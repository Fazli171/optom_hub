          <section class="settings-section" data-sec="security">
            <div class="card card-pad">
              <div class="card-head"><h3>${OH.i18n.t('settings.changePasswordTitle')}</h3></div>
              <div class="field"><label>${OH.i18n.t('settings.field.currentPassword')}</label><input type="password" class="input" id="pw-old" /></div>
              <div class="form-row-2">
                <div class="field"><label>${OH.i18n.t('settings.field.newPassword')}</label><input type="password" class="input" id="pw-new" /></div>
                <div class="field"><label>${OH.i18n.t('settings.field.confirmPassword')}</label><input type="password" class="input" id="pw-confirm" /></div>
              </div>
              <button class="btn btn-primary" id="save-pass">${OH.i18n.t('settings.updatePassword')}</button>
            </div>
          </section>

          ${isAdmin ? `
          <section class="settings-section" data-sec="data">
            <div class="card card-pad">
              <div class="card-head"><h3>${OH.i18n.t('settings.clearDataTitle')}</h3></div>
              <p class="text-muted" style="font-size:12.5px;line-height:1.7;margin-bottom:16px">
                ${OH.i18n.t('settings.clearDataDesc')}
              </p>
              <button class="btn btn-danger" id="btn-reset-demo">${I.trash} ${OH.i18n.t('settings.clearDataBtn')}</button>
            </div>
          </section>` : ''}
        </div>
      </div>
    </div>`;

    OH.dom.qs('#btn-reset-demo')?.addEventListener('click', () => {
      OH.modal.confirm({
        title: OH.i18n.t('settings.clearDataTitle'),
        message: OH.i18n.t('settings.clearConfirmMessage'),
        confirmText: OH.i18n.t('settings.clear'),
        tone: 'danger',
        onConfirm: () => OH.api.clearAllData().then(() => {
          OH.toast.success(OH.i18n.t('settings.dataCleared'), OH.i18n.t('settings.dataClearedDesc'));
          OH.router.renderPage();
        }),
      });
    });

    OH.dom.qsa('#settings-nav button').forEach((btn) => btn.addEventListener('click', () => {
      OH.dom.qsa('#settings-nav button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      OH.dom.qsa('.settings-section').forEach((s) => s.classList.toggle('active', s.dataset.sec === btn.dataset.sec));
    }));

    OH.api.getCompany().then((c) => {
      OH.dom.qs('#c-name').value = c.name;
      OH.dom.qs('#c-phone').value = c.phone;
      OH.dom.qs('#c-currency').value = c.currency;
    });

    OH.dom.qs('#save-company').addEventListener('click', () => {
      OH.api.saveCompany({
        name: OH.dom.qs('#c-name').value.trim(),
        phone: OH.dom.qs('#c-phone').value.trim(),
        currency: OH.dom.qs('#c-currency').value,
      }).then(() => OH.toast.success(OH.i18n.t('settings.saved')));
    });

    const curTheme = document.documentElement.getAttribute('data-theme') || 'light';
    OH.dom.qsa('.theme-option').forEach((el) => {
      el.classList.toggle('active', el.dataset.theme === curTheme);
      el.addEventListener('click', () => {
        OH.dom.qsa('.theme-option').forEach((x) => x.classList.remove('active'));
        el.classList.add('active');
        document.documentElement.setAttribute('data-theme', el.dataset.theme);
        OH.storage.set('theme', el.dataset.theme);
        const themeBtn = OH.dom.qs('#btn-theme');
        if (themeBtn) themeBtn.innerHTML = el.dataset.theme === 'dark' ? I.sun : I.moon;
        OH.toast.success(OH.i18n.t('settings.themeUpdated'));
      });
    });

    OH.dom.qs('#save-pass').addEventListener('click', () => {
      const oldP = OH.dom.qs('#pw-old').value, newP = OH.dom.qs('#pw-new').value, conf = OH.dom.qs('#pw-confirm').value;
      if (!oldP || !newP) return OH.toast.error(OH.i18n.t('settings.fillAllFields'));
      if (newP !== conf) return OH.toast.error(OH.i18n.t('settings.passwordsMismatch'));
      if (!isAdmin) return OH.toast.error(OH.i18n.t('settings.sellerPasswordNote'), OH.i18n.t('settings.sellerPasswordContact'));
      OH.api.changePassword(oldP, newP).then(() => {
        OH.toast.success(OH.i18n.t('settings.passwordUpdated'));
        OH.dom.qs('#pw-old').value = OH.dom.qs('#pw-new').value = OH.dom.qs('#pw-confirm').value = '';
      }).catch(() => OH.toast.error(OH.i18n.t('settings.wrongCurrentPassword')));
    });
  }

  OH.pages = OH.pages || {};
  OH.pages.settings = { mount };
})(window.OH = window.OH || {});


/* ===== assets/js/auth.js ===== */
(function (OH) {
  'use strict';

  function isAuthed() {
    return !!OH.storage.get('session', null);
  }

  function renderLogin() {
    const root = OH.dom.qs('#app-root');
    const lang = OH.i18n.getLang();
    root.innerHTML = `
      <div class="login-screen">
        <div class="lang-switch" id="lang-switch" style="position:absolute;top:18px;right:18px;z-index:5;background:var(--bg-elevated)" data-tip="${OH.i18n.t('header.langSwitch')}">
          <button type="button" class="lang-switch__btn ${lang === 'uz' ? 'active' : ''}" data-lang="uz">${OH.i18n.t('lang.uz')}</button>
          <span class="lang-switch__sep">|</span>
          <button type="button" class="lang-switch__btn ${lang === 'ru' ? 'active' : ''}" data-lang="ru">${OH.i18n.t('lang.ru')}</button>
        </div>
        <div class="login-visual">
          <div class="login-visual__ring" style="width:420px;height:420px;top:-120px;right:-120px"></div>
          <div class="login-visual__ring" style="width:260px;height:260px;bottom:-80px;left:-60px"></div>
          <div class="login-visual__inner">
            <div class="login-visual__mark">${OH.icons.box.replace('stroke="currentColor"', 'stroke="#1A1204"')}</div>
            <h2>${OH.i18n.t('login.heroTitle')}</h2>
            <p>${OH.i18n.t('login.heroDesc')}</p>
            <div class="login-visual__stats">
              <div class="login-visual__stat"><b>2,400+</b><span>${OH.i18n.t('login.statOrders')}</span></div>
              <div class="login-visual__stat"><b>180+</b><span>${OH.i18n.t('login.statSellers')}</span></div>
              <div class="login-visual__stat"><b>99.2%</b><span>Uptime</span></div>
            </div>
          </div>
        </div>
        <div class="login-form-wrap">
          <div class="login-card">
            <div class="login-card__logo">
              <div class="sidebar__brand-mark" style="width:38px;height:38px">${OH.icons.box.replace('stroke="currentColor"', 'stroke="#1A1204"').replace('width="20" height="20"', 'width="18" height="18"')}</div>
              <b style="font-family:var(--font-display);font-size:17px">OptomHub Pro</b>
            </div>
            <h1>${OH.i18n.t('login.welcome')}</h1>
            <p class="sub" id="login-subtitle">${OH.i18n.t('login.subtitleAdmin')}</p>

            <div class="tabs" id="login-role-tabs" style="margin-bottom:18px">
              <button type="button" class="tab active" data-role="admin">${OH.i18n.t('login.tabAdmin')}</button>
              <button type="button" class="tab" data-role="seller">${OH.i18n.t('login.tabSeller')}</button>
            </div>

            <form id="login-form">
              <div class="field">
                <label>${OH.i18n.t('login.username')}</label>
                <div class="input-icon-wrap">${OH.icons.users.replace('width="20" height="20"', 'width="17" height="17"')}<input class="input" id="login-user" placeholder="admin" autocomplete="username" /></div>
              </div>
              <div class="field">
                <label>${OH.i18n.t('login.password')}</label>
                <div class="input-icon-wrap">
                  ${OH.icons.lock.replace('width="20" height="20"', 'width="17" height="17"')}
                  <input class="input" type="password" id="login-pass" placeholder="••••••" autocomplete="current-password" />
                  <button type="button" class="toggle-pass" id="toggle-pass">${OH.icons.eye.replace('width="20" height="20"', 'width="17" height="17"')}</button>
                </div>
              </div>
              <div class="field" style="display:flex;align-items:center;justify-content:space-between">
                <label class="checkbox-row" style="margin:0"><input type="checkbox" id="login-remember" checked />${OH.i18n.t('login.rememberMe')}</label>
              </div>
              <div class="field" id="login-error" style="display:none;color:var(--danger);font-size:12.5px;font-weight:600"></div>
              <button type="submit" class="btn btn-primary btn-block" id="login-submit">${OH.i18n.t('login.submit')}</button>
              <p class="text-muted" style="font-size:11.5px;text-align:center;margin-top:18px" id="login-hint">${OH.i18n.t('login.demoLoginAdmin')}</p>
            </form>
          </div>
        </div>
      </div>`;

    OH.dom.qsa('#lang-switch [data-lang]').forEach((btn) => {
      btn.addEventListener('click', () => OH.i18n.setLang(btn.dataset.lang));
    });

    OH.dom.qs('#toggle-pass').addEventListener('click', () => {
      const inp = OH.dom.qs('#login-pass');
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      OH.dom.qs('#toggle-pass').innerHTML = (showing ? OH.icons.eye : OH.icons.eyeOff).replace('width="20" height="20"', 'width="17" height="17"');
    });

    let selectedRole = 'admin';
    OH.dom.qsa('#login-role-tabs .tab').forEach((t) => t.addEventListener('click', () => {
      OH.dom.qsa('#login-role-tabs .tab').forEach((x) => x.classList.remove('active'));
      t.classList.add('active');
      selectedRole = t.dataset.role;
      const isSeller = selectedRole === 'seller';
      OH.dom.qs('#login-subtitle').textContent = isSeller ? OH.i18n.t('login.subtitleSeller') : OH.i18n.t('login.subtitleAdmin');
      OH.dom.qs('#login-user').placeholder = isSeller ? 'seller' : 'admin';
      OH.dom.qs('#login-hint').innerHTML = isSeller ? OH.i18n.t('login.demoLoginSeller') : OH.i18n.t('login.demoLoginAdmin');
    }));

    OH.dom.qs('#login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = OH.dom.qs('#login-submit');
      const login = OH.dom.qs('#login-user').value.trim();
      const pass = OH.dom.qs('#login-pass').value;
      const errBox = OH.dom.qs('#login-error');
      errBox.style.display = 'none';
      btn.disabled = true; btn.textContent = OH.i18n.t('login.checking');
      OH.api.login(login, pass, selectedRole).then((session) => {
        OH.storage.set('session', session);
        if (!OH.dom.qs('#login-remember').checked) OH.storage.set('sessionEphemeral', true);
        OH.toast.success(OH.i18n.t('login.welcomeToast', { name: session.name }));
        OH.app.start();
      }).catch(() => {
        btn.disabled = false; btn.textContent = OH.i18n.t('login.submit');
        errBox.textContent = selectedRole === 'seller' ? OH.i18n.t('login.errorSeller') : OH.i18n.t('login.errorAdmin');
        errBox.style.display = 'block';
      });
    });
  }

  function logout() {
    OH.storage.remove('session');
    OH.toast.info(OH.i18n.t('login.loggedOut'));
    renderLogin();
  }

  OH.auth = { isAuthed, renderLogin, logout };
})(window.OH = window.OH || {});


/* ===== assets/js/router.js ===== */
(function (OH) {
  'use strict';

  const ROUTES = ['dashboard', 'orders', 'order-create', 'products', 'sellers', 'payments', 'notifications', 'settings', 'seller-dashboard', 'returns', 'warehouse', 'proposals', 'reports'];
  const PAGE_MODULE = {
    dashboard: 'dashboard', orders: 'orders', 'order-create': 'orderCreate', products: 'products',
    sellers: 'sellers', payments: 'payments', notifications: 'notifications', settings: 'settings',
    'seller-dashboard': 'sellerDashboard',
    returns: 'returns', warehouse: 'warehouse', proposals: 'proposals', reports: 'reports',
  };
  const SIDEBAR_KEY = { 'order-create': 'orders' };

  function currentRoute() {
    const hash = location.hash.replace('#/', '').split('?')[0];
    return ROUTES.includes(hash) ? hash : 'dashboard';
  }

  function renderShell() {
    const root = OH.dom.qs('#app-root');
    root.innerHTML = `
      <div class="app-shell" id="app-shell">
        ${OH.sidebar.render(currentRoute())}
        <div class="main-col">
          <div id="header-holder"></div>
          <div id="page-content"></div>
          <footer class="app-footer">
            <span>OptomHub Pro &copy; 2026 — barcha huquqlar himoyalangan</span>
            <span>Versiya 1.0.0 (Phase 1)</span>
          </footer>
        </div>
        ${OH.sidebar.renderMobileBottomNav(currentRoute())}
      </div>`;
    OH.sidebar.bindGlobalToggles();
    bindNav();
  }

  function bindNav() {
    OH.dom.qsa('.sidebar__link[data-nav], .mobile-bottom-nav__item[data-nav-mobile]').forEach((a) => {
      a.addEventListener('click', () => {
        const shell = OH.dom.qs('#app-shell');
        shell.classList.remove('mobile-open');
        OH.dom.qs('#sidebar-overlay')?.classList.remove('show');
      });
    });
  }

  function renderPage() {
    const route = currentRoute();
    const sidebarKey = SIDEBAR_KEY[route] || route;

    OH.dom.qsa('.sidebar__link[data-nav]').forEach((a) => a.classList.toggle('active', a.dataset.nav === sidebarKey));
    OH.dom.qsa('.mobile-bottom-nav__item[data-nav-mobile]').forEach((a) => a.classList.toggle('active', a.dataset.navMobile === sidebarKey));
    OH.dom.qs('#header-holder').innerHTML = OH.header.render(route);
    OH.header.bind();

    const mod = OH.pages[PAGE_MODULE[route]];
    const content = OH.dom.qs('#page-content');
    if (mod && mod.mount) mod.mount(content);
    else content.innerHTML = `<div class="page"><div class="empty-state">${OH.icons.alert}<h4>Sahifa topilmadi</h4></div></div>`;
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  function start() {
    renderShell();
    renderPage();
    window.addEventListener('hashchange', renderPage);
  }

  OH.router = { start, renderShell, renderPage, currentRoute };
})(window.OH = window.OH || {});


/* ===== assets/js/app.js ===== */
(function (OH) {
  'use strict';

  function applySavedTheme() {
    const theme = OH.storage.get('theme', 'light');
    document.documentElement.setAttribute('data-theme', theme);
  }

  function start() {
    applySavedTheme();
    const session = OH.storage.get('session', null);
    const isSeller = session && session.role === 'seller';
    if (!location.hash || location.hash === '#/' || location.hash === '#') {
      location.hash = isSeller ? '#/seller-dashboard' : '#/dashboard';
    }
    OH.router.start();
  }

  function boot() {
    applySavedTheme();
    OH.api.init().then(() => {
      if (OH.auth.isAuthed()) start();
      else OH.auth.renderLogin();
    });
  }

  // ✨ i18n: til almashtirilganda butun sahifa qayta yuklanmaydi — joriy ekran
  // (login yoki ilova ichi) darhol joriy tilda qayta chiziladi.
  document.addEventListener('oh:langchange', () => {
    if (OH.auth.isAuthed()) {
      OH.router.renderShell();
      OH.router.renderPage();
    } else {
      OH.auth.renderLogin();
    }
  });

  OH.app = { start, boot };

  document.addEventListener('DOMContentLoaded', OH.app.boot);
})(window.OH = window.OH || {});

</script>
</body>
