              <button class="btn btn-danger" id="btn-reset-demo">${I.trash} Barcha ma'lumotlarni tozalash</button>
            </div>
          </section>` : ''}
        </div>
      </div>
    </div>`;

    OH.dom.qs('#btn-reset-demo')?.addEventListener('click', () => {
      OH.modal.confirm({
        title: "Barcha ma'lumotlarni tozalash",
        message: "Barcha buyurtmalar, to'lov da'volari, bildirishnomalar, qaytarishlar, Admin Ombori va sotuvchilarning qarz/to'lov ko'rsatkichlari butunlay o'chiriladi. Sotuvchilar va mahsulotlar saqlanib qoladi. Davom etasizmi?",
        confirmText: 'Tozalash',
        tone: 'danger',
        onConfirm: () => OH.api.clearAllData().then(() => {
          OH.toast.success("Ma'lumotlar tozalandi", 'Sotuvchilar va mahsulotlar saqlanib qoldi, qolgan hammasi o\'chirildi');
          OH.router.renderPage();
        }),
      });
    });

    OH.dom.qsa('#settings-nav button').forEach((btn) => btn.addEventListener('click', () => {
      OH.dom.qsa('#settings-nav button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      OH.dom.qsa('.settings-section').forEach((s) => s.classList.toggle('active', s.dataset.sec === btn.dataset.sec));
    }));

    OH.api.getCompany().then((c) => {
      OH.dom.qs('#c-name').value = c.name;
      OH.dom.qs('#c-phone').value = c.phone;
      OH.dom.qs('#c-currency').value = c.currency;
    });

    OH.dom.qs('#save-company').addEventListener('click', () => {
      OH.api.saveCompany({
        name: OH.dom.qs('#c-name').value.trim(),
        phone: OH.dom.qs('#c-phone').value.trim(),
        currency: OH.dom.qs('#c-currency').value,
      }).then(() => OH.toast.success('Sozlamalar saqlandi'));
    });

    const curTheme = document.documentElement.getAttribute('data-theme') || 'light';
    OH.dom.qsa('.theme-option').forEach((el) => {
      el.classList.toggle('active', el.dataset.theme === curTheme);
      el.addEventListener('click', () => {
        OH.dom.qsa('.theme-option').forEach((x) => x.classList.remove('active'));
        el.classList.add('active');
        document.documentElement.setAttribute('data-theme', el.dataset.theme);
        OH.storage.set('theme', el.dataset.theme);
        const themeBtn = OH.dom.qs('#btn-theme');
        if (themeBtn) themeBtn.innerHTML = el.dataset.theme === 'dark' ? I.sun : I.moon;
        OH.toast.success('Mavzu yangilandi');
      });
    });

    OH.dom.qs('#save-pass').addEventListener('click', () => {
      const oldP = OH.dom.qs('#pw-old').value, newP = OH.dom.qs('#pw-new').value, conf = OH.dom.qs('#pw-confirm').value;
      if (!oldP || !newP) return OH.toast.error("Barcha maydonlarni to'ldiring");
      if (newP !== conf) return OH.toast.error('Parollar mos kelmadi');
      if (!isAdmin) return OH.toast.error("Sotuvchi paroli shu yerdan o'zgartirilmaydi", "Iltimos admin bilan bog'laning");
      OH.api.changePassword(oldP, newP).then(() => {
        OH.toast.success('Parol muvaffaqiyatli yangilandi');
        OH.dom.qs('#pw-old').value = OH.dom.qs('#pw-new').value = OH.dom.qs('#pw-confirm').value = '';
      }).catch(() => OH.toast.error("Joriy parol noto'g'ri"));
    });
  }

  OH.pages = OH.pages || {};
  OH.pages.settings = { mount };
})(window.OH = window.OH || {});


/* ===== assets/js/auth.js ===== */
(function (OH) {
  'use strict';

  function isAuthed() {
    return !!OH.storage.get('session', null);
  }

  function renderLogin() {
    const root = OH.dom.qs('#app-root');
    root.innerHTML = `
      <div class="login-screen">
        <div class="login-visual">
          <div class="login-visual__ring" style="width:420px;height:420px;top:-120px;right:-120px"></div>
          <div class="login-visual__ring" style="width:260px;height:260px;bottom:-80px;left:-60px"></div>
          <div class="login-visual__inner">
            <div class="login-visual__mark">${OH.icons.box.replace('stroke="currentColor"', 'stroke="#1A1204"')}</div>
            <h2>Ulgurji savdongizni bitta panelda boshqaring</h2>
            <p>Buyurtmalar, sotuvchilar, mahsulotlar va to'lovlar — barchasi real vaqt rejimida, bitta professional boshqaruv markazida.</p>
            <div class="login-visual__stats">
              <div class="login-visual__stat"><b>2,400+</b><span>Buyurtmalar</span></div>
              <div class="login-visual__stat"><b>180+</b><span>Sotuvchilar</span></div>
              <div class="login-visual__stat"><b>99.2%</b><span>Uptime</span></div>
            </div>
          </div>
        </div>
        <div class="login-form-wrap">
          <div class="login-card">
            <div class="login-card__logo">
              <div class="sidebar__brand-mark" style="width:38px;height:38px">${OH.icons.box.replace('stroke="currentColor"', 'stroke="#1A1204"').replace('width="20" height="20"', 'width="18" height="18"')}</div>
              <b style="font-family:var(--font-display);font-size:17px">OptomHub Pro</b>
            </div>
            <h1>Xush kelibsiz</h1>
            <p class="sub" id="login-subtitle">Admin panelga kirish uchun ma'lumotlaringizni kiriting</p>

            <div class="tabs" id="login-role-tabs" style="margin-bottom:18px">
              <button type="button" class="tab active" data-role="admin">Admin</button>
              <button type="button" class="tab" data-role="seller">Sotuvchi</button>
            </div>

            <form id="login-form">
              <div class="field">
                <label>Login</label>
                <div class="input-icon-wrap">${OH.icons.users.replace('width="20" height="20"', 'width="17" height="17"')}<input class="input" id="login-user" placeholder="admin" autocomplete="username" /></div>
              </div>
              <div class="field">
                <label>Parol</label>
                <div class="input-icon-wrap">
                  ${OH.icons.lock.replace('width="20" height="20"', 'width="17" height="17"')}
                  <input class="input" type="password" id="login-pass" placeholder="••••••" autocomplete="current-password" />
                  <button type="button" class="toggle-pass" id="toggle-pass">${OH.icons.eye.replace('width="20" height="20"', 'width="17" height="17"')}</button>
                </div>
              </div>
              <div class="field" style="display:flex;align-items:center;justify-content:space-between">
                <label class="checkbox-row" style="margin:0"><input type="checkbox" id="login-remember" checked />Eslab qolish</label>
              </div>
              <div class="field" id="login-error" style="display:none;color:var(--danger);font-size:12.5px;font-weight:600"></div>
              <button type="submit" class="btn btn-primary btn-block" id="login-submit">Kirish</button>
              <p class="text-muted" style="font-size:11.5px;text-align:center;margin-top:18px" id="login-hint">Demo login: <b class="mono">admin</b> · Demo parol: <b class="mono">12345</b></p>
            </form>
          </div>
        </div>
      </div>`;

    OH.dom.qs('#toggle-pass').addEventListener('click', () => {
      const inp = OH.dom.qs('#login-pass');
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      OH.dom.qs('#toggle-pass').innerHTML = (showing ? OH.icons.eye : OH.icons.eyeOff).replace('width="20" height="20"', 'width="17" height="17"');
    });

    let selectedRole = 'admin';
    OH.dom.qsa('#login-role-tabs .tab').forEach((t) => t.addEventListener('click', () => {
      OH.dom.qsa('#login-role-tabs .tab').forEach((x) => x.classList.remove('active'));
      t.classList.add('active');
      selectedRole = t.dataset.role;
      const isSeller = selectedRole === 'seller';
      OH.dom.qs('#login-subtitle').textContent = isSeller ? "Sotuvchi paneliga kirish uchun ma'lumotlaringizni kiriting" : "Admin panelga kirish uchun ma'lumotlaringizni kiriting";
      OH.dom.qs('#login-user').placeholder = isSeller ? 'seller' : 'admin';
      OH.dom.qs('#login-hint').innerHTML = isSeller
        ? 'Demo login: <b class="mono">seller</b> · Demo parol: <b class="mono">12345</b>'
        : 'Demo login: <b class="mono">admin</b> · Demo parol: <b class="mono">12345</b>';
    }));

    OH.dom.qs('#login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = OH.dom.qs('#login-submit');
      const login = OH.dom.qs('#login-user').value.trim();
      const pass = OH.dom.qs('#login-pass').value;
      const errBox = OH.dom.qs('#login-error');
      errBox.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Tekshirilmoqda...';
      OH.api.login(login, pass, selectedRole).then((session) => {
        OH.storage.set('session', session);
        if (!OH.dom.qs('#login-remember').checked) OH.storage.set('sessionEphemeral', true);
        OH.toast.success('Xush kelibsiz, ' + session.name);
        OH.app.start();
      }).catch(() => {
        btn.disabled = false; btn.textContent = 'Kirish';
        errBox.textContent = selectedRole === 'seller'
          ? "Login yoki parol noto'g'ri. Demo: seller / 12345"
          : "Login yoki parol noto'g'ri. Demo: admin / 12345";
        errBox.style.display = 'block';
      });
    });
  }

  function logout() {
    OH.storage.remove('session');
    OH.toast.info('Tizimdan chiqdingiz');
    renderLogin();
  }

  OH.auth = { isAuthed, renderLogin, logout };
})(window.OH = window.OH || {});


/* ===== assets/js/router.js ===== */
(function (OH) {
  'use strict';

  const ROUTES = ['dashboard', 'orders', 'order-create', 'products', 'sellers', 'payments', 'reports', 'notifications', 'settings', 'seller-dashboard', 'returns', 'warehouse'];
  const PAGE_MODULE = {
    dashboard: 'dashboard', orders: 'orders', 'order-create': 'orderCreate', products: 'products',
    sellers: 'sellers', payments: 'payments', reports: 'reports', notifications: 'notifications', settings: 'settings',
    'seller-dashboard': 'sellerDashboard',
    returns: 'returns', warehouse: 'warehouse',
  };
  const SIDEBAR_KEY = { 'order-create': 'orders' };

  function currentRoute() {
    const hash = location.hash.replace('#/', '').split('?')[0];
    return ROUTES.includes(hash) ? hash : 'dashboard';
  }

  function renderShell() {
    const root = OH.dom.qs('#app-root');
    root.innerHTML = `
      <div class="app-shell" id="app-shell">
        ${OH.sidebar.render(currentRoute())}
        <div class="main-col">
          <div id="header-holder"></div>
          <div id="page-content"></div>
          <footer class="app-footer">
            <span>OptomHub Pro &copy; 2026 — barcha huquqlar himoyalangan</span>
            <span>Versiya 1.0.0 (Phase 1)</span>
          </footer>
        </div>
        ${OH.sidebar.renderMobileBottomNav(currentRoute())}
      </div>`;
    OH.sidebar.bindGlobalToggles();
    bindNav();
  }

  function bindNav() {
    OH.dom.qsa('.sidebar__link[data-nav], .mobile-bottom-nav__item[data-nav-mobile]').forEach((a) => {
      a.addEventListener('click', () => {
        const shell = OH.dom.qs('#app-shell');
        shell.classList.remove('mobile-open');
        OH.dom.qs('#sidebar-overlay')?.classList.remove('show');
      });
    });
  }

  function renderPage() {
    const route = currentRoute();
    const sidebarKey = SIDEBAR_KEY[route] || route;

    OH.dom.qsa('.sidebar__link[data-nav]').forEach((a) => a.classList.toggle('active', a.dataset.nav === sidebarKey));
    OH.dom.qsa('.mobile-bottom-nav__item[data-nav-mobile]').forEach((a) => a.classList.toggle('active', a.dataset.navMobile === sidebarKey));
    OH.dom.qs('#header-holder').innerHTML = OH.header.render(route);
    OH.header.bind();

    const mod = OH.pages[PAGE_MODULE[route]];
    const content = OH.dom.qs('#page-content');
    if (mod && mod.mount) mod.mount(content);
    else content.innerHTML = `<div class="page"><div class="empty-state">${OH.icons.alert}<h4>Sahifa topilmadi</h4></div></div>`;
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  function start() {
    renderShell();
    renderPage();
    window.addEventListener('hashchange', renderPage);
  }

  OH.router = { start, renderPage, currentRoute };
})(window.OH = window.OH || {});


/* ===== assets/js/app.js ===== */
(function (OH) {
  'use strict';

  function applySavedTheme() {
    const theme = OH.storage.get('theme', 'light');
    document.documentElement.setAttribute('data-theme', theme);
  }

  function start() {
    applySavedTheme();
    const session = OH.storage.get('session', null);
    const isSeller = session && session.role === 'seller';
    if (!location.hash || location.hash === '#/' || location.hash === '#') {
      location.hash = isSeller ? '#/seller-dashboard' : '#/dashboard';
    }
    OH.router.start();
  }

  function boot() {
    applySavedTheme();
    OH.api.init().then(() => {
      if (OH.auth.isAuthed()) start();
      else OH.auth.renderLogin();
    });
  }

  OH.app = { start, boot };

  document.addEventListener('DOMContentLoaded', OH.app.boot);
})(window.OH = window.OH || {});

</script>
</body>
