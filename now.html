<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Elite: Uzum Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; background: #020202; color: white; overflow-x: hidden; }
        .bg-blur { position: fixed; width: 400px; height: 400px; background: rgba(16, 185, 129, 0.1); filter: blur(100px); border-radius: 50%; z-index: -1; top: -10%; right: -10%; animation: float 10s infinite alternate; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(-100px, 100px); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .shimmer { background: linear-gradient(90deg, #10b981, #34d399, #10b981); background-size: 200% 100%; animation: shimmer 2s linear infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .list-entry { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .btn-premium { background: white; color: black; font-weight: 900; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-premium:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .custom-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; outline: none; transition: 0.3s; appearance: none; }
        .custom-field:focus { border-color: white; background: rgba(255,255,255,0.07); }
        /* Mobil uchun tarixni ko'rinishini to'g'rilash */
        #list-container { max-height: none; overflow: visible; padding-bottom: 100px; }
        @media (max-width: 768px) {
            .glass { border-radius: 20px; padding: 1.5rem !important; }
            #target-percent { font-size: 3rem; }
            .counter { font-size: 2rem !important; }
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="bg-blur" style="bottom: -10%; left: -10%; background: rgba(244, 63, 94, 0.05);"></div>

    <div id="settings-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="glass p-8 w-full max-w-sm border-white/20">
            <h3 class="text-xl font-black mb-6 italic uppercase">Challenge Maqsadi</h3>
            <input type="number" id="target-input" class="custom-field p-4 w-full mb-6 text-white" placeholder="Summani kiriting">
            <div class="flex gap-4">
                <button onclick="toggleSettings()" class="flex-1 text-xs font-bold opacity-50 uppercase">Yopish</button>
                <button onclick="saveTarget()" class="flex-1 btn-premium py-3 rounded-xl text-[10px]">Saqlash</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6">
        <div class="glass p-10 w-full max-w-sm text-center border-white/10">
            <div class="mb-8">
                <div class="w-16 h-16 bg-white rounded-2xl mx-auto flex items-center justify-center mb-4 rotate-12">
                    <i class="fas fa-lock text-black text-2xl -rotate-12"></i>
                </div>
                <h2 class="text-2xl font-black italic tracking-tighter uppercase">Private Elite</h2>
                <p class="text-[10px] text-white/30 uppercase mt-2">Faqat ruxsat etilganlar uchun</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="user-pass" class="custom-field p-4 w-full text-center text-white text-xl tracking-widest" placeholder="PAROL">
                <button onclick="checkAccess()" class="btn-premium w-full py-4 rounded-2xl">Kirish</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="max-w-6xl mx-auto p-4 lg:p-12">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                <div class="flex gap-1.5 p-1.5 glass rounded-2xl w-full md:w-auto">
                    <button onclick="switchTab('main')" id="tab-main" class="flex-1 md:flex-none px-4 md:px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-black">Asosiy</button>
                    <button onclick="switchTab('work')" id="tab-work" class="flex-1 md:flex-none px-4 md:px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-white/40">Ish</button>
                    <button onclick="switchTab('uzum')" id="tab-uzum" class="flex-1 md:flex-none px-4 md:px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-white/40 border border-purple-500/20">Uzum</button>
                </div>
                
                <div class="flex items-center gap-6">
                    <button onclick="exportToExcel()" class="text-emerald-400 text-[10px] font-black uppercase tracking-wider">
                        <i class="fas fa-file-excel mr-1"></i> Excel
                    </button>
                    <button onclick="resetAllData()" class="text-rose-500 text-[10px] font-black uppercase tracking-wider">
                        <i class="fas fa-trash mr-1"></i> Tozalash
                    </button>
                    <button onclick="location.reload()" class="text-white/20"><i class="fas fa-power-off"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
                <div id="progress-card" class="lg:col-span-2 glass p-8 relative overflow-hidden group">
                    <div class="relative z-10 flex justify-between items-end">
                        <div>
                            <h4 class="text-[10px] font-black text-white/30 uppercase tracking-[4px] mb-2">Progress</h4>
                            <div class="flex items-center gap-3">
                                <h2 id="target-title" class="text-3xl font-black italic tracking-tighter">100M</h2>
                                <button onclick="toggleSettings()" class="text-white/20 hover:text-white"><i class="fas fa-pen text-xs"></i></button>
                            </div>
                        </div>
                        <span id="target-percent" class="text-5xl font-black text-emerald-400">0%</span>
                    </div>
                    <div class="h-3 bg-white/5 rounded-full mt-8 overflow-hidden">
                        <div id="progress-bar" class="h-full shimmer rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-white/20 uppercase">Qolgan: <span id="remaining-val" class="text-white/60">0</span> UZS</p>
                </div>

                <div class="glass p-8 flex flex-col justify-center border-l-4 border-emerald-500" id="net-card">
                    <h4 id="net-label" class="text-[10px] font-black text-white/30 uppercase tracking-[4px] mb-4">SOF FOYDA</h4>
                    <h2 id="val-3" class="text-3xl font-black tracking-tighter counter">0</h2>
                    <p id="net-sub" class="text-[10px] text-emerald-500 font-bold mt-2 uppercase">Barqaror</p>
                </div>
            </div>

            <div id="summary-stats" class="grid grid-cols-2 gap-4 mb-12">
                <div class="glass p-4 border-b-2 border-emerald-500/20">
                    <span class="block text-[9px] font-black text-white/30 uppercase mb-1">Kirim</span>
                    <span id="val-1" class="text-lg font-bold text-emerald-400 counter">0</span>
                </div>
                <div class="glass p-4 border-b-2 border-rose-500/20">
                    <span class="block text-[9px] font-black text-white/30 uppercase mb-1">Chiqim</span>
                    <span id="val-2" class="text-lg font-bold text-rose-400 counter">0</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4">
                    <div class="glass p-6 sticky top-6 border-white/10">
                        <div class="flex justify-between items-center mb-6">
                            <h3 id="form-title" class="font-black text-[10px] uppercase italic text-white/60">Yangi Amaliyot</h3>
                            <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden text-[9px] font-black text-rose-500 uppercase">Bekor</button>
                        </div>
                        <div class="space-y-3">
                            <input type="hidden" id="edit-id">
                            <input type="date" id="inp-date" class="custom-field p-4 w-full text-sm text-white">
                            <input type="text" id="inp-desc" class="custom-field p-4 w-full text-sm text-white" placeholder="Nima uchun?">
                            <input type="number" id="inp-amount" class="custom-field p-4 w-full text-sm text-white" placeholder="Summa">
                            
                            <div id="type-wrapper" class="grid grid-cols-2 gap-2 p-1 bg-black/40 rounded-2xl">
                                <button onclick="setEntryType('income')" id="btn-inc" class="py-3 rounded-xl text-[9px] font-black transition-all bg-emerald-500 text-black uppercase">Kirim</button>
                                <button onclick="setEntryType('expense')" id="btn-exp" class="py-3 rounded-xl text-[9px] font-black transition-all text-white/40 uppercase">Chiqim</button>
                            </div>
                            
                            <button onclick="saveEntry()" id="btn-save" class="btn-premium w-full py-4 rounded-2xl text-[10px]">Saqlash</button>
                        </div>
                    </div>
                </div>
                
                <div class="lg:col-span-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-[10px] uppercase italic text-white/40 tracking-widest">Amallar Tarixi</h3>
                        <input type="date" id="filter-date" onchange="render()" class="bg-transparent border border-white/10 rounded-xl p-2 text-[10px] font-bold text-white">
                    </div>
                    <div id="list-container" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "12345";
        let db = JSON.parse(localStorage.getItem('finance_elite_v11')) || { main: [], work: [], uzum: [], target: 100000000 };
        let activeTab = 'main';
        let entryType = 'income';

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('inp-date').value = today;
        document.getElementById('filter-date').value = today;

        function checkAccess() {
            if(document.getElementById('user-pass').value === MY_PASS) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                render();
            } else alert("Parol noto'g'ri!");
        }

        const format = (n) => new Intl.NumberFormat('uz-UZ').format(Math.floor(n));

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = format(Math.floor(progress * (end - start) + start));
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
            document.getElementById('target-input').value = db.target;
        }

        function saveTarget() {
            db.target = parseFloat(document.getElementById('target-input').value) || 0;
            save();
            toggleSettings();
        }

        function resetAllData() {
            if(confirm("Barcha ma'lumotlarni butunlay o'chirishni tasdiqlaysizmi?")) {
                db.main = []; db.work = []; db.uzum = []; save();
            }
        }

        function switchTab(t) {
            activeTab = t;
            document.querySelectorAll('button[id^="tab-"]').forEach(n => {
                n.classList.remove('bg-white', 'text-black');
                n.classList.add('text-white/40');
            });
            const activeBtn = document.getElementById('tab-'+t);
            activeBtn.classList.add('bg-white', 'text-black');
            activeBtn.classList.remove('text-white/40');
            
            const summStats = document.getElementById('summary-stats');
            const typeWrap = document.getElementById('type-wrapper');
            const netCard = document.getElementById('net-card');
            const progCard = document.getElementById('progress-card');

            if(t === 'uzum') {
                summStats.classList.add('hidden');
                typeWrap.classList.add('hidden');
                progCard.classList.add('opacity-30', 'pointer-events-none');
                netCard.classList.replace('border-emerald-500', 'border-purple-500');
                document.getElementById('net-label').innerText = "UZUM JAMI";
                document.getElementById('net-sub').className = "text-[10px] text-purple-500 font-bold mt-2 uppercase";
                entryType = 'expense';
            } else {
                summStats.classList.remove('hidden');
                typeWrap.classList.remove('hidden');
                progCard.classList.remove('opacity-30', 'pointer-events-none');
                netCard.classList.replace('border-purple-500', 'border-emerald-500');
                document.getElementById('net-label').innerText = "SOF FOYDA";
                document.getElementById('net-sub').className = "text-[10px] text-emerald-500 font-bold mt-2 uppercase";
                setEntryType('income');
            }
            cancelEdit();
            render();
        }

        function setEntryType(t) {
            entryType = t;
            const isInc = t === 'income';
            document.getElementById('btn-inc').className = isInc ? 'py-3 rounded-xl text-[9px] font-black transition-all bg-emerald-500 text-black uppercase' : 'py-3 rounded-xl text-[9px] font-black transition-all text-white/40 uppercase';
            document.getElementById('btn-exp').className = !isInc ? 'py-3 rounded-xl text-[9px] font-black transition-all bg-rose-500 text-white uppercase' : 'py-3 rounded-xl text-[9px] font-black transition-all text-white/40 uppercase';
        }

        function saveEntry() {
            const desc = document.getElementById('inp-desc').value || "Tasnifsiz";
            const amount = parseFloat(document.getElementById('inp-amount').value);
            const date = document.getElementById('inp-date').value;
            const editId = document.getElementById('edit-id').value;

            if(!amount) return;

            if(editId) {
                const idx = db[activeTab].findIndex(i => i.id == editId);
                db[activeTab][idx] = { ...db[activeTab][idx], desc, amount, type: entryType, date };
            } else {
                db[activeTab].push({ id: Date.now(), desc, amount, type: entryType, date });
            }
            save();
            cancelEdit();
        }

        function editItem(id) {
            const item = db[activeTab].find(i => i.id == id);
            document.getElementById('edit-id').value = item.id;
            document.getElementById('inp-desc').value = item.desc === "Tasnifsiz" ? "" : item.desc;
            document.getElementById('inp-amount').value = item.amount;
            document.getElementById('inp-date').value = item.date;
            if(activeTab !== 'uzum') setEntryType(item.type);
            document.getElementById('form-title').innerText = "Tahrirlash";
            document.getElementById('btn-save').innerText = "O'zgarishni saqlash";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = "";
            document.getElementById('inp-desc').value = "";
            document.getElementById('inp-amount').value = "";
            document.getElementById('form-title').innerText = activeTab === 'uzum' ? "Uzum Harajati" : "Yangi Amaliyot";
            document.getElementById('btn-save').innerText = "Ma'lumotni Saqlash";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function deleteItem(id) {
            if(confirm("Ushbu amalni o'chirib tashlaymizmi?")) {
                db[activeTab] = db[activeTab].filter(i => i.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('finance_elite_v11', JSON.stringify(db));
            render();
        }

        function exportToExcel() {
            // Excel ustunlari o'zbekcha qilindi
            let csv = "\uFEFFBo'lim,Sana,Tavsif,Summa,Turi\n";
            ['main', 'work', 'uzum'].forEach(tab => {
                let tabName = tab === 'main' ? 'ASOSIY' : tab === 'work' ? 'ISH' : 'UZUM';
                db[tab].forEach(i => {
                    let typeName = i.type === 'income' ? 'KIRIM' : 'CHIQIM';
                    csv += `${tabName},${i.date},"${i.desc}",${i.amount},${typeName}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Moliya_Hisoboti_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        function render() {
            let totalInc = 0, totalExp = 0;
            ['main', 'work'].forEach(tab => {
                db[tab].forEach(i => {
                    if(i.type === 'income') totalInc += i.amount; else totalExp += i.amount;
                });
            });

            const net = totalInc - totalExp;
            const perc = Math.min((net / db.target) * 100, 100).toFixed(1);

            if(net >= db.target && db.target > 0 && activeTab !== 'uzum') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#10b981', '#ffffff'] });
            }

            document.getElementById('target-title').innerText = (db.target >= 1000000 ? (db.target/1000000) + "M" : format(db.target));
            document.getElementById('val-1').innerText = format(totalInc);
            document.getElementById('val-2').innerText = format(totalExp);
            document.getElementById('target-percent').innerText = (net < 0 ? 0 : perc) + "%";
            document.getElementById('progress-bar').style.width = (net < 0 ? 0 : perc) + "%";
            document.getElementById('remaining-val').innerText = format(Math.max(db.target - net, 0));

            if(activeTab === 'uzum') {
                let uzumTotal = db.uzum.reduce((sum, i) => sum + i.amount, 0);
                animateValue(document.getElementById('val-3'), 0, uzumTotal, 800);
            } else {
                animateValue(document.getElementById('val-3'), 0, net, 800);
            }

            const container = document.getElementById('list-container');
            const fDate = document.getElementById('filter-date').value;
            const filtered = db[activeTab].filter(i => i.date === fDate).reverse();

            container.innerHTML = filtered.length ? '' : '<div class="py-20 text-center opacity-10 font-black uppercase tracking-[5px] text-xs">Ma\'lumot yo\'q</div>';

            filtered.forEach((i, index) => {
                const div = document.createElement('div');
                div.className = `glass p-4 flex justify-between items-center border-l-2 ${i.type === 'income' ? 'border-emerald-500' : 'border-rose-500'} list-entry group`;
                div.style.animationDelay = (index * 0.05) + 's';
                div.innerHTML = `
                    <div class="flex-1 pr-2">
                        <p class="font-bold text-xs uppercase tracking-tight truncate max-w-[150px] md:max-w-none">${i.desc}</p>
                        <p class="text-[8px] opacity-30 font-black mt-1">${i.date}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="${i.type === 'income' ? 'text-emerald-400' : 'text-rose-400'} font-black text-sm italic whitespace-nowrap">
                            ${i.type === 'income' ? '+' : '-'}${format(i.amount)}
                        </span>
                        <div class="flex gap-2 ml-2">
                            <button onclick="editItem(${i.id})" class="p-2 text-white/20 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="deleteItem(${i.id})" class="p-2 text-white/20 hover:text-rose-500"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
